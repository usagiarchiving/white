<body>
    <div id="wrap">

                    <button id="btn-logout" class="nav-icon-btn" title="로그아웃" style="display: none;"><i class="xi-log-out"></i></button>

                    <div class="dropdown">

                        <div class="dropdown-inner" id="dropdown-menu"></div>
                    </div>
                </div>
            </header>

            <main id="main">

            </main>

        </div>

    <script>
