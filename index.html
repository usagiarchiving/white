<!DOCTYPE html>
<html lang="ko">
<head>
    <title>개인홈</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css">
    <link rel="stylesheet" href="style.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="wrap">
        <div id="container">
            
            <header id="header">
                <div class="inner_header">
                    <button id="btn-login" title="로그인"><i class="xi-log-in"></i></button>
                    <button id="btn-logout" title="로그아웃" style="display: none;"><i class="xi-log-out"></i></button>

                    <button onclick="toggleTheme()" title="테마 변경">
                        <i id="theme-icon" class="xi-toggle-off"></i>
                    </button>

                    <div class="dropdown">
                        <div class="dropdown-bars" title="메뉴 열기">
                            <i id="menu-icon" class="xi-bars"></i>
                        </div>
                        <div class="dropdown-inner">
                            <a href="#" onclick="loadExternalPage('home', 'category/home.html'); return false;">Home</a>
                            <a href="#" onclick="loadExternalPage('notice', 'category/notice.html'); return false;">Notice</a>
                            <a href="#" onclick="loadExternalPage('oneline', 'category/oneline.html'); return false;">한 줄 기록</a>
                            <a href="#" onclick="loadExternalPage('archive', 'category/archive.html'); return false;">Archive</a>
                            <a href="#" onclick="loadExternalPage('memo', 'category/memo.html'); return false;">Memo</a>
                            <a href="#" onclick="loadExternalPage('log', 'category/log.html'); return false;">Log</a>
                            <a href="#" onclick="changeView('list'); return false;">List</a>
                        </div>
                    </div>
                </div>
            </header>

            <main id="main">
                <div class="inner_index">

                    <div id="view-home" class="page-view"><div id="home-content"></div></div>
                    <div id="view-notice" class="page-view"><div class="area_view_content"><div class="article_content"><div id="notice-content"></div></div></div></div>
                    
                    <div id="view-oneline" class="page-view"><div class="area_view_content"><div class="article_content"><div id="oneline-content"></div></div></div></div>
                    <div id="view-archive" class="page-view"><div class="area_view_content"><div class="article_content"><div id="archive-content"></div></div></div></div>
                    <div id="view-memo" class="page-view"><div class="area_view_content"><div class="article_content"><div id="memo-content"></div></div></div></div>
                    <div id="view-log" class="page-view"><div class="area_view_content"><div class="article_content"><div id="log-content"></div></div></div></div>

                    <div id="view-list" class="page-view">
                        <div class="search-wrap">
                            <i class="xi-search"></i>
                            <input type="text" id="search-input" placeholder="제목 검색..." autocomplete="off">
                        </div>
                        <div class="category-menu" id="category-menu-container"></div>
                        <div id="list-container"></div>
                    </div>

                    <div id="view-article" class="page-view">
                        <div class="area_view_content">
                            <div class="btn-back-icon-wrap">
                                <a href="#" onclick="changeView('list'); return false;" class="btn-back-icon" title="목록으로 돌아가기">
                                    <i class="xi-close"></i>
                                </a>
                            </div>
                            <div class="article_content">
                                <div class="info_post">
                                    <div class="title_view" id="article-title"></div>
                                    <div class="view_info_post" id="article-date"></div>
                                </div>
                                <div class="article_view" id="article-content"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <div id="login-modal" class="login-overlay">
        <div class="login-card">
            <h2>Authentication</h2>
            <form id="login-form" onsubmit="return false;">
                <div class="login-field"><input type="text" id="login-id" placeholder="사용자 아이디" required></div>
                <div class="login-field"><input type="password" id="login-pass" placeholder="비밀번호" required></div>
                <button type="submit" class="login-submit-btn">로그인</button>
            </form>
            <div class="login-close-btn" onclick="closeLoginModal()">닫기</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
