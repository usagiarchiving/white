<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEARLESS - Memory Editor V3.1 (Pan & Zoom Fix)</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --bg: #f2f2f7; --card-bg: rgba(255, 255, 255, 0.7); --blue: #007aff; --text: #1c1c1e; --sub-text: #8e8e93; }
body { margin: 0; padding: 20px; background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); padding-bottom: 40px; font-size: 12px; }
* { box-sizing: border-box; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; }

/* === 2단 레이아웃 (PC: 2단, 모바일: 1단) === */
.main-layout { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; align-items: start; }
@media (min-width: 900px) { .main-layout { grid-template-columns: 1.2fr 1fr; } }

/* 섹션 공통 스타일 */
.section { background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; }
.section-title { font-size: 15px; font-weight: 600; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }

/* 폼 요소 */
textarea, input[type="text"], select { width: 100%; border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 13px; outline: none; transition: border-color 0.2s; background: #fff; }
textarea:focus, input[type="text"]:focus, select:focus { border-color: var(--blue); }
label { font-size: 11px; color: var(--sub-text); margin-bottom: 4px; display: block; font-weight: 600; }

/* 버튼 */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.1s; }
.btn:active { transform: scale(0.96); }
.btn-secondary { background: #e5e5ea; color: var(--text); }
.btn-danger { background: #ff3b30; color: #fff; padding: 6px 10px; font-size: 12px; }
.btn-icon { background: transparent; color: var(--sub-text); padding: 5px; font-size: 20px; cursor: pointer; border: none; }
.btn-icon:hover { color: var(--blue); }

/* 에디터 아이템 아코디언 */
.item-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; transition: all 0.3s ease; }
.item-card.focused { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.2); }
.item-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid transparent; padding-bottom: 0; transition: all 0.3s; }
.item-header.expanded { border-bottom-color: #f0f0f0; padding-bottom: 12px; margin-bottom: 12px; }
.header-info-group { display: flex; align-items: center; gap: 10px; flex: 1; overflow: hidden; }
.index-badge { background: var(--blue); color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
.header-title-text { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.item-controls { display: flex; gap: 5px; align-items: center; }
.item-body { display: none; flex-direction: column; gap: 12px; }
.item-body.expanded { display: flex; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
.conditional-field { display: none; margin-top: 10px; animation: slideDown 0.3s ease; }

/* 이미지 조절기 슬라이더 UI */
.slider-group { background: rgba(0,0,0,0.02); border: 1px solid #e5e5ea; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.slider-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; color: #555; }
.slider-row input[type="range"] { width: 65%; accent-color: var(--blue); }

/* ==================================================
   🔥 라이브 미리보기 패널 (Sticky & Dark Theme)
   ================================================== */
.preview-pane { 
    background: #1B1B1B; padding: 20px; border-radius: 16px; 
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow-y: auto; 
    position: sticky; top: 20px; max-height: calc(100vh - 40px);
}
.preview-pane::-webkit-scrollbar { display: none; }
.preview-title { color: #F9F9F8; font-size: 15px; font-weight: 700; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

/* 미리보기 카드 CSS */
.preview-card {
    width: 100%; height: 175px; background: #242424; border-radius: 16px; display: flex; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 20px; cursor: pointer; font-family: 'Noto Serif KR', serif !important; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.1); box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}
.preview-card:hover { transform: translateY(-4px) scale(1.02); border-color: rgba(249, 249, 248, 0.25); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
.preview-card.au-card { height: 280px; }
.preview-card.focused-preview { border: 2px solid #007aff; box-shadow: 0 0 20px rgba(0,122,255,0.5); transform: scale(1.02); }

.card-scenery-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; background: linear-gradient(to right, rgba(249, 249, 248, 1) 0%, rgba(249, 249, 248, 0.98) 15%, rgba(249, 249, 248, 0.9) 30%, rgba(249, 249, 248, 0.75) 45%, rgba(249, 249, 248, 0.5) 65%, rgba(249, 249, 248, 0.15) 85%, rgba(249, 249, 248, 0) 100%); }
.au-card .card-scenery-overlay { background: linear-gradient(to top, rgba(15, 15, 15, 0.95) 0%, rgba(15, 15, 15, 0.8) 25%, rgba(15, 15, 15, 0.4) 50%, rgba(15, 15, 15, 0) 100%); }

.card-inner-info { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 16px 20px; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
.card-bottom-left-group { position: absolute; bottom: 20px; left: 22px; width: 55%; display: flex; flex-direction: column; gap: 4px; justify-content: flex-end; }
.au-card .card-bottom-left-group { width: 85%; }
.card-title { font-size: 17px; font-weight: 700; color: #1B1B1B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.3px; }
.au-card .card-title { color: #F9F9F8; font-size: 19px; }
.card-summary { font-size: 12px; color: #666666; line-height: 1.4; font-weight: 400; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
.au-card .card-summary { color: #D1D1D1; }
.au-setting-text { font-size: 10px; color: #A0B0C0; font-weight: 900; margin-bottom: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

.card-top-right-group { position: absolute; top: 20px; right: 22px; }
.card-date { font-size: 12px; color: #F9F9F8; font-weight: 700; letter-spacing: 0.3px; background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 4px; backdrop-filter: blur(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

.card-illustration-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
.card-img { width: 100%; height: 100%; object-fit: cover; } 
.card-no-img-placeholder { width: 100%; height: 100%; background: #2B2B2B; display: flex; align-items: center; justify-content: flex-end; padding-right: 40px; font-size: 12px; color: rgba(249,249,248,0.12); font-weight: 900; letter-spacing: 2px; }
</style>
</head>
<body>

<h1><i class="ri-gallery-fill" style="color: #007aff;"></i> FEARLESS Editor V3.1</h1>

<div class="main-layout">
    <div class="editor-pane">
        <div class="section" style="margin-bottom: 20px;">
            <h2 class="section-title"><i class="ri-download-cloud-2-line"></i> 데이터 불러오기</h2>
            <textarea id="import-area" style="height: 60px;" placeholder="<div class='memory-data'>... 붙여넣기"></textarea>
            <div style="text-align: right; margin-top: 10px;">
                <button class="btn" onclick="parseHTML()"><i class="ri-refresh-line"></i> 동기화</button>
            </div>
        </div>

        <div class="section" style="margin-bottom: 20px;">
            <div class="section-title">
                <span><i class="ri-list-check-2"></i> 기억 목록 편집</span>
                <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="sortItemsByDate()">
                    <i class="ri-sort-desc"></i> 날짜순 정렬
                </button>
            </div>
            <div id="editor-list"></div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="addNewItem()"><i class="ri-add-line"></i> 새 기억 맨 위에 추가</button>
        </div>

        <div class="section" id="export-section">
            <h2 class="section-title"><i class="ri-code-box-line"></i> 최종 코드 추출</h2>
            <textarea id="export-area" style="height: 100px;" readonly placeholder="하단의 '최종 코드 생성'을 누르세요."></textarea>
            <div class="action-bar" style="justify-content: flex-end; margin-top: 10px; display: flex; gap: 10px;">
                <button class="btn" onclick="generateHTML()"><i class="ri-magic-line"></i> 생성</button>
                <button class="btn btn-secondary" id="copy-btn" onclick="copyCode()"><i class="ri-clipboard-line"></i> 복사</button>
            </div>
        </div>
    </div>

    <div class="preview-pane">
        <h2 class="preview-title"><i class="ri-eye-line"></i> 실시간 카드 미리보기</h2>
        <div id="live-preview-list"></div>
    </div>
</div>

<script>
let memoryItems = [];
let isSortDesc = true;

function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function getTodayData() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    const yy = String(kst.getFullYear()).slice(-2);
    const mm = String(kst.getMonth() + 1).padStart(2, '0');
    const dd = String(kst.getDate()).padStart(2, '0');
    return { id: `${yy}${mm}${dd}`, formatted: `20${yy}. ${kst.getMonth() + 1}. ${kst.getDate()}` };
}

function handleIdChange(index, newId) {
    updateItem(index, 'id', newId, false);
    const match = newId.match(/^(\d{2})(\d{2})(\d{2})/);
    if (match) {
        updateItem(index, 'date', `20${match[1]}. ${parseInt(match[2], 10)}. ${parseInt(match[3], 10)}`, false);
    }
    renderAll();
}

function parseHTML() {
    const htmlString = document.getElementById('import-area').value;
    if (!htmlString.trim()) return;
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');
    const items = doc.querySelectorAll('.memory-data');
    
    memoryItems = [];
    items.forEach(item => {
        memoryItems.push({
            id: item.getAttribute('data-id') || '',
            category: item.getAttribute('data-category') || 'daily',
            auSetting: item.getAttribute('data-au-setting') || '',
            tag: item.getAttribute('data-tag') || '',
            img: item.getAttribute('data-img') || '',
            imgX: item.getAttribute('data-img-x') || '50',
            imgY: item.getAttribute('data-img-y') || '50',
            imgScale: item.getAttribute('data-img-scale') || '1',
            date: item.getAttribute('data-date') || '',
            title: item.querySelector('.memory-title') ? item.querySelector('.memory-title').textContent.trim() : '',
            summary: item.querySelector('.memory-summary') ? item.querySelector('.memory-summary').textContent.trim() : '',
            isExpanded: false
        });
    });
    renderAll();
}

function updateItem(index, key, value, doRender = true) {
    memoryItems[index][key] = value;
    if(doRender) renderPreviewOnly();
}

function handleCategoryChange(index, value) {
    memoryItems[index].category = value;
    if (value !== 'au') memoryItems[index].auSetting = '';
    renderAll();
}

// 🔥 핵심: X/Y 이동 시 transform-origin을 함께 업데이트하여 줌 패닝(Panning) 효과 완벽 구현!
function updateImgControl(index, prop, value) {
    memoryItems[index][prop] = value;
    document.getElementById(`val-${prop}-${index}`).innerText = value;
    
    const previewImg = document.querySelector(`#preview-card-${index} .card-img`);
    if(previewImg) {
        // object-position과 transform-origin을 슬라이더 축에 동기화시켜서 줌 상태에서도 카메라 이동 적용!
        previewImg.style.objectPosition = `${memoryItems[index].imgX}% ${memoryItems[index].imgY}%`;
        previewImg.style.transformOrigin = `${memoryItems[index].imgX}% ${memoryItems[index].imgY}%`;
        previewImg.style.transform = `scale(${memoryItems[index].imgScale})`;
    }
}

function toggleAccordion(index) {
    memoryItems[index].isExpanded = !memoryItems[index].isExpanded;
    renderAll();
    setTimeout(() => {
        if(memoryItems[index].isExpanded) {
            const previewCard = document.getElementById(`preview-card-${index}`);
            if(previewCard) previewCard.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
    }, 50);
}

function focusEditorFromPreview(index) {
    memoryItems.forEach((item, i) => item.isExpanded = (i === index));
    renderAll();
    setTimeout(() => {
        const editorCard = document.getElementById(`editor-card-${index}`);
        if(editorCard) editorCard.scrollIntoView({behavior: 'smooth', block: 'center'});
    }, 50);
}

function moveItem(index, dir) {
    if (index + dir < 0 || index + dir >= memoryItems.length) return;
    const temp = memoryItems[index];
    memoryItems[index] = memoryItems[index + dir];
    memoryItems[index + dir] = temp;
    renderAll();
}

function sortItemsByDate() {
    if(memoryItems.length === 0) return;
    memoryItems.sort((a, b) => isSortDesc ? b.id.localeCompare(a.id) : a.id.localeCompare(b.id));
    isSortDesc = !isSortDesc;
    renderAll();
}

function removeItem(index) {
    if (confirm('정말로 삭제하시겠습니까?')) {
        memoryItems.splice(index, 1);
        renderAll();
    }
}

function addNewItem() {
    const today = getTodayData();
    memoryItems.unshift({
        id: today.id, category: 'daily', auSetting: '', tag: '',
        img: 'https://i.ibb.co/CKF6H7pv/IMG-3826.jpg', imgX: '50', imgY: '50', imgScale: '1',
        date: today.formatted, title: '새로운 기억', summary: '', isExpanded: true
    });
    renderAll();
}

function renderAll() {
    renderEditor();
    renderPreviewOnly();
}

function renderEditor() {
    const list = document.getElementById('editor-list');
    list.innerHTML = '';
    
    if (memoryItems.length === 0) {
        list.innerHTML = '<p style="text-align:center; color: var(--sub-text);">생성된 메모리 카드가 없습니다.</p>';
        return;
    }
    
    memoryItems.forEach((item, index) => {
        const expandedClass = item.isExpanded ? 'expanded' : '';
        const focusedClass = item.isExpanded ? 'focused' : '';
        const chevronIcon = item.isExpanded ? 'ri-arrow-up-s-line' : 'ri-arrow-down-s-line';
        
        list.innerHTML += `
        <div class="item-card ${focusedClass}" id="editor-card-${index}">
            <div class="item-header ${expandedClass}" onclick="toggleAccordion(${index})">
                <div class="header-info-group">
                    <span class="index-badge" onclick="event.stopPropagation();">#${index + 1}</span>
                    <span class="header-title-text"><span style="color:#8e8e93; font-weight:400;">${escapeHTML(item.date)}</span> | ${escapeHTML(item.title)}</span>
                </div>
                <div class="item-controls" onclick="event.stopPropagation();">
                    <button class="btn-icon" onclick="moveItem(${index}, -1)"><i class="ri-arrow-up-line"></i></button>
                    <button class="btn-icon" onclick="moveItem(${index}, 1)"><i class="ri-arrow-down-line"></i></button>
                    <button class="btn-icon" style="color:#ff3b30;" onclick="removeItem(${index})"><i class="ri-delete-bin-line"></i></button>
                    <i class="${chevronIcon}" style="font-size:24px; color:#c7c7cc; margin-left: 5px;"></i>
                </div>
            </div>

            <div class="item-body ${expandedClass}">
                <div class="grid-2">
                    <div>
                        <label>ID</label>
                        <input type="text" value="${escapeHTML(item.id)}" onchange="handleIdChange(${index}, this.value)">
                    </div>
                    <div>
                        <label>카테고리</label>
                        <select onchange="handleCategoryChange(${index}, this.value)">
                            <option value="daily" ${item.category === 'daily' ? 'selected' : ''}>DAILY</option>
                            <option value="event" ${item.category === 'event' ? 'selected' : ''}>EVENT</option>
                            <option value="au" ${item.category === 'au' ? 'selected' : ''}>AU</option>
                        </select>
                    </div>
                </div>

                <div id="au-field-${index}" class="conditional-field" style="display: ${item.category === 'au' ? 'block' : 'none'};">
                    <label>AU 설정 뱃지</label>
                    <input type="text" value="${escapeHTML(item.auSetting)}" onchange="updateItem(${index}, 'auSetting', this.value); renderEditor();">
                </div>

                <div class="grid-2">
                    <div><label>출력 날짜</label><input type="text" value="${escapeHTML(item.date)}" onchange="updateItem(${index}, 'date', this.value); renderEditor();"></div>
                    <div><label>태그 (,로 구분)</label><input type="text" value="${escapeHTML(item.tag)}" onchange="updateItem(${index}, 'tag', this.value)"></div>
                </div>
                
                <div>
                    <label>배경 이미지 링크</label>
                    <input type="text" value="${escapeHTML(item.img)}" onchange="updateItem(${index}, 'img', this.value)">
                    
                    <div class="slider-group">
                        <label style="margin-bottom: 2px;"><i class="ri-drag-move-line"></i> 이미지 세부 구도 조절 (우측 미리보기 확인)</label>
                        <div class="slider-row">
                            <span>X축 이동 (<span id="val-imgX-${index}">${item.imgX}</span>%)</span>
                            <input type="range" min="0" max="100" value="${item.imgX}" oninput="updateImgControl(${index}, 'imgX', this.value)">
                        </div>
                        <div class="slider-row">
                            <span>Y축 이동 (<span id="val-imgY-${index}">${item.imgY}</span>%)</span>
                            <input type="range" min="0" max="100" value="${item.imgY}" oninput="updateImgControl(${index}, 'imgY', this.value)">
                        </div>
                        <div class="slider-row">
                            <span>줌 확대 (<span id="val-imgScale-${index}">${item.imgScale}</span>x)</span>
                            <input type="range" min="1" max="3" step="0.05" value="${item.imgScale}" oninput="updateImgControl(${index}, 'imgScale', this.value)">
                        </div>
                    </div>
                </div>

                <div>
                    <label>기억의 제목</label>
                    <input type="text" value="${escapeHTML(item.title)}" onchange="updateItem(${index}, 'title', this.value); renderEditor();">
                </div>
                <div>
                    <label>줄거리 요약 <span style="font-weight:400; color:var(--blue);">(비우면 제목이 정렬됨)</span></label>
                    <textarea onchange="updateItem(${index}, 'summary', this.value)">${escapeHTML(item.summary)}</textarea>
                </div>
            </div>
        </div>`;
    });
}

function renderPreviewOnly() {
    const previewList = document.getElementById('live-preview-list');
    previewList.innerHTML = '';
    
    if (memoryItems.length === 0) {
        previewList.innerHTML = '<p style="color:#666; text-align:center; margin-top:50px;">데이터가 없습니다.</p>';
        return;
    }
    
    memoryItems.forEach((item, index) => {
        const auClass = item.category === 'au' ? 'au-card' : '';
        const focusedClass = item.isExpanded ? 'focused-preview' : '';
        
        // 🔥 transform-origin을 X/Y와 결합하여 추가
        let thumbHtml = item.img ? `<img src="${item.img}" class="card-img" alt="${item.title}" style="object-position: ${item.imgX}% ${item.imgY}%; transform-origin: ${item.imgX}% ${item.imgY}%; transform: scale(${item.imgScale});">` : `<div class="card-no-img-placeholder">FEARLESS</div>`;
        let summaryHtml = item.summary ? `<div class="card-summary">${escapeHTML(item.summary)}</div>` : '';
        let auSettingHtml = (item.category === 'au' && item.auSetting) ? `<div class="au-setting-text">[ ${escapeHTML(item.auSetting)} ]</div>` : '';

        previewList.innerHTML += `
        <div class="preview-card ${auClass} ${focusedClass}" id="preview-card-${index}" onclick="focusEditorFromPreview(${index})">
            <div class="card-illustration-frame">${thumbHtml}</div>
            <div class="card-scenery-overlay"></div>
            <div class="card-inner-info">
                <div class="card-top-right-group"><div class="card-date">${escapeHTML(item.date)}</div></div>
                <div class="card-bottom-left-group">
                    ${auSettingHtml}
                    <div class="card-title">${escapeHTML(item.title)}</div>
                    ${summaryHtml}
                </div>
            </div>
        </div>`;
    });
}

function generateHTML() {
    let finalCode = '';
    memoryItems.forEach(item => {
        const auAttr = (item.category === 'au' && item.auSetting.trim() !== '') ? ` \n     data-au-setting="${escapeHTML(item.auSetting)}"` : '';
        
        finalCode += `<div class="memory-data" \n     data-id="${escapeHTML(item.id)}" \n     data-category="${escapeHTML(item.category)}"${auAttr} \n     data-tag="${escapeHTML(item.tag)}" \n     data-img="${item.img ? escapeHTML(item.img) : ''}" \n     data-img-x="${item.imgX}" data-img-y="${item.imgY}" data-img-scale="${item.imgScale}" \n     data-date="${escapeHTML(item.date)}">\n    <div class="memory-title">${escapeHTML(item.title)}</div>\n    <div class="memory-summary">${escapeHTML(item.summary)}</div>\n</div>\n\n`;
    });
    document.getElementById('export-area').value = finalCode.trim();
}

function copyCode() {
    const exportArea = document.getElementById('export-area');
    if(!exportArea.value) return;
    exportArea.select(); document.execCommand('copy');
    
    const btn = document.getElementById('copy-btn');
    const ogHtml = btn.innerHTML; const ogBg = btn.style.background;
    btn.innerHTML = '<i class="ri-check-line"></i> 복사 완료!'; btn.style.background = '#34c759'; btn.style.color = '#fff';
    setTimeout(() => { btn.innerHTML = ogHtml; btn.style.background = ogBg; btn.style.color = 'var(--text)'; }, 2000);
}
</script>
</body>
</html>
