<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FEARLESS - List Editor</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root { --bg: #f2f2f7; --card-bg: rgba(255, 255, 255, 0.7); --blue: #007aff; --text: #1c1c1e; --sub-text: #8e8e93; }
body { margin: 0; padding: 20px; background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); padding-bottom: 40px; font-size: 12px; }
* { box-sizing: border-box; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; }

.container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.section { background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s, opacity 0.2s; }
.section-title { font-size: 15px; font-weight: 600; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

textarea { width: 100%; height: 120px; border: 1px solid #d1d1d6; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 12px; resize: vertical; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: var(--blue); }
input[type="text"] { width: 100%; border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px 12px; font-size: 13px; outline: none; transition: border-color 0.2s; }
input[type="text"]:focus { border-color: var(--blue); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s, opacity 0.2s, transform 0.1s; }
.btn:active { transform: scale(0.96); opacity: 0.8; }
.btn-secondary { background: #e5e5ea; color: var(--text); }
.btn-danger { background: #ff3b30; color: #fff; padding: 6px 10px; font-size: 12px; }
.btn-icon { background: transparent; color: var(--sub-text); padding: 5px; font-size: 20px; cursor: pointer; border: none; }
.btn-icon:hover { color: var(--blue); }

.item-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.item-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 5px; }
.item-controls { display: flex; gap: 5px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* 모바일 화면에서 인풋칸 찌그러짐 방지 */
@media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

.tag-chips { display: flex; gap: 6px; margin-top: 4px; }
.tag-chip { background: #f2f2f7; color: var(--blue); padding: 4px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: 500; border: none; }
.tag-chip:active { background: #e5e5ea; }

.action-bar { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
</style>
</head>
<body>

<h1><i class="ri-settings-4-fill" style="color: #007aff;"></i> FEARLESS List Editor</h1>

<div class="container">
    <div class="section">
        <h2 class="section-title"><i class="ri-download-cloud-2-line"></i> 기존 코드 불러오기</h2>
        <p style="font-size: 11px; color: var(--sub-text); margin-top: 0;">list.html 의 순수 데이터를 붙여넣으세요.</p>
        <textarea id="import-area" placeholder="<div class='chat-item'>... 덩어리를 여기에 붙여넣기"></textarea>
        <div style="text-align: right; margin-top: 10px;">
            <button class="btn" onclick="parseHTML()"><i class="ri-refresh-line"></i> 데이터 동기화</button>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title"><i class="ri-list-check-2"></i> 메시지 목록 편집</h2>
        <div id="editor-list"></div>
        <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="addNewItem()"><i class="ri-add-line"></i> 새 메시지 추가</button>
    </div>

    <div class="section" id="export-section">
        <h2 class="section-title"><i class="ri-code-box-line"></i> 최종 순수 코드 추출</h2>
        <textarea id="export-area" readonly placeholder="하단의 '최종 코드 생성' 버튼을 누르세요."></textarea>
        <div class="action-bar">
            <button class="btn" onclick="generateHTML()"><i class="ri-magic-line"></i> 최종 코드 생성</button>
            <button class="btn btn-secondary" id="copy-btn" onclick="copyCode()"><i class="ri-clipboard-line"></i> 코드 복사</button>
        </div>
    </div>
</div>

<script>
let chatItems = [];

// 오늘 날짜 추출 (KST)
function getTodayData() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    const yy = String(kst.getFullYear()).slice(-2);
    const mm = String(kst.getMonth() + 1).padStart(2, '0');
    const dd = String(kst.getDate()).padStart(2, '0');
    return {
        hash: `${yy}${mm}${dd}`,
        formatted: `20${yy}. ${kst.getMonth() + 1}. ${kst.getDate()}`
    };
}

function parseHTML() {
    const htmlString = document.getElementById('import-area').value;
    if (!htmlString.trim()) return;
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');
    const items = doc.querySelectorAll('.chat-item');
    
    chatItems = [];
    items.forEach(item => {
        const hashAttr = item.getAttribute('onclick');
        let hashMatch = hashAttr ? hashAttr.match(/location\.hash='([^']+)'/) : null;
        let hash = hashMatch ? hashMatch[1] : '';

        // 기존 화살표 아이콘 등의 태그를 걷어내고 순수 날짜 텍스트만 추출
        const dateEl = item.querySelector('.chat-date');
        let rawDate = dateEl ? dateEl.textContent.trim() : '';

        chatItems.push({
            id: Date.now() + Math.random(),
            tags: item.getAttribute('data-tags') || '',
            hash: hash,
            imgSrc: item.querySelector('img') ? item.querySelector('img').getAttribute('src') : '',
            name: item.querySelector('.chat-name') ? item.querySelector('.chat-name').innerText : '',
            date: rawDate,
            preview: item.querySelector('.chat-preview') ? item.querySelector('.chat-preview').innerText : ''
        });
    });

    renderEditor();
    document.getElementById('import-area').value = ''; 
}

function renderEditor() {
    const listContainer = document.getElementById('editor-list');
    listContainer.innerHTML = '';

    if(chatItems.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; font-size:12px; color:#8e8e93;">추가된 메시지가 없습니다.</p>';
        return;
    }

    chatItems.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="item-header">
                <strong style="font-size:13px; color:#007aff;">항목 #${index + 1}</strong>
                <div class="item-controls">
                    <button class="btn-icon" onclick="moveItem(${index}, -1)" ${index === 0 ? 'disabled' : ''}><i class="ri-arrow-up-s-line"></i></button>
                    <button class="btn-icon" onclick="moveItem(${index}, 1)" ${index === chatItems.length - 1 ? 'disabled' : ''}><i class="ri-arrow-down-s-line"></i></button>
                    <button class="btn btn-danger" onclick="deleteItem(${index})" style="margin-left: 5px;"><i class="ri-delete-bin-line"></i> 삭제</button>
                </div>
            </div>
            <div class="grid-2">
                <input type="text" placeholder="이름 (예: 내 여보♡)" value="${escapeHTML(item.name)}" oninput="updateItem(${index}, 'name', this.value)">
                <input type="text" placeholder="해시 ID (예: 260628_2)" value="${escapeHTML(item.hash)}" oninput="handleHashInput(${index}, this.value)">
            </div>
            <input type="text" placeholder="미리보기 텍스트 (비워둠)" value="${escapeHTML(item.preview)}" oninput="updateItem(${index}, 'preview', this.value)">
            <div class="grid-2">
                <input type="text" placeholder="날짜 (예: 2026. 6. 28)" id="date-input-${index}" value="${escapeHTML(item.date)}" oninput="updateItem(${index}, 'date', this.value)">
                <div>
                    <input type="text" placeholder="태그 입력" value="${escapeHTML(item.tags)}" oninput="updateItem(${index}, 'tags', this.value)" id="tag-input-${index}">
                    <div class="tag-chips">
                        <button class="tag-chip" onclick="addTag(${index}, '♡')">+ ♡</button>
                        <button class="tag-chip" onclick="addTag(${index}, '현대물AU')">+ 현대물AU</button>
                    </div>
                </div>
            </div>
            <input type="text" placeholder="프로필 이미지 URL" value="${escapeHTML(item.imgSrc)}" oninput="updateItem(${index}, 'imgSrc', this.value)">
        `;
        listContainer.appendChild(card);
    });
}

// unshift 를 사용하여 새 항목을 최상단(가장 최근)에 삽입
function addNewItem() {
    const today = getTodayData();
    chatItems.unshift({ 
        id: Date.now(), tags: '', hash: today.hash, imgSrc: 'https://i.ibb.co/VYrHdHd8/IMG-6825.jpg', 
        name: '', date: today.formatted, preview: '' 
    });
    renderEditor();
}

// 해시 ID 입력 시 (260628_2 등 대응) 정규식으로 앞 6자리만 파싱해 날짜 변환
function handleHashInput(index, value) {
    chatItems[index].hash = value;
    const match = value.match(/^(\d{6})/);
    if (match) {
        const yy = match[1].substring(0, 2);
        const mm = parseInt(match[1].substring(2, 4), 10);
        const dd = parseInt(match[1].substring(4, 6), 10);
        if (!isNaN(mm) && !isNaN(dd)) {
            chatItems[index].date = `20${yy}. ${mm}. ${dd}`;
            document.getElementById(`date-input-${index}`).value = chatItems[index].date;
        }
    }
}

function updateItem(index, key, value) { chatItems[index][key] = value; }
function deleteItem(index) { if(confirm('정말 삭제하시겠습니까?')) { chatItems.splice(index, 1); renderEditor(); } }
function moveItem(index, direction) {
    const targetIndex = index + direction;
    if(targetIndex < 0 || targetIndex >= chatItems.length) return;
    const temp = chatItems[index]; chatItems[index] = chatItems[targetIndex]; chatItems[targetIndex] = temp;
    renderEditor();
}

function addTag(index, tagString) {
    let currentTags = chatItems[index].tags.trim();
    if (!currentTags.includes(tagString)) {
        chatItems[index].tags = currentTags ? currentTags + ' ' + tagString : tagString;
        renderEditor(); 
    }
}

function generateHTML() {
    let finalCode = '';
    chatItems.forEach(item => {
        finalCode += `
<div class="chat-item" data-tags="${escapeAttr(item.tags)}" onclick="location.hash='${escapeAttr(item.hash)}'">
    <div class="chat-profile">
        <img src="${escapeAttr(item.imgSrc)}" alt="Profile">
    </div>
    <div class="chat-info">
        <div class="chat-name-row">
            <span class="chat-name">${escapeHTML(item.name)}</span>
            <span class="chat-date" style="display: flex; align-items: center;">
                ${escapeHTML(item.date)}
                <i class="ri-arrow-right-s-line" style="font-size: 18px; color: #c7c7cc; margin-left: 2px; margin-top: -1px; margin-right: -4px;"></i>
            </span>
        </div>
        <div class="chat-preview">${escapeHTML(item.preview)}</div>
    </div>
</div>\n`;
    });
    
    document.getElementById('export-area').value = finalCode;
}

// 팝업 제거, 버튼 색상 변경 및 텍스트 알림
function copyCode() {
    const exportArea = document.getElementById('export-area');
    if(!exportArea.value) return;

    exportArea.select();
    document.execCommand('copy');
    
    const copyBtn = document.getElementById('copy-btn');
    const originalText = copyBtn.innerHTML;
    const originalBg = copyBtn.style.background;
    
    copyBtn.innerHTML = '<i class="ri-check-line"></i> 복사 완료!';
    copyBtn.style.background = '#34c759'; 
    copyBtn.style.color = '#fff';
    
    setTimeout(() => {
        copyBtn.innerHTML = originalText;
        copyBtn.style.background = originalBg;
        copyBtn.style.color = 'var(--text)';
    }, 2000);
}

function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])); }
function escapeAttr(str) { return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

renderEditor();
</script>
</body>
</html>
