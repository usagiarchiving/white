    <script>
        function convertText() {
            let text = document.getElementById('inputText').value;
            const lines = text.split('\n');
            let result = [];

            // 1-1. 화면에서 반복 지시문 설정 가져오기 (띄어쓰기 완전 제거)
            const exclusionRaw = document.getElementById('exclusionInput').value.split('\n');
            const exactExclusions = exclusionRaw
                .map(s => s.replace(/\s+/g, '')) // 모든 공백 제거
                .filter(s => s.length > 0);

            // 1-2. 화면에서 대사 어미 설정 가져오기
            const endingRaw = document.getElementById('dialogueEndingInput').value.split(',');
            const endings = endingRaw
                .map(s => s.trim())
                .filter(s => s.length > 0)
                .join('|'); // 정규식 OR 조건으로 묶음

            // 1-3. 변환 토글 가져오기
            const toggleOoc = document.getElementById('toggleOoc').checked;
            const toggleEmojiPrefix = document.getElementById('toggleEmojiPrefix').checked;
            const applyV1 = document.getElementById('toggleV1').checked;
            const applyV2 = document.getElementById('toggleV2').checked;

            // 대사 판별 정규식 생성
            const dialogueRegex = new RegExp(`[?!~…]+$|(${endings})[. ]*$|["']$|[.…]{4,}`);
            
            // 상태창 이모지
            const statusEmojis = /^[* \t]*(🗓️|💍|📍|👕|👥️|💭|🔔|🚨|❤️‍🔥|✏️|🔫|💕|📰|💘)/;

            for (let line of lines) {
                let trimmed = line.trim();
                
                if (!trimmed) {
                    result.push('');
                    continue;
                }

                // 2. 고정 삭제 파트 추가 (턴 숫자, 특정 키워드, #, **)
                if (/\[턴\s*\d+\]/.test(trimmed)) continue;
                trimmed = trimmed.replace(/⟦OTAKU_TURN⟧/g, ''); 
                trimmed = trimmed.replace(/#/g, ''); 
                
                // 요구사항 3: ** 모두 삭제
                trimmed = trimmed.replace(/\*\*/g, ''); 
                trimmed = trimmed.trim();
                
                if (!trimmed) continue;

                // 반복 지시문 "띄어쓰기 무시하고" 일치할 때 통째로 스킵
                let normLine = trimmed.replace(/\s+/g, '');
                if (exactExclusions.includes(normLine)) {
                    continue; 
                }

                // 3. OOC 삭제 모드
                if (toggleOoc) {
                    // [OOC:내용] 형태 삭제 (대괄호 닫힐 때까지)
                    trimmed = trimmed.replace(/\[\*?(OOC|OCC).*?\]/gi, '');
                    // OOC:내용 형태 삭제 (줄바꿈 전까지 끝까지)
                    trimmed = trimmed.replace(/\*?(OOC|OCC).*$/gi, '');
                    trimmed = trimmed.trim();
                    if (!trimmed) continue;
                }

                // 4. 특정 명칭 삭제
                trimmed = trimmed.replace(/\[CHAR\]/gi, '');
                trimmed = trimmed.replace(/\[USER\]/gi, '');

                // 5. 이모티콘 앞 텍스트 삭제 모드
                if (toggleEmojiPrefix) {
                    const emojiMatch = trimmed.match(/[\p{Extended_Pictographic}🗓️💍📍👕👥️💭🔔🚨❤️‍🔥✏️🔫💕📰💘]/u);
                    // 이모티콘이 앞부분(20자 이내)에 존재할 경우 앞부분 삭제 (이름, 접두사 등)
                    if (emojiMatch && emojiMatch.index > 0 && emojiMatch.index <= 20) {
                        trimmed = trimmed.substring(emojiMatch.index).trim();
                        if (!trimmed) continue;
                    }
                }

                // 6. 포맷 변환 (버전 1, 버전 2)
                if (applyV1 || applyV2) {
                    // 상태창 줄 스킵 (서술 기호나 따옴표 씌우지 않음)
                    if (statusEmojis.test(trimmed) || /^(🗓️|💍|📍|👕|👥️|💭|🔔|🚨|❤️‍🔥|✏️|🔫|💕|📰|💘)/.test(trimmed)) {
                        result.push(trimmed);
                        continue;
                    }

                    // 요구사항 1: 큰따옴표 포함 여부 확인 (기호 정리 전에 확인)
                    let hasQuotes = /["“”]/.test(trimmed);

                    // 요구사항 4: 기호가 첫 번째로 나오는지 확인 (나레이션 강제 조건)
                    let isSymbolStart = /^[^\sa-zA-Z0-9가-힣ㄱ-ㅎㅏ-ㅣ"“'‘]/.test(trimmed);
                    
                    // 신규 요구사항: 숫자로 시작하는지 확인 (나레이션 강제 조건)
                    let isNumberStart = /^[0-9]/.test(trimmed);

                    // 기호 정리
                    if (applyV1 && !applyV2) {
                        // 역극 폼 단독 켜짐: 기존 기호 전부 제거
                        trimmed = trimmed.replace(/[*'\[\]\-]/g, '').trim();
                    } else if (applyV2) {
                        // 소설 폼 켜짐: * 만 삭제
                        trimmed = trimmed.replace(/[*]/g, '').trim();
                    }
                    
                    if (!trimmed) continue;

                    // 대사/서술 판별 로직 수정
                    let isDialogue = false;
                    
                    // 기호로 시작하지 않고, 숫자로 시작하지 않을 때만 대사 어미 판별 진행
                    if (!isSymbolStart && !isNumberStart) {
                        if (trimmed.length <= 5 || dialogueRegex.test(trimmed)) {
                            isDialogue = true;
                        }
                    }

                    if (isDialogue) {
                        // 대사인 경우: 기존 따옴표 삭제 후 새 따옴표 적용 (중복 방지)
                        trimmed = trimmed.replace(/^[“"']|[”"']$/g, '').trim();
                        result.push(`"${trimmed}"`);
                    } else {
                        // 서술(나레이션)인 경우
                        if (applyV1 && !applyV2) {
                            // 역극 폼 단독 적용
                            if (hasQuotes) {
                                // 큰따옴표가 포함된 문장은 대사가 섞인 것이므로 *를 씌우지 않음
                                result.push(trimmed);
                            } else {
                                // 쌍따옴표가 없는 순수 서술에만 양쪽 * 적용
                                result.push(`*${trimmed}*`);
                            }
                        } else {
                            // 소설 폼 켜짐: 서술은 기호 없이 그대로 출력
                            result.push(trimmed);
                        }
                    }
                } else {
                    // 포맷 체크박스가 모두 꺼진 경우 (원본 출력)
                    result.push(trimmed);
                }
            }

            // 빈 줄 깔끔하게 정리 (3줄 이상 빈 줄은 2줄로)
            let finalResult = result.join('\n').replace(/\n{3,}/g, '\n\n');
            document.getElementById('outputText').value = finalResult.trim();
        }

        // 팝업 없는 복사하기 기능!
        function copyResult() {
            let outputText = document.getElementById('outputText');
            let copyBtn = document.getElementById('copyBtn');

            if (!outputText.value) {
                copyBtn.innerText = "텍스트가 없어요 💦";
                setTimeout(() => {
                    copyBtn.innerText = "결과 복사하기 📋";
                }, 2000);
                return;
            }

            outputText.select();
            document.execCommand('copy');
            
            // 복사 성공 시 버튼 스타일 변경
            copyBtn.innerText = "복사 완료! ✨";
            copyBtn.style.backgroundColor = "#d4edda"; // 연한 초록색 배경
            copyBtn.style.color = "#155724"; // 진한 초록색 글씨
            copyBtn.style.borderColor = "#c3e6cb";

            // 2초 뒤에 원래 버튼으로 돌아오기
            setTimeout(() => {
                copyBtn.innerText = "결과 복사하기 📋";
                copyBtn.style.backgroundColor = "#f0f0f0";
                copyBtn.style.color = "#555";
                copyBtn.style.borderColor = "#ddd";
            }, 2000);
        }

        // --- 💾 로컬 스토리지 자동 저장/불러오기 기능 ---
        window.onload = function() {
            // 1. 저장된 지시문 불러오기
            const savedExclusions = localStorage.getItem('savedExclusions');
            if (savedExclusions !== null) {
                document.getElementById('exclusionInput').value = savedExclusions;
            }

            // 2. 저장된 대사 어미 불러오기
            const savedEndings = localStorage.getItem('savedEndings');
            if (savedEndings !== null) {
                document.getElementById('dialogueEndingInput').value = savedEndings;
            }

            // 3. 저장된 토글 설정 불러오기
            const savedOoc = localStorage.getItem('toggleOoc');
            if (savedOoc !== null) document.getElementById('toggleOoc').checked = (savedOoc === 'true');
            
            const savedEmoji = localStorage.getItem('toggleEmojiPrefix');
            if (savedEmoji !== null) document.getElementById('toggleEmojiPrefix').checked = (savedEmoji === 'true');
            
            const savedV1 = localStorage.getItem('toggleV1');
            if (savedV1 !== null) document.getElementById('toggleV1').checked = (savedV1 === 'true');
            
            const savedV2 = localStorage.getItem('toggleV2');
            if (savedV2 !== null) document.getElementById('toggleV2').checked = (savedV2 === 'true');
        };

        // 입력 및 변경할 때마다 실시간으로 로컬 스토리지에 저장
        document.getElementById('exclusionInput').addEventListener('input', function() {
            localStorage.setItem('savedExclusions', this.value);
        });

        document.getElementById('dialogueEndingInput').addEventListener('input', function() {
            localStorage.setItem('savedEndings', this.value);
        });

        ['toggleOoc', 'toggleEmojiPrefix', 'toggleV1', 'toggleV2'].forEach(id => {
            document.getElementById(id).addEventListener('change', function() {
                localStorage.setItem(id, this.checked);
            });
        });
    </script>
</body>
</html>
