<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 변환기</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: #f4f4f9;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 50px; margin: 0; min-height: 100vh;
            /* [가독성] 줄간격 및 자간 추가 */
            line-height: 1.6; letter-spacing: -0.02em; 
        }
        .container {
            background-color: white; padding: 2rem; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 600px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        textarea { 
            width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; resize: vertical; 
            /* [가독성] 줄간격 및 폰트 사이즈 조정 */
            line-height: 1.6; font-size: 15px; 
        }
        .btn-group { display: flex; gap: 10px; margin: 1.5rem 0; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        #convertBtn { background-color: #4a90e2; }
        #copyBtn { background-color: #2ecc71; }
        .breadcrumb { margin-bottom: 20px; align-self: flex-start; margin-left: max(5%, calc(50% - 300px)); }
        .breadcrumb a { text-decoration: none; color: #666; font-size: 14px; }

        /* [모바일 반응형] 992px 이하에서 버튼 1단으로 정렬 */
        @media (max-width: 992px) {
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="breadcrumb">
        <a href="index.html">메인</a> &gt; 
        <a href="category.html">카테고리</a> &gt; 
        <b>텍스트 변환기</b>
    </div>

    <div class="container">
        <h2>텍스트 클리너 (' 한 번 ' 제거)</h2>
        
        <label style="font-weight:bold; color:#555;">
            입력 <span id="countDisplay" style="font-weight:normal; font-size:14px; color:#4a90e2; margin-left:8px;"></span>
        </label>
        <textarea id="inputText" placeholder="예: 그녀는 한 번 그를 보았다." oninput="updateCount()"></textarea>

        <div class="btn-group">
            <button id="convertBtn" onclick="convertText()">1. 변환하기</button>
        </div>

        <label style="font-weight:bold; color:#555;">결과</label>
        <textarea id="outputText" readonly placeholder="결과가 여기에 나옵니다."></textarea>

        <div class="btn-group">
            <button id="copyBtn" onclick="copyText()">2. 전체 복사</button>
        </div>
    </div>

<script>
    // 1. 실시간 개수 카운팅 기능 (새로 추가)
    function updateCount() {
        const input = document.getElementById('inputText').value;
        const matches = input.match(/ 한 번 /g);
        const count = matches ? matches.length : 0;
        
        // 개수가 0개일 때는 비워두고, 1개 이상일 때만 표시하도록 처리
        if (count > 0) {
            document.getElementById('countDisplay').innerText = `(현재 개수: ${count}개)`;
        } else {
            document.getElementById('countDisplay').innerText = '';
        }
    }

    // 2. 텍스트 변환
    function convertText() {
        const input = document.getElementById('inputText').value;
        // 앞뒤 띄어쓰기가 포함된 " 한 번 "을 " " (띄어쓰기 하나)로 교체합니다.
        const result = input.replace(/ 한 번 /g, ' ');
        document.getElementById('outputText').value = result;
    }

    // 3. 복사 기능
    function copyText() {
        const outputText = document.getElementById('outputText');
        // 복사할 내용이 없을 때 뜨던 팝업 제거
        if (!outputText.value) { return; } 
        outputText.select();
        outputText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(outputText.value).then(() => {
            // 복사 완료 시 닫아야 하는 팝업(alert) 제거 완료
        });
    }
</script>

</body>
</html>
