<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타임라인 변환기</title>
  <style>
    /* =========================================
       변환기 웹사이트 자체의 모던 UI 스타일
       ========================================= */
    :root {
      --bg-main: #f2f3f5;
      --bg-panel: #ffffff;
      --text-main: #202124;
      --text-muted: #5f6368;
      --border-color: #dadce0;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --danger: #ea4335;
      --success: #34a853;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 30px;
      line-height: 1.5;
    }

    .app-header {
      max-width: 1400px;
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2px solid var(--text-main);
      padding-bottom: 15px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 1.8em;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .workspace {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .panel {
      background: var(--bg-panel);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 800px; 
    }

    .panel-header {
      padding: 20px 25px;
      border-bottom: 1px solid var(--border-color);
      background: #fafafa;
      border-radius: var(--radius) var(--radius) 0 0;
      font-weight: 700;
      font-size: 1.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      background: #fff;
    }

    .block-item {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 20px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: border-color 0.2s;
    }

    .block-item:focus-within {
      border-color: var(--primary);
    }

    .block-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: #f8f9fa;
      border-bottom: 1px solid var(--border-color);
      border-radius: 8px 8px 0 0;
    }

    .block-controls select {
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 0.9em;
      outline: none;
      font-weight: 600;
    }
    .block-controls select.theme-base { color: #555; }
    /* 웹사이트 자체의 민트 선택 텍스트 색상도 새 컬러로 변경 */
    .block-controls select.theme-mint { color: #b4d9c4; }
    .block-controls select.theme-pink { color: #E07A93; }

    .block-actions button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .block-actions button:hover {
      background: #e8eaed;
      color: var(--text-main);
    }
    .block-actions button.btn-del:hover {
      color: var(--danger);
      background: #fce8e6;
    }

    .block-item textarea {
      width: 100%;
      min-height: 250px;
      border: none;
      padding: 15px;
      box-sizing: border-box;
      resize: vertical;
      font-family: inherit;
      font-size: 0.95em;
      line-height: 1.6;
      outline: none;
      color: #333;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-add {
      background: #f1f3f4;
      color: var(--text-main);
      width: 100%;
      border: 1px dashed #ccc;
      padding: 15px;
    }
    .btn-add:hover { background: #e8eaed; }
    
    .btn-primary { background: var(--text-main); color: #fff; width: 100%; padding: 15px;}
    .btn-primary:hover { background: #000; }
    .btn-success { background: var(--success) !important; color: #fff !important; }

    .output-code {
      width: 100%;
      height: 150px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 15px;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.85em;
      margin-bottom: 15px;
      resize: vertical;
    }

    #previewArea {
      border: 1px dashed var(--border-color);
      border-radius: 8px;
      background: #fcfcfc;
      padding: 20px;
      margin-bottom: 15px;
      min-height: 300px;
    }

    /* 미리보기 창 안에서는 애니메이션을 무시하고 대사가 무조건 100% 보이도록 강제 처리 */
    #previewArea .scroll-msg-box {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    .list-panel {
      max-width: 1400px;
      margin: 30px auto 0 auto;
      background: var(--bg-panel);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      border: 1px solid var(--border-color);
      padding: 25px;
    }
    
    .list-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .session-list { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
    .session-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 15px; border-bottom: 1px solid #eee; transition: background 0.2s;
    }
    .session-item:hover { background: #f8f9fa; }
    .session-item.active { border-left: 4px solid var(--text-main); background: #f8f9fa; }
    
    .session-title-input {
      flex: 1; border: 1px solid transparent; background: transparent;
      font-size: 1em; font-weight: 600; padding: 5px; outline: none;
    }
    .session-title-input:focus { border: 1px solid #ccc; background: #fff; border-radius: 4px; }
    
    .btn-outline { background: #fff; border: 1px solid #ccc; color: #333; padding: 6px 12px; border-radius: 4px; font-size: 0.85em;}
    .btn-outline:hover { background: #f1f3f4; }

    @media (max-width: 992px) {
      .workspace { grid-template-columns: 1fr; }
      .panel { height: auto; min-height: 600px; }
    }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>⏳ 타임라인 변환기</h1>
  </div>

  <div class="workspace">
    <div class="panel">
      <div class="panel-header">
        <span>📝 블록 편집창</span>
        <span style="font-size: 0.8em; color: #888; font-weight: normal;">(실시간 동기화)</span>
      </div>
      <div class="panel-content" id="blockContainer">
      </div>
      <div style="padding: 15px; border-top: 1px solid var(--border-color); background: #fafafa; border-radius: 0 0 var(--radius) var(--radius);">
        <button class="btn btn-add" onclick="addBlock()">➕ 새로운 타임라인 블록 추가</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">🎨 미리보기 및 코드</div>
      <div class="panel-content">
        <div id="previewArea"></div>
        <textarea id="outputCode" class="output-code" readonly></textarea>
        <button id="copyBtn" class="btn btn-primary" onclick="copyHTML()">📋 HTML (티스토리용) 복사하기</button>
      </div>
    </div>
  </div>

  <div class="list-panel">
    <div class="list-header">
      <h2 style="margin: 0; font-size: 1.2em;">📁 자동 저장된 대화 목록</h2>
      <button class="btn btn-outline" onclick="createNewDocument()">+ 새 문서 만들기</button>
    </div>
    <ul id="sessionList" class="session-list"></ul>
  </div>

  <script>
    // ==========================================
    // 로컬 스토리지 & UI 상태 관리
    // ==========================================
    const STORAGE_KEY = 'timeline_sessions_v23'; 
    let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentDocId = Date.now();
    let currentBlocks = [];

    window.onload = () => { createNewDocument(); };

    function autoSave() {
      const blockEls = document.querySelectorAll('.block-item');
      currentBlocks = Array.from(blockEls).map(el => {
        return {
          id: el.dataset.id,
          theme: el.querySelector('.theme-select').value,
          text: el.querySelector('.block-textarea').value
        };
      });

      const isEmpty = currentBlocks.every(b => b.text.trim() === '');

      if (isEmpty) {
        sessions = sessions.filter(s => s.id !== currentDocId);
      } else {
        const docIndex = sessions.findIndex(s => s.id === currentDocId);
        if (docIndex !== -1) {
          sessions[docIndex].blocks = currentBlocks;
        } else {
          const title = extractTitle(currentBlocks[0].text);
          sessions.unshift({ id: currentDocId, title: title, blocks: currentBlocks });
        }
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
      renderSessionList();
      generateFinalHTML();
    }

    function extractTitle(text) {
      const match = text.match(/🗓️\s*달력\s*\|(.*)/);
      return (match && match[1].trim() !== '') ? match[1].trim() : '새로운 타임라인 (' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ')';
    }

    const blockContainer = document.getElementById('blockContainer');

    function createNewDocument() {
      currentDocId = Date.now();
      currentBlocks = [{ id: Date.now().toString(), theme: 'base', text: '' }];
      renderBlocks();
      autoSave();
    }

    function renderBlocks() {
      blockContainer.innerHTML = '';
      currentBlocks.forEach((block, index) => {
        const div = document.createElement('div');
        div.className = 'block-item';
        div.dataset.id = block.id;
        
        let themeClass = 'theme-base';
        if(block.theme === 'mint') themeClass = 'theme-mint';
        if(block.theme === 'pink') themeClass = 'theme-pink';

        div.innerHTML = `
          <div class="block-toolbar">
            <div class="block-controls">
              <select class="theme-select ${themeClass}" onchange="changeTheme(this, '${block.id}')">
                <option value="base" ${block.theme === 'base' ? 'selected' : ''}>기본 버전 (!)</option>
                <option value="mint" ${block.theme === 'mint' ? 'selected' : ''}>민트 버전</option>
                <option value="pink" ${block.theme === 'pink' ? 'selected' : ''}>핑크 버전</option>
              </select>
            </div>
            <div class="block-actions">
              <button onclick="moveBlock(${index}, -1)" title="위로">▲</button>
              <button onclick="moveBlock(${index}, 1)" title="아래로">▼</button>
              <button class="btn-del" onclick="deleteBlock('${block.id}')" title="삭제">🗑️</button>
            </div>
          </div>
          <textarea class="block-textarea" placeholder="여기에 대화 양식을 입력하세요..." oninput="autoSave()">${block.text}</textarea>
        `;
        blockContainer.appendChild(div);
      });
      generateFinalHTML();
    }

    function addBlock() {
      currentBlocks.push({ id: Date.now().toString(), theme: 'base', text: '' });
      renderBlocks();
      autoSave();
      blockContainer.scrollTop = blockContainer.scrollHeight;
    }

    function deleteBlock(id) {
      if(currentBlocks.length <= 1) { currentBlocks[0].text = ''; } 
      else { currentBlocks = currentBlocks.filter(b => b.id !== id); }
      renderBlocks();
      autoSave();
    }

    function moveBlock(index, direction) {
      if (index + direction < 0 || index + direction >= currentBlocks.length) return;
      const temp = currentBlocks[index];
      currentBlocks[index] = currentBlocks[index + direction];
      currentBlocks[index + direction] = temp;
      renderBlocks();
      autoSave();
    }

    function changeTheme(selectEl, id) {
      selectEl.className = 'theme-select theme-' + selectEl.value;
      const block = currentBlocks.find(b => b.id === id);
      if(block) block.theme = selectEl.value;
      autoSave();
    }

    function renderSessionList() {
      const listEl = document.getElementById('sessionList');
      if (sessions.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; padding: 20px; color:#888;">저장된 타임라인이 없습니다.</div>';
        return;
      }
      listEl.innerHTML = '';
      sessions.forEach(session => {
        const li = document.createElement('li');
        li.className = 'session-item' + (session.id === currentDocId ? ' active' : '');
        li.innerHTML = `
          <input type="text" class="session-title-input" value="${session.title}" onchange="updateTitle(${session.id}, this.value)">
          <div style="display:flex; gap:5px;">
            <button class="btn-outline" onclick="loadDocument(${session.id})">열기</button>
            <button class="btn-outline" style="color:var(--danger);" onclick="deleteDocument(${session.id})">삭제</button>
          </div>
        `;
        listEl.appendChild(li);
      });
    }

    function loadDocument(id) {
      const doc = sessions.find(s => s.id === id);
      if (doc) {
        currentDocId = doc.id;
        currentBlocks = JSON.parse(JSON.stringify(doc.blocks)); 
        renderBlocks();
        renderSessionList();
      }
    }

    function deleteDocument(id) {
      sessions = sessions.filter(s => s.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
      if (id === currentDocId) createNewDocument();
      else renderSessionList();
    }

    function updateTitle(id, newTitle) {
      const doc = sessions.find(s => s.id === id);
      if (doc) {
        doc.title = newTitle.trim() === '' ? '제목 없음' : newTitle;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
      }
    }

    function copyHTML() {
      const outputArea = document.getElementById('outputCode');
      const copyBtn = document.getElementById('copyBtn');
      if(outputArea.value.trim() === '') return;
      
      outputArea.select();
      document.execCommand('copy');
      
      const originalText = copyBtn.innerText;
      copyBtn.innerText = '✅ 복사 완료!';
      copyBtn.classList.add('btn-success');
      setTimeout(() => {
        copyBtn.innerText = originalText;
        copyBtn.classList.remove('btn-success');
      }, 2000);
    }

    // ==========================================
    // ⭐️ 진화된 HTML 출력 파싱 엔진 ⭐️
    // ==========================================
    
    const dialogueRegex = /^[-*▪️▫️\s]*\[?\s*(뱅|하시온|SION\s*HA|NPC|유이|YUI|PC)\s*\]?[-*\s]*[:：]?\s*/i;

    const cleanStr = (str) => {
        if (!str) return '';
        // 큰따옴표 유지
        return str.replace(/NPC/g, '뱅').replace(/PC/g, '유이');
    };

    const getLine = (textSegment, markers) => {
      let safeMarkers = markers.map(m => m.replace(/\s+/g, '\\s*'));
      let regexStr = '^\\s*(?:' + safeMarkers.join('|') + ')\\s*[:|]?\\s*(.*)';
      let regex = new RegExp(regexStr, 'mi');
      let match = textSegment.match(regex);
      if(!match) return '';
      return cleanStr(match[1].trim());
    };

    const getBlock = (textSegment, startMarkers, endMarkers) => {
      let safeStart = startMarkers.map(m => m.replace(/\s+/g, '\\s*'));
      let safeEnd = endMarkers.map(m => m.replace(/\s+/g, '\\s*'));
      
      let startStr = '^\\s*(?:' + safeStart.join('|') + ')';
      let endStr = safeEnd.length > 0 ? '(?=^\\s*(?:' + safeEnd.join('|') + '))' : '$';
      let regex = new RegExp(startStr + '(?:\\s*\\([^)]*\\))?\\s*:?\\s*([\\s\\S]*?)' + endStr, 'im');
      let match = textSegment.match(regex);
      if(!match) return '';
      return cleanStr(match[1].trim());
    };

    const extractBubbles = (textStr, speaker, tone = '') => {
        let matches = [...textStr.matchAll(/["“](.*?)["”]/g)];
        if (matches.length > 0) {
            return matches.map((m, idx) => ({
                speaker: speaker,
                text: m[1].trim(),
                tone: (idx === matches.length - 1) ? tone : ''
            }));
        } else {
            let fallbackText = textStr.replace(/["“”]/g, '').trim();
            if(!fallbackText) return [];
            return [{ speaker: speaker, text: fallbackText, tone: tone }];
        }
    };

    function buildChatHTML(dialogues, forceAvatar = false) {
      if (!dialogues || dialogues.length === 0) return '';
      
      let html = '<div class="tistory-post-wrapper chat-section" style="display: flex; flex-direction: column; width: 100%;">';
      let prevSpeaker = null;

      dialogues.forEach(d => {
        let isConsecutive = forceAvatar ? false : (prevSpeaker === d.speaker);
        let marginTop = (prevSpeaker === null) ? '0' : (isConsecutive ? '0.3em' : '1.2em');
        let isYui = (d.speaker === 'yui');

        let flexDir = 'row';
        let alignItem = 'flex-start';
        let bgColor = isYui ? '#FFF6FA' : '#F2FCF7';
        let borderColor = isYui ? '#FFF6FA' : '#F2FCF7';
        let profilePic = isYui ? 'https://i.ibb.co/Rkb6NzhF/IMG-0550.jpg' : 'https://i.ibb.co/VYrHdHd8/IMG-6825.jpg';

        let profileHTML = isConsecutive
          ? `<div style="flex-shrink: 0; width: 2em; height: 0;"></div>`
          : `<div style="flex-shrink: 0; width: 2em; height: 2em; border-radius: 50%; overflow: hidden; box-shadow: 0 0.1em 0.2em rgba(0,0,0,0.1); border: 0.1em solid ${borderColor}; box-sizing: border-box;"><img src="${profilePic}" style="width: 100%; height: 100%; object-fit: cover; display: block;"></div>`;

        let toneHTML = d.tone ? `<div style="font-size: 0.75em; color: #888; margin-top: 0.4em; padding: 0 0.3em; line-height: 1.3; font-weight: 400;">(${d.tone})</div>` : '';

        html += `
        <div class="scroll-msg-box" style="width: 100%; margin: ${marginTop} 0 0 0; padding: 0; display: flex; align-items: flex-start; justify-content: flex-start; flex-direction: ${flexDir}; gap: 0.5em; box-sizing: border-box;">
          ${profileHTML}
          <div style="display: flex; flex-direction: column; align-items: ${alignItem}; max-width: 80%;">
            <div style="background-color: ${bgColor}; color: #333; padding: 0.5em 0.8em; border-radius: 1em; font-size: 0.85em; line-height: 1.5; letter-spacing: -0.02em; box-shadow: 0 0.05em 0.1em rgba(0,0,0,0.05); width: fit-content; word-break: keep-all; overflow-wrap: break-word;">
              <div>${d.text}</div>
            </div>
            ${toneHTML}
          </div>
        </div>
        `;
        prevSpeaker = d.speaker;
      });
      html += '</div>';
      return html;
    }

    function generateFinalHTML() {
      const hasContent = currentBlocks.some(b => b.text.trim() !== '');
      if (!hasContent) {
        document.getElementById('previewArea').innerHTML = '<div style="text-align:center; color:#888; margin-top:50px;">텍스트를 입력하면 타임라인이 생성됩니다.</div>';
        document.getElementById('outputCode').value = '';
        return;
      }

      let finalHTML = `<style>
        .extracted-timeline-widget {
            font-size: 16px; 
            background: transparent; border-radius: 0; padding: 0.5em; 
            box-shadow: none; width: 100%;
            display: flex; flex-direction: column; color: inherit;
            max-width: 50em; margin: 2em auto; line-height: 1.5;
            box-sizing: border-box;
        }
        .extracted-timeline-widget * { font-family: inherit; }
        
        .widget-title-main {
            font-size: 0.75em; font-weight: 700; color: #888; margin-bottom: 0.75em; 
            text-transform: uppercase; letter-spacing: 0.08em; 
            border-bottom: 0.06em solid #eee; padding-bottom: 0.5em; 
        }
        .tl-container { padding-left: 0.6em; margin-top: 0.3em; width: 100%; box-sizing: border-box; }
        
        .tl-entry {
            position: relative; padding-bottom: 2em; 
            border-left: 0.125em solid #e0e0e0; padding-left: 1.5em; 
            width: 100%; box-sizing: border-box;
        }

        .tl-node {
            position: absolute; left: -0.875em; top: 0;
            width: 1.6em; height: 1.6em; border-radius: 50%; background: #fff;
            border: 0.15em solid #999; 
            box-shadow: 0 0 0 0.3em #fff; display: flex; align-items: center; justify-content: center;
            font-size: 0.75em; font-weight: 700; line-height: 1; padding-top: 0.1em; z-index: 10;
        }

        .tl-content-box {
            background: transparent; border: none; border-radius: 0; 
            padding: 0 0 1.5em 0; box-shadow: none; width: 100%; box-sizing: border-box;
        }
        .tl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1em; }
        .tl-date {
            background: #999; color: #fff; padding: 0.3em 0.8em; border-radius: 1em; 
            font-size: 0.75em; font-weight: 700; letter-spacing: 0.05em; 
        }
        .tl-dday { font-size: 0.85em; font-weight: 400; letter-spacing: 0.05em; }

        .top-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8em; margin-bottom: 1.2em; width: 100%; box-sizing: border-box; }
        .info-card { background: #fff; border: 0.06em solid #eaeaea; padding: 0.5em 0.6em; border-radius: 0.4em; }
        .info-card-title { font-size: 0.7em; color: #888; margin-bottom: 0.3em; font-weight: 700; }
        .info-card-content { font-size: 0.85em; color: #444; line-height: 1.4; }

        .gauge-section { margin-bottom: 1.5em; width: 100%; box-sizing: border-box; }
        .gauge-text-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.85em; margin-bottom: 0.4em; }
        .gauge-label { font-weight: 600; color: #555; }
        .gauge-value { font-weight: 600; text-align: right; }
        .gauge-bar-bg { width: 100%; height: 0.3em; background: #f0f0f0; border-radius: 0.15em; overflow: hidden; }

        }

        const observer = new IntersectionObserver(function(entries, observer) { 
            let added = false;
            entries.forEach(function(entry) { 
                if (entry.isIntersecting) { 
                    queue.push(entry.target); 
                    observer.unobserve(entry.target); 
                    added = true;
                } 
            }); 
            if (added && !isProcessing) {
                processQueue();
            }
        }, { threshold: 0.1 }); 
        
        const msgBoxes = document.querySelectorAll('.scroll-msg-box'); 
        msgBoxes.forEach(function(box) { observer.observe(box); }); 
    });
    <\/script>`;

      document.getElementById('previewArea').innerHTML = finalHTML;
      document.getElementById('outputCode').value = finalHTML;
    }
  </script>
</body>
