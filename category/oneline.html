<!-- 파일명: category/oneline.html -->
<style>
    /* 1. 모바일 맞춤 레이아웃 */
    .oneline-read-mode {
        display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
    }
    @media (max-width: 768px) {
        .oneline-read-mode { flex-direction: column-reverse; gap: 4px; }
        .oneline-read-mode .feed-text { width: 100%; display: block; }
        .oneline-read-mode .feed-time { width: 100%; padding-bottom: 4px; } 
    }

    /* 2. 검색창 우측 상단 */
    .oneline-wrapper { position: relative; padding-top: 25px; }
    .search-wrapper { position: absolute; top: 0; right: 0; display: flex; align-items: center; justify-content: flex-end; }
    #oneline-search {
        background: transparent; border: none; border-bottom: 1px solid transparent; 
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35; 
        cursor: pointer; font-size: 15px; transition: opacity 0.3s ease; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    /* ==========================================================================
       [추가] 드래그 서식 툴바 (노션 스타일) 및 에디터 전용 속성
       ========================================================================== */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999;
        align-items: center; gap: 4px; 
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        user-select: none; 
    }
    .format-toolbar button {
        background: none; border: none; color: var(--main-color); font-size: 14px;
        cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s;
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    
    .color-picker-label {
        display: flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; cursor: pointer; border-radius: 4px; transition: 0.2s;
        position: relative; overflow: hidden; margin: 0;
    }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker {
        position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        top: 0; left: 0; border: none; padding: 0;
    }

    .color-btn { 
        font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; 
        border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px;
    }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }

    /* contenteditable div 전용 Placeholder */
    [contenteditable]:empty::before {
        content: attr(placeholder);
        color: var(--sub-color);
        opacity: 0.8;
        pointer-events: none;
    }
</style>

<!-- 글자 드래그 시 나타나는 플로팅 툴바 -->
<div id="format-toolbar" class="format-toolbar">
    <button onmousedown="event.preventDefault(); formatText('bold')" title="굵게"><i class="xi-bold"></i></button>
    <button onmousedown="event.preventDefault(); formatText('italic')" title="기울임"><i class="xi-italic"></i></button>
    <button onmousedown="event.preventDefault(); formatText('underline')" title="밑줄"><i class="xi-underline"></i></button>
    <button onmousedown="event.preventDefault(); formatText('strikeThrough')" title="취소선"><i class="xi-strikethrough"></i></button>
    
    <div class="divider"></div>
    
    <label class="color-picker-label" title="텍스트 색상" onmousedown="saveSelection()">
        <i class="xi-font"></i>
        <input type="color" class="native-color-picker" oninput="applyCustomColor('foreColor', this.value)" onchange="applyCustomColor('foreColor', this.value)">
    </label>
    <label class="color-picker-label" title="배경 형광펜 색상" onmousedown="saveSelection()">
        <i class="xi-palette"></i>
        <input type="color" class="native-color-picker" oninput="applyCustomColor('backColor', this.value)" onchange="applyCustomColor('backColor', this.value)">
    </label>
    
    <div class="divider"></div>
    
    <button onmousedown="event.preventDefault(); applyColor('#0E865E', '#E1F9F1')" title="민트 펜" class="color-btn btn-mint">M</button>
    <button onmousedown="event.preventDefault(); applyColor('#D04978', '#FDEDF4')" title="핑크 펜" class="color-btn btn-pink">P</button>
</div>

<div class="oneline-wrapper">
    
    <div class="search-wrapper">
        <input type="text" id="oneline-search" autocomplete="off" placeholder="검색">
        <i class="xi-search" id="search-icon" title="검색 열기"></i>
    </div>

    <div class="input-container" style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 1.5px solid var(--divider-bg); padding-bottom: 8px; transition: border-color 0.3s ease;">
        <div id="oneline-input" contenteditable="true" spellcheck="false" placeholder="♡" 
               style="flex: 1; background: transparent; border: none; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px; outline: none; padding: 4px 0; word-break: break-all;"></div>
        
        <button onclick="addOneLinePost()" style="background: none; border: none; color: var(--point-color); font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; white-space: nowrap; transition: opacity 0.2s ease;">
            전송
        </button>
    </div>
    
    <div class="feed-container" id="oneline-feed"></div>
</div>

<script>
    /** ==========================================================================
     * [독립형 아키텍처] Supabase 및 툴바 로직 
     * ========================================================================== */
    const SUPABASE_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* --- [에디터 & 툴바 로직] --- */
    let savedSelectionRange = null;

    window.saveSelection = function() {
        const selection = window.getSelection();
        if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0);
    };

    window.applyCustomColor = function(command, color) {
        if (savedSelectionRange) {
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(savedSelectionRange);
        }
        document.execCommand(command, false, color);
        checkSelection();
    };

    function checkSelection() {
        setTimeout(() => {
            const selection = window.getSelection();
            const toolbar = document.getElementById('format-toolbar');
            
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                let node = selection.anchorNode;
                let isInsideEditor = false;
                
                while (node) {
                    if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') {
                        isInsideEditor = true; break;
                    }
                    node = node.parentNode;
                }
                
                if (isInsideEditor) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    
                    let top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    let left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8;
                    if (left < 10) left = 10;
                    
                    toolbar.style.top = top + 'px';
                    toolbar.style.left = left + 'px';
                } else {
                    toolbar.style.display = 'none';
                }
            } else {
                toolbar.style.display = 'none';
            }
        }, 100);
    }

    document.addEventListener('selectionchange', checkSelection);
    document.addEventListener('mouseup', checkSelection);
    document.addEventListener('touchend', checkSelection);

    window.formatText = function(command, value = null) {
        document.execCommand(command, false, value);
        checkSelection();
    };

    window.applyColor = function(textColor, bgColor) {
        document.execCommand('foreColor', false, textColor);
        document.execCommand('backColor', false, bgColor);
        checkSelection();
    };

    /* --- [UI 상호작용 및 기존 로직] --- */

    $('#oneline-input').on('focus', function() {
        $('.input-container').css('border-color', 'var(--point-color)');
    }).on('blur', function() {
        $('.input-container').css('border-color', 'var(--divider-bg)');
    });

    $('#oneline-input').on('keypress', function(e) {
        if (e.which === 13) { 
            e.preventDefault(); 
            addOneLinePost(); 
        }
    });

    $('#search-icon').click(function() {
        $('#oneline-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });

    $('#oneline-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });

    $('#oneline-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            const textContent = $(this).find('.feed-text').text().toLowerCase();
            const timeContent = $(this).find('.feed-time').text().toLowerCase();
            if ((textContent + " " + timeContent).includes(keyword)) {
                $(this).show();
            } else {
                $(this).hide();
            }
        });
    });

    async function loadOneLinePosts() {
        const feedContainer = $('#oneline-feed');
        feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:12px; padding:30px 0; font-family:\'Noto Serif KR\', serif; opacity:0.6;">종이에 글을 찍어내는 중입니다...</p>');

        try {
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('category', 'oneline')
                .order('created_at', { ascending: false }); 

            if (error) throw error;
            feedContainer.empty();

            if (data.length === 0) {
                feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:12px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">아직 남겨진 생각의 조각이 없습니다.</p>');
                return;
            }

            data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            data.forEach(post => {
                const dateObj = new Date(post.created_at);
                const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const dayStr = days[dateObj.getDay()];
                const hh = String(dateObj.getHours()).padStart(2, '0');
                const min = String(dateObj.getMinutes()).padStart(2, '0');

                const editTimeString = `${yyyy}.${mm}.${dd} ${hh}:${min}`;
                
                const displayTimeHTML = `
                    <span style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                        <span style="font-size: 11px;">${yyyy}년 ${mm}월 ${dd}일 ${dayStr}</span>
                        <span style="font-size: 11px; color: var(--point-color); margin-left: 15px;">${hh}:${min}</span>
                    </span>
                `;

                const postHtml = `
                    <div class="feed-item fade-in-element" id="post-${post.id}" style="padding: 18px 0; border-bottom: 1px solid var(--divider-bg); display: flex; flex-direction: column; gap: 8px;">
                        
                        <div class="read-mode oneline-read-mode">
                            <span class="feed-text" style="color: var(--main-color); font-family: 'Noto Serif KR', serif; line-height: 1.7; word-break: keep-all; font-size: 12px; flex: 1;">${post.content}</span>
                            <span class="feed-time" onclick="toggleAdminMenu(${post.id})" title="클릭하여 글 관리" style="font-size: 11px; color: var(--sub-color); font-family: 'Noto Serif KR', serif; opacity: 0.8; white-space: nowrap; padding-top: 2px; cursor: pointer;">${displayTimeHTML}</span>
                        </div>
                        
                        <div class="edit-mode" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
                            <div id="edit-content-${post.id}" contenteditable="true" spellcheck="false" onkeypress="if(event.keyCode===13){ event.preventDefault(); saveEdit(${post.id}); }" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px; padding: 4px 0; outline: none;">${post.content}</div>
                            <input type="text" id="edit-time-${post.id}" value="${editTimeString}" onkeypress="if(event.keyCode===13) saveEdit(${post.id})" style="width: 130px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none;">
                        </div>
                        
                        <div class="admin-menu" id="admin-menu-${post.id}" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                            <button onclick="startEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">수정</button>
                            <button onclick="deleteOneLinePost(${post.id})" style="background:none; border:none; color:#ff3b30; font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">삭제</button>
                        </div>

                        <div class="edit-actions" id="edit-actions-${post.id}" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                            <button onclick="saveEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                            <button onclick="cancelEdit(${post.id})" style="background:none; border:none; color:var(--sub-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });

        } catch (error) {
            feedContainer.html('<p style="text-align:center; color:#ff3b30; font-size:12px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">기록을 불러오지 못했습니다.</p>');
        }
    }

    function toggleAdminMenu(id) {
        if ($(`#post-${id} .edit-mode`).is(':visible')) return;
        $(`#admin-menu-${id}`).slideToggle(150).css('display', 'flex');
    }

    function startEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.read-mode').hide();
        postEl.find('.admin-menu').hide();
        postEl.find('.edit-mode').fadeIn(200).css('display', 'flex');
        postEl.find('.edit-actions').fadeIn(200).css('display', 'flex');
        postEl.find(`#edit-content-${id}`).focus();
    }

    function cancelEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.edit-mode').hide();
        postEl.find('.edit-actions').hide();
        postEl.find('.read-mode').fadeIn(200).css('display', 'flex');
    }

    async function saveEdit(id) {
        const newContent = $(`#edit-content-${id}`).html().trim();
        const newTimeStr = $(`#edit-time-${id}`).val().trim();

        if (!newContent || newContent === '<br>') {
            alert("사유의 파편이 비어있습니다. 문장을 적어주세요.");
            $(`#edit-content-${id}`).focus();
            return;
        }

        try {
            let finalTimeISO;
            // [버그 수정 1] 사용자가 입력한 날짜를 한국 시간 기준으로 파싱하여 Z(영국시간) 강제 변환 막기
            const timeMatch = newTimeStr.match(/(\d{4})\.(\d{2})\.(\d{2})\s+(\d{2}):(\d{2})/);
            
            if (timeMatch) {
                const year = parseInt(timeMatch[1], 10);
                const month = parseInt(timeMatch[2], 10) - 1;
                const day = parseInt(timeMatch[3], 10);
                const hour = parseInt(timeMatch[4], 10);
                const min = parseInt(timeMatch[5], 10);
                
                const localDate = new Date(year, month, day, hour, min);
                const offset = localDate.getTimezoneOffset() * 60000;
                // 끝에 Z를 떼고 순수 로컬 시간 텍스트로 보존
                finalTimeISO = new Date(localDate.getTime() - offset).toISOString().slice(0, -1);
            } else {
                // 완전히 잘못 썼을 경우에만 현재(한국) 시간 대입
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                finalTimeISO = new Date(now.getTime() - offset).toISOString().slice(0, -1);
            }

            const { error } = await supabaseClient
                .from('posts')
                .update({ content: newContent, created_at: finalTimeISO })
                .eq('id', id);

            if (error) throw error;
            loadOneLinePosts();
        } catch (error) {
            alert('글을 수정하지 못했습니다.');
        }
    }

    async function addOneLinePost() {
        const inputEl = $('#oneline-input');
        const content = inputEl.html().trim();

        if (!content || content === '<br>') return; 

        try {
            inputEl.prop('contenteditable', false);
            
            // [버그 수정 2] 새 글을 작성할 때도 Z(영국시간)가 붙지 않도록 한국 표준시 오프셋 적용
            const now = new Date(); 
            const offset = now.getTimezoneOffset() * 60000;
            const localISOString = new Date(now.getTime() - offset).toISOString().slice(0, -1);

            const { error } = await supabaseClient
                .from('posts')
                .insert([{ category: 'oneline', content: content, created_at: localISOString }]);

            if (error) throw error;
            inputEl.html(''); 
            
            $('#oneline-search').val('').trigger('blur'); 
            loadOneLinePosts();
        } catch (error) {
            alert('기록을 남기지 못했습니다.');
        } finally {
            inputEl.prop('contenteditable', true);
            inputEl.focus();
        }
    }

    async function deleteOneLinePost(id) {
        if (!confirm("정말 이 기록을 삭제하시겠습니까?")) return;
        try {
            const { error } = await supabaseClient.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadOneLinePosts();
        } catch (error) {
            alert('기록을 삭제하지 못했습니다.');
        }
    }

    setTimeout(() => { loadOneLinePosts(); }, 100);
</script>
