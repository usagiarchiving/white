<style>
    /* [요청사항 4] 모바일 반응형 구조: 데스크탑은 양옆, 모바일은 날짜 위 / 내용 아래 */
    .oneline-read-mode {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
    }
    @media (max-width: 768px) {
        .oneline-read-mode {
            /* flex-direction: column-reverse를 쓰면 뒤에 있는 '날짜'가 위로 올라갑니다 */
            flex-direction: column-reverse;
            gap: 6px;
        }
        .oneline-read-mode .feed-text {
            width: 100%;
        }
        .oneline-read-mode .feed-time {
            align-self: flex-start;
        }
    }
</style>

<div class="oneline-wrapper" style="padding-top: 15px;">
    
    <div class="input-container" style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 1.5px solid var(--divider-bg); padding-bottom: 8px; transition: border-color 0.3s ease;">
        <input type="text" id="oneline-input" autocomplete="off" placeholder="♡" 
               style="flex: 1; background: transparent; border: none; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px; outline: none; padding: 4px 0;">
        
        <button onclick="addOneLinePost()" style="background: none; border: none; color: var(--point-color); font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; white-space: nowrap; transition: opacity 0.2s ease;">
            전송
        </button>
    </div>

    <div class="search-container" style="display: flex; justify-content: flex-end; margin-bottom: 25px;">
        <input type="text" id="oneline-search" autocomplete="off" placeholder="기록 검색..." 
               style="background: transparent; border: none; border-bottom: 1px solid var(--divider-bg); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 12px; outline: none; padding: 2px 0; width: 100px; transition: border-color 0.3s ease;">
    </div>
    
    <div class="feed-container" id="oneline-feed">
        </div>
</div>

<script>
    // 입력창 포커스 효과
    $('#oneline-input').focus(function() {
        $('.input-container').style('border-color', 'var(--point-color)', 'important');
    }).blur(function() {
        $('.input-container').style('border-color', 'var(--divider-bg)', 'important');
    });

    // 검색창 포커스 효과
    $('#oneline-search').focus(function() {
        $(this).css('border-color', 'var(--point-color)');
    }).blur(function() {
        $(this).css('border-color', 'var(--divider-bg)');
    });

    // [신규 기능] 실시간 글 검색 필터링 로직
    $('#oneline-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            const text = $(this).find('.feed-text').text().toLowerCase();
            if (text.includes(keyword)) {
                $(this).show();
            } else {
                $(this).hide();
            }
        });
    });

    // jQuery 인라인 중요도 지정을 위한 간이 확장 함수
    jQuery.prototype.style = function(prop, val, priority) {
        this.each(function() { this.style.setProperty(prop, val, priority || ''); });
        return this;
    };

    // 로드 즉시 실행
    setTimeout(() => {
        if(typeof loadOneLinePosts === 'function') {
            loadOneLinePosts();
        }
    }, 100);
</script>
