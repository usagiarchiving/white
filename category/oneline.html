<style>
    /* 1. 모바일 맞춤 레이아웃: 데스크탑은 양옆, 모바일은 날짜 위 / 내용 아래 */
    .oneline-read-mode {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
    }
    @media (max-width: 768px) {
        .oneline-read-mode {
            flex-direction: column-reverse; /* 방향을 뒤집어서 날짜를 위로 올림 */
            gap: 4px;
        }
        .oneline-read-mode .feed-text { width: 100%; display: block; }
        .oneline-read-mode .feed-time { align-self: flex-start; padding-bottom: 4px; }
    }
    
    /* 2. 돋보기 검색창 우아한 확장 애니메이션 스타일 */
    .search-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-end;
    }
    #oneline-search {
        background: transparent;
        border: none;
        border-bottom: 1px solid transparent; /* 초기엔 밑줄 투명 */
        color: var(--main-color);
        font-family: 'Noto Serif KR', serif;
        font-size: 12px;
        outline: none;
        padding: 2px 22px 2px 0; /* 아이콘이 겹치지 않게 우측 여백 */
        width: 0px; /* 초기에는 너비 0으로 숨김 */
        opacity: 0;
        transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute;
        right: 0;
        color: var(--sub-color);
        cursor: pointer;
        font-size: 16px;
        transition: color 0.3s ease;
        z-index: 10;
    }
</style>

<div class="oneline-wrapper" style="padding-top: 15px;">
    
    <div class="input-container" style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 1.5px solid var(--divider-bg); padding-bottom: 8px; transition: border-color 0.3s ease;">
        <input type="text" id="oneline-input" autocomplete="off" placeholder="♡" 
               style="flex: 1; background: transparent; border: none; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px; outline: none; padding: 4px 0;">
        
        <button onclick="addOneLinePost()" style="background: none; border: none; color: var(--point-color); font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; white-space: nowrap; transition: opacity 0.2s ease;">
            전송
        </button>
    </div>

    <div class="search-container" style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
        <div class="search-wrapper">
            <input type="text" id="oneline-search" autocomplete="off" placeholder="기록 검색...">
            <i class="xi-search" id="search-icon" title="검색 열기"></i>
        </div>
    </div>
    
    <div class="feed-container" id="oneline-feed">
        </div>
</div>

<script>
    // 입력창 포커스 시 테두리 색상 변경
    $('#oneline-input').focus(function() {
        $('.input-container').css('border-color', 'var(--point-color)');
    }).blur(function() {
        $('.input-container').css('border-color', 'var(--divider-bg)');
    });

    // [기능] 돋보기 아이콘 클릭 시 검색창 스르륵 열리기
    $('#search-icon').click(function() {
        $('#oneline-search').css({
            'width': '130px', 
            'opacity': '1', 
            'border-bottom-color': 'var(--point-color)'
        }).focus();
        $(this).css('color', 'var(--point-color)');
    });

    // [기능] 검색창에서 포커스가 나갔을 때, 비어있으면 다시 닫기
    $('#oneline-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('color', 'var(--sub-color)');
        } else {
            $(this).css('border-bottom-color', 'var(--divider-bg)');
            $('#search-icon').css('color', 'var(--main-color)');
        }
    });

    // [기능] 실시간 글 검색 필터링 로직
    $('#oneline-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            const text = $(this).find('.feed-text').text().toLowerCase();
            if (text.includes(keyword)) {
                $(this).show();
            } else {
                $(this).hide();
            }
        });
    });

    // 페이지 로드 즉시 목록 불러오기
    setTimeout(() => {
        if(typeof loadOneLinePosts === 'function') {
            loadOneLinePosts();
        }
    }, 100);
</script>
