<div class="oneline-wrapper" style="padding-top: 15px;">
    
    <div class="input-container" style="display: flex; align-items: center; gap: 20px; margin-bottom: 45px; border-bottom: 1.5px solid var(--divider-bg); padding-bottom: 8px; transition: border-color 0.3s ease;">
        <input type="text" id="oneline-input" placeholder="사유의 파편을 이곳에 적어두세요." 
               style="flex: 1; background: transparent; border: none; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 15px; outline: none; padding: 4px 0;">
        
        <button onclick="addOneLinePost()" style="background: none; border: none; color: var(--point-color); font-family: 'Noto Serif KR', serif; font-size: 14.5px; font-weight: 600; cursor: pointer; padding: 0; white-space: nowrap; transition: opacity 0.2s ease;">
            전송
        </button>
    </div>
    
    <div class="feed-container" id="oneline-feed">
        </div>
</div>

<script>
    // 입력창 포커스 시 식물 감성의 옅은 초록 테두리 효과 부여
    $('#oneline-input').focus(function() {
        $('.input-container').style('border-color', 'var(--point-color)', 'important');
    }).blur(function() {
        $('.input-container').style('border-color', 'var(--divider-bg)', 'important');
    });

    // jQuery 인라인 중요도 지정을 위한 간이 확장 함수
    jQuery.prototype.style = function(prop, val, priority) {
        this.each(function() { this.style.setProperty(prop, val, priority || ''); });
        return this;
    };

    // 로드 즉시 실행
    setTimeout(() => {
        if(typeof loadOneLinePosts === 'function') {
            loadOneLinePosts();
        }
    }, 100);
</script>
