<style>
    /* ==========================================================================
       [기본 구조]
       ========================================================================== */
    .hasion-wrapper {
        position: relative;
        padding-top: 10px;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
    }

    .search-wrapper { 
        display: flex; justify-content: flex-end; align-items: center; 
        margin-bottom: 20px; width: 100%; gap: 15px; 
    }
    #tags-toggle-btn { cursor: pointer; color: var(--sub-color); font-size: 18px; transition: color 0.3s; }
    #tags-toggle-btn:hover, #tags-toggle-btn.active { color: var(--point-color); }
    
    .search-inner { position: relative; display: flex; align-items: center; }
    #hasion-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    #tags-panel {
        display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; 
        padding: 15px; background: #ffffff; border-radius: 6px; 
        border: 1px solid var(--divider-bg);
    }
    .tag-pill {
        font-family: 'Noto Serif KR', serif; font-size: 11.5px; color: var(--sub-color);
        cursor: pointer; padding: 4px 10px; border-radius: 12px; 
        background: #fff; border: 1px solid var(--divider-bg); transition: all 0.2s;
    }
    .tag-pill:hover { color: var(--point-color); border-color: var(--point-color); }

    /* ==========================================================================
       [입력 캔버스 UI]
       ========================================================================== */
    .hasion-title-input {
        display: block; width: 100%; max-width: 250px; margin: 0 auto 15px auto; box-sizing: border-box;
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600;
        text-align: center; outline: none; padding: 6px 0; transition: border-color 0.3s ease;
    }
    .hasion-title-input:focus { border-bottom-color: var(--point-color); }

    .hasion-paper-input {
        background: #ffffff; padding: 25px 25px 15px 25px; margin-bottom: 12px;
        border-radius: 6px; border: 1px solid var(--divider-bg);
        width: 100%; max-width: 100%; box-sizing: border-box;
    }

    .hasion-editor {
        width: 100%; max-width: 100%; min-height: 120px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
        line-height: 1.8; outline: none; padding: 0; position: relative; z-index: 2;
        word-break: break-all; word-wrap: break-word; box-sizing: border-box;
    }
    
    .hasion-editor div, .hasion-editor p {
        font-size: 13px;
        line-height: 1.8;
        margin: 0; padding: 0;
    }

    [contenteditable]:empty::before { content: attr(placeholder); color: var(--sub-color); opacity: 0.5; pointer-events: none; }

    .hasion-editor-wrapper { position: relative; width: 100%; }
    
    .hasion-date-picker {
        display: block; width: 100%; text-align: right; margin-top: 15px;
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s;
    }
    .hasion-date-picker:hover { opacity: 1; }

    .hasion-submit-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; padding: 0 5px; }
    .hasion-tags-input { width: 150px; background: transparent; border: none; outline: none; color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; }
    .hasion-actions-right { display: flex; align-items: center; gap: 15px; }
    .hasion-img-add-btn { cursor: pointer; font-size: 18px; color: var(--sub-color); transition: color 0.2s; margin: 0; }
    .hasion-img-add-btn:hover { color: var(--point-color); }
    .hasion-submit-btn { background: none; border: none; color: var(--point-color); cursor: pointer; font-size: 20px; padding: 5px; opacity: 0.7; transition: opacity 0.2s, transform 0.2s; }
    .hasion-submit-btn:hover { opacity: 1; transform: translateX(3px); }

    /* ==========================================================================
       [피드 영역 & HTML 라이브 렌더링 방어막]
       ========================================================================== */
    .feed-item { width: 100%; max-width: 100%; box-sizing: border-box; }
    .feed-text {
        width: 100%; max-width: 100%; box-sizing: border-box;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; line-height: 1.8; 
        word-break: break-all; word-wrap: break-word; font-size: 13px; white-space: pre-wrap; 
    }
    .feed-text div, .feed-text p { font-size: 13px; line-height: 1.8; margin: 0; padding: 0; }
    .feed-text img, .custom-html-box img { max-width: 100% !important; height: auto !important; box-sizing: border-box; }

    .custom-html-box {
        width: 100%; box-sizing: border-box; margin: 10px 0;
        white-space: normal !important; line-height: normal !important; 
        letter-spacing: normal !important; word-break: normal !important;
        word-wrap: normal !important; overflow: visible !important; 
    }
    .custom-html-box * { box-sizing: border-box; }
    .custom-html-box svg { display: block !important; }

    /* ==========================================================================
       [에디터 인라인 이미지 규격]
       ========================================================================== */
    .editor-img-wrap {
        display: inline-block; position: relative; vertical-align: top; 
        margin: 0 0 6px 0; cursor: pointer; transition: width 0.2s ease;
    }
    .img-full { width: 100%; }
    .img-half { width: 49%; margin-right: 1%; }
    .img-third { width: 32%; margin-right: 1%; }
    
    .editor-img-wrap img {
        width: 100%; height: auto; display: block; border-radius: 4px;
        border: 1px solid var(--divider-bg); pointer-events: none;
    }
    
    /* 🚨 팝업(라이트박스) 띄우기를 위해 읽기 모드 이미지 클릭 허용 */
    .read-mode .editor-img-wrap img { 
        pointer-events: auto; 
        cursor: pointer;
        -webkit-touch-callout: default; 
    }
    
    .img-del-btn { display: none !important; }

    /* ==========================================================================
       [🚨 원본 보기 라이트박스 (신규 추가)]
       ========================================================================== */
    .hasion-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .hasion-lightbox img {
        max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: hasionZoom 0.25s ease-out;
    }
    @keyframes hasionZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ==========================================================================
       [사진 조율 팝업 UI]
       ========================================================================== */
    .img-setting-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 99999; display: none; align-items: center; justify-content: center; opacity: 0;
        transition: opacity 0.2s ease;
    }
    .img-setting-card {
        background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 320px; 
        border-radius: 14px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        border: 1px solid var(--divider-bg); overflow: hidden; transform: scale(0.95);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .img-setting-overlay.active { opacity: 1; display: flex; }
    .img-setting-overlay.active .img-setting-card { transform: scale(1); }

    .img-setting-header {
        padding: 16px 20px; border-bottom: 1px solid var(--divider-bg);
        display: flex; justify-content: space-between; align-items: center;
        font-family: 'Noto Serif KR', serif; font-size: 13.5px; font-weight: 600; color: var(--main-color);
    }
    .img-setting-header i { cursor: pointer; color: var(--sub-color); font-size: 16px; transition: color 0.2s; }
    .img-setting-header i:hover { color: var(--point-color); }

    .img-setting-body { padding: 20px; }
    
    .setting-group-title {
        font-family: 'Noto Serif KR', serif; font-size: 11px; color: var(--sub-color); 
        margin-bottom: 10px; padding-left: 2px;
    }
    .setting-row { display: flex; gap: 8px; margin-bottom: 22px; }
    .setting-row:last-child { margin-bottom: 0; }
    
    .setting-btn {
        flex: 1; padding: 12px 6px; border: 1px solid var(--divider-bg);
        background: rgba(0,0,0,0.01); border-radius: 8px; color: var(--main-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer;
        transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .setting-btn i { font-size: 18px; color: var(--point-color); transition: transform 0.2s; }
    .setting-btn:hover { border-color: var(--point-color); background: rgba(0,0,0,0.03); }
    .setting-btn:hover i { transform: scale(1.1); }
    
    .setting-btn.btn-delete { border-color: rgba(255,59,48,0.2); color: #ff3b30; }
    .setting-btn.btn-delete i { color: #ff3b30; }
    .setting-btn.btn-delete:hover { background: rgba(255,59,48,0.05); }

    /* 드래그 툴바 등 나머지 기존 설정... */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999; align-items: center; gap: 4px; 
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); user-select: none; 
    }
    .format-toolbar button { background: none; border: none; color: var(--main-color); font-size: 14px; cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    .color-picker-label { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; overflow: hidden; margin: 0; }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; border: none; padding: 0; }
    .color-btn { font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px; }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }
    #fontSizeInput::-webkit-outer-spin-button, #fontSizeInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .hasion-accordion-header { font-size: 13.5px; font-family: 'Noto Serif KR', serif; font-weight: normal; color: var(--main-color); cursor: pointer; padding: 12px 0 6px 0; border-bottom: 1px solid var(--divider-bg); transition: color 0.3s ease; display: flex; align-items: center; justify-content: space-between; }
    .hasion-accordion-header.open { color: var(--point-color); border-bottom-color: transparent; }
    .hasion-accordion-header:hover { color: var(--point-color); }
    .hasion-accordion-body { display: none; padding: 15px 0 30px 0; border-bottom: 1px solid var(--divider-bg); }
</style>

<script>
    var HASION_URL = 'https://dvalxqujceuhfshatilq.supabase.co';
    var HASION_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2YWx4cXVqY2V1aGZzaGF0aWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzg3MTksImV4cCI6MjA5NzIxNDcxOX0.6ZabNquhVkOnboWyQPSybP6S5S5iGjjYcpspcLM0vr0';
    var hasionSupabase = window.supabase.createClient(HASION_URL, HASION_KEY);

    var savedSelectionRange = null;
    window.saveSelection = function() { var selection = window.getSelection(); if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0); };
    window.applyCustomColor = function(command, color) { if (savedSelectionRange) { var selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(savedSelectionRange); } document.execCommand(command, false, color); checkSelection(); };
    window.applyExactFontSize = function(size) { if (savedSelectionRange) { var selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(savedSelectionRange); } else { var editor = document.activeElement; if(!editor || editor.getAttribute('contenteditable') !== 'true') return; } document.execCommand("fontSize", false, "7"); var fontElements = document.getElementsByTagName("font"); for (var i = 0; i < fontElements.length; i++) { if (fontElements[i].size == "7") { fontElements[i].removeAttribute("size"); fontElements[i].style.fontSize = size + "px"; } } checkSelection(); };
    window.adjustFontSize = function(delta) { var input = document.getElementById('fontSizeInput'); var currentSize = parseInt(input.value) || 13; var newSize = currentSize + delta; if(newSize < 8) newSize = 8; if(newSize > 72) newSize = 72; input.value = newSize; applyExactFontSize(newSize); };

    function checkSelection() {
        setTimeout(() => {
            var selection = window.getSelection();
            var toolbar = document.getElementById('format-toolbar');
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                var node = selection.anchorNode; var isInsideEditor = false;
                while (node) { if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') { isInsideEditor = true; break; } node = node.parentNode; }
                if (isInsideEditor) {
                    var range = selection.getRangeAt(0); var rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    var top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    var left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8; if (left < 10) left = 10;
                    toolbar.style.top = top + 'px'; toolbar.style.left = left + 'px';
                } else { toolbar.style.display = 'none'; }
            } else { toolbar.style.display = 'none'; }
        }, 100);
    }
    document.addEventListener('selectionchange', checkSelection); document.addEventListener('mouseup', checkSelection); document.addEventListener('touchend', checkSelection);
    window.formatText = function(command, value = null) { document.execCommand(command, false, value); checkSelection(); };
    window.applyColor = function(textColor, bgColor) { document.execCommand('foreColor', false, textColor); document.execCommand('backColor', false, bgColor); checkSelection(); };

    function setDefaultDate() {
        var today = new Date(); var yyyy = today.getFullYear(); var mm = String(today.getMonth() + 1).padStart(2, '0'); var dd = String(today.getDate()).padStart(2, '0');
        $('#hasion-date-picker').val(`${yyyy}-${mm}-${dd}`);
    }

    // [압축 로직 복구 완료]
    window.compressImage = async function(file, qualityType) {
        if (qualityType === 'original' || file.type === 'image/gif') return file;
        return new Promise((resolve) => {
            var reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                var img = new Image(); img.src = event.target.result;
                img.onload = function() {
                    var maxWidth = qualityType === 'high' ? 1920 : 1080;
                    var quality = qualityType === 'high' ? 0.8 : 0.6;
                    var width = img.width; var height = img.height;
                    if (width > maxWidth || height > maxWidth) {
                        if (width > height) { height = Math.round((height * maxWidth) / width); width = maxWidth; } 
                        else { width = Math.round((width * maxWidth) / height); height = maxWidth; }
                    }
                    var canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                    var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    var outType = (file.type === 'image/png' || file.type === 'image/webp') ? 'image/webp' : 'image/jpeg';
                    var ext = (outType === 'image/webp') ? '.webp' : '.jpg';
                    canvas.toBlob((blob) => { resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ext, { type: outType, lastModified: file.lastModified })); }, outType, quality);
                };
            };
        });
    };

    $('#hasion-file-input').on('change', async function(e) {
        var files = Array.from(e.target.files); if(!files.length) return;
        var firstDate = new Date(files[0].lastModified);
        var yyyy = firstDate.getFullYear(); var mm = String(firstDate.getMonth()+1).padStart(2, '0'); var dd = String(firstDate.getDate()).padStart(2, '0');
        $('#hasion-date-picker').val(`${yyyy}-${mm}-${dd}`);
        
        $('#submit-btn').prop('disabled', true).css('opacity', '0.3'); $('.hasion-img-add-btn').css('opacity', '0.3');
        var qualityOption = $('#img-quality').val() || 'high';
        var allImgHtml = '';

        for(var file of files) {
            var processedFile = await compressImage(file, qualityOption);
            var fileExt = processedFile.name.split('.').pop();
            var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            var { error } = await hasionSupabase.storage.from('images').upload(fileName, processedFile);
            if(!error) {
                var { data } = hasionSupabase.storage.from('images').getPublicUrl(fileName);
                allImgHtml += `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${data.publicUrl}"></span> `;
            }
        }
        if(allImgHtml !== '') { $('#hasion-content').focus(); document.execCommand('insertHTML', false, allImgHtml); }
        $('#submit-btn').prop('disabled', false).css('opacity', '0.7'); $('.hasion-img-add-btn').css('opacity', '1'); $(this).val('');
    });

    /* ==========================================================================
       [팝업 관리 및 화살표 이동 엔진]
       ========================================================================== */
    var activeImgWrap = null;

    // 🚨 에디터(작성/수정 모드) 안에서만 사진 클릭 시 설정 팝업 열기
    $(document).on('click', '.hasion-editor .editor-img-wrap', function(e) {
        if ($(this).closest('.read-mode').length > 0) return; 
        e.preventDefault();
        activeImgWrap = $(this);
        $('#img-setting-modal').addClass('active');
    });

    // 🚨 피드(읽기 모드)에서 사진 클릭 시 원본 보기 라이트박스 열기
    $(document).on('click', '.read-mode .editor-img-wrap img', function(e) {
        e.stopPropagation();
        $('#hasion-lightbox-img').attr('src', $(this).attr('src'));
        $('#hasion-lightbox').css('display', 'flex').hide().fadeIn(150);
    });

    window.closeHasionLightbox = function() {
        $('#hasion-lightbox').fadeOut(150);
    };

    window.closeImgSettingModal = function() {
        $('#img-setting-modal').removeClass('active');
        activeImgWrap = null;
    };

    window.setImgLayout = function(layoutClass) {
        if(!activeImgWrap) return;
        activeImgWrap.removeClass('img-full img-half img-third').addClass(layoutClass);
        closeImgSettingModal();
    };

    window.moveImgOrder = function(dir) {
        if(!activeImgWrap) return;
        var node = activeImgWrap[0];
        
        if (dir === 'up') {
            if (node.previousSibling) { node.parentNode.insertBefore(node, node.previousSibling); }
        } else if (dir === 'down') {
            if (node.nextSibling) { node.parentNode.insertBefore(node, node.nextSibling.nextSibling); }
        }
    };

    window.deleteSelectedImg = function() {
        if(!activeImgWrap) return;
        activeImgWrap.remove();
        closeImgSettingModal();
    };

    // 🚨 [DB 오류 해결 완료] 구문 오류 없이 정상적으로 데이터 로드
    async function loadHasionPosts() {
        var feedContainer = $('#hasion-feed');
        feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">Loading...</p>');

        try {
            var { data, error } = await hasionSupabase.from('posts').select('*').eq('category', 'hasion');
            if (error) throw error;
            feedContainer.empty();
            if (data.length === 0) { 
                feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">작성된 기록이 없습니다.</p>'); 
                return; 
            }
            
            data.sort((a, b) => { var dateA = a.created_at.split('T')[0]; var dateB = b.created_at.split('T')[0]; if (dateA === dateB) return b.id - a.id; return new Date(dateB) - new Date(dateA); });
            var allTags = new Set();
            
            data.forEach(post => {
                var dateObj = new Date(post.created_at); var yyyy = dateObj.getFullYear(); var mm = String(dateObj.getMonth() + 1).padStart(2, '0'); var dd = String(dateObj.getDate()).padStart(2, '0');
                var displayDate = `${yyyy}.${mm}.${dd}`; var inputDate = `${yyyy}-${mm}-${dd}`; 
                var contentHtml = post.content; var tagsText = "";
                if (post.content && post.content.includes("|||")) { var parts = post.content.split("|||"); contentHtml = parts[0]; tagsText = parts[1] || ""; }
                
                var displayContent = contentHtml.replace(/```([\s\S]*?)
```/g, function(match, innerHtml) {
                    var temp = document.createElement('div');
                    var formattedHtml = innerHtml.replace(/<br\s*\/?>/gi, '\n').replace(/<\/div>/gi, '\n').replace(/<\/p>/gi, '\n');
                    temp.innerHTML = formattedHtml; var rawCode = temp.textContent || temp.innerText || "";
                    rawCode = rawCode.replace(/\u00A0/g, ' ').replace(/>\s+</g, '><').trim();
                    return `<div class="custom-html-box" contenteditable="false">${rawCode}</div>`;
                });
                
                displayContent = displayContent.replace(/(<\/span>)(?:\s|&nbsp;|<br\s*\/?>|<\/?div>|<\/?p>)*(<span class="editor-img-wrap)/gi, '$1$2');
                
                var matches = tagsText.match(/#[^\s#]+/g); if(matches) matches.forEach(m => allTags.add(m));
                
                var safeTitle = post.title ? post.title.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                var safeTags = tagsText ? tagsText.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                var plainSearchText = `${post.title || ''} ${tagsText} ${displayDate}`.replace(/"/g, "");
                var tagsDisplayHtml = tagsText ? `<div style="font-size: 11.5px; color: var(--point-color); margin-top: 15px; cursor: pointer; opacity:0.8;" onclick="triggerTagSearch('${safeTags}')">${tagsText}</div>` : "";

                var postHtml = `
                    <div class="feed-item fade-in-element" id="post-${post.id}" data-search="${plainSearchText}">
                        <div class="hasion-accordion-header" id="accordion-header-${post.id}" onclick="toggleHasionAccordion(${post.id})">
                            <span style="flex:1; font-weight:600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${post.title || '무제'}</span>
                            <span style="font-size:11px; color:var(--sub-color); margin-left:15px; flex-shrink:0;">${displayDate}</span>
                        </div>
                        <div class="hasion-accordion-body" id="accordion-body-${post.id}">
                            <div class="read-mode">
                                <div class="feed-text">${displayContent}</div>
                                ${tagsDisplayHtml}
                                <div class="read-actions" style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                                    <i class="xi-pen" onclick="startHasionEdit(${post.id})" title="수정" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='0.35'"></i>
                                    <i class="xi-trash" onclick="deleteHasionPost(${post.id})" title="삭제" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'; this.style.color='#ff3b30'" onmouseout="this.style.opacity='0.35'; this.style.color='var(--sub-color)'"></i>
                                </div>
                            </div>
                            <div class="edit-mode" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
                                <input type="text" id="edit-title-${post.id}" value="${post.title || ''}" placeholder="title" style="width:100%; margin-bottom:5px; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; font-weight:600; padding:6px 0; outline:none; text-align:center;">
                                <div id="edit-content-${post.id}" class="hasion-editor" contenteditable="true" spellcheck="false" style="min-height: 150px; border: 1px solid var(--point-color); border-radius:4px; padding: 15px;">${contentHtml}</div>
                                <input type="text" id="edit-tags-${post.id}" value="${safeTags}" placeholder="tags" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:12px; padding:4px 0; outline:none;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px;">
                                    <input type="date" id="edit-date-${post.id}" value="${inputDate}" style="width: 110px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
                                    <div style="display: flex; gap: 12px; align-items: center;" id="edit-actions-${post.id}">
                                        <select id="edit-img-quality-${post.id}" style="background: transparent; border: none; outline: none; color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer;">
                                            <option value="original">원본</option>
                                            <option value="high" selected>고화질</option>
                                            <option value="low">저화질</option>
                                        </select>
                                        <label for="edit-file-${post.id}" class="hasion-img-add-btn" style="margin:0; font-size:16px;" title="사진 추가"><i class="xi-image-o"></i></label>
                                        <input type="file" id="edit-file-${post.id}" accept="image/*" multiple style="display:none;" onchange="uploadEditImages(${post.id}, this)">
                                        <button onclick="saveHasionEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11.5px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                                        <button onclick="cancelHasionEdit(${post.id})" style="background:none; border:none; color:var(--sub-color); font-size: 11.5px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });
            if (allTags.size > 0) { var tagsHtml = Array.from(allTags).map(tag => `<span class="tag-pill" onclick="triggerTagSearch('${tag}')">${tag}</span>`).join(''); $('#tags-panel').html(tagsHtml); } 
            else { $('#tags-panel').html('<span style="font-size:11px; color:var(--sub-color);">태그가 없습니다.</span>'); }
            setTimeout(() => { $('.custom-html-box script').each(function() { try { eval($(this).text()); } catch(e) {} }); }, 100);
        } catch (error) { 
            console.error(error); 
            feedContainer.html('<p style="text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">Failed to load.</p>'); 
        }
    }

    window.toggleHasionAccordion = function(id) { var header = $(`#accordion-header-${id}`); var body = $(`#accordion-body-${id}`); header.toggleClass('open'); body.slideToggle(400); };

    window.uploadEditImages = async function(id, inputEl) {
        var files = Array.from(inputEl.files); if(!files.length) return;
        var btnWrap = $(`#edit-actions-${id}`); btnWrap.css('opacity', '0.3').css('pointer-events', 'none');
        var qualityOption = $(`#edit-img-quality-${id}`).val() || 'high';
        var allImgHtml = '';
        for(var file of files) {
            var processedFile = await compressImage(file, qualityOption);
            var fileExt = processedFile.name.split('.').pop();
            var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            var { error } = await hasionSupabase.storage.from('images').upload(fileName, processedFile);
            if(!error) {
                var { data } = hasionSupabase.storage.from('images').getPublicUrl(fileName);
                allImgHtml += `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${data.publicUrl}"></span> `;
            }
        }
        if(allImgHtml !== '') { $(`#edit-content-${id}`).append(allImgHtml); }
        btnWrap.css('opacity', '1').css('pointer-events', 'auto'); $(inputEl).val('');
    };

    window.addHasionPost = async function() {
        var titleVal = $('#hasion-title').val().trim(); var contentVal = $('#hasion-content').html().trim(); var tagsVal = $('#hasion-tags').val().trim(); var dateVal = $('#hasion-date-picker').val();
        if (!contentVal || contentVal === '<br>') return; 
        var finalContent = contentVal + "|||" + tagsVal;
        try {
            $('#submit-btn').prop('disabled', true);
            var finalDate = new Date(); if (dateVal) { var parts = dateVal.split('-'); finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]); }
            var offset = finalDate.getTimezoneOffset() * 60000; var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);
            var { error } = await hasionSupabase.from('posts').insert([{ category: 'hasion', title: titleVal, content: finalContent, created_at: localISOString }]);
            if (error) throw error;
            $('#hasion-title').val(''); $('#hasion-content').html(''); $('#hasion-tags').val(''); $('#hasion-search').val('').trigger('blur'); setDefaultDate(); loadHasionPosts();
        } catch (error) { alert('기록을 남기지 못했습니다.'); } finally { $('#submit-btn').prop('disabled', false); }
    };

    window.startHasionEdit = function(id) { var postEl = $(`#post-${id}`); postEl.find('.read-mode').hide(); postEl.find('.edit-mode').fadeIn(200).css('display', 'flex'); };
    window.cancelHasionEdit = function(id) { var postEl = $(`#post-${id}`); postEl.find('.edit-mode').hide(); postEl.find('.read-mode').fadeIn(200).css('display', 'block'); };

    window.saveHasionEdit = async function(id) {
        var newTitle = $(`#edit-title-${id}`).val().trim(); var newContent = $(`#edit-content-${id}`).html().trim(); var newTags = $(`#edit-tags-${id}`).val().trim(); var newDateStr = $(`#edit-date-${id}`).val();
        if (!newContent || newContent === '<br>') { alert("내용을 적어주세요."); return; }
        var finalContent = newContent + "|||" + newTags;
        try {
            var finalDate = new Date(); if (newDateStr) { var parts = newDateStr.split('-'); finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]); }
            var offset = finalDate.getTimezoneOffset() * 60000; var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);
            var { error } = await hasionSupabase.from('posts').update({ title: newTitle, content: finalContent, created_at: localISOString }).eq('id', id);
            if (error) throw error; loadHasionPosts();
        } catch (error) { alert('수정에 실패했습니다.'); }
    };

    window.deleteHasionPost = async function(id) {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        try { var { error } = await hasionSupabase.from('posts').delete().eq('id', id); if (error) throw error; loadHasionPosts(); } catch (error) { alert('삭제하지 못했습니다.'); }
    };

    $('#tags-toggle-btn').click(function() { $('#tags-panel').slideToggle(200); $(this).toggleClass('active'); });
    window.triggerTagSearch = function(tagText) { if(!tagText) return; var pureTag = tagText.match(/#[^\s#]+/)[0] || tagText; $('#hasion-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).val(pureTag).focus(); $('#search-icon').css('opacity', '0.7'); $('#hasion-search').trigger('input'); };
    $('#search-icon').click(function() { $('#hasion-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus(); $(this).css('opacity', '0.7'); });
    $('#hasion-search').blur(function() { if($(this).val().trim() === '') { $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'}); $('#search-icon').css('opacity', '0.35'); } });
    $('#hasion-search').on('input', function() { var keyword = $(this).val().toLowerCase(); $('.feed-item').each(function() { var dataText = $(this).attr('data-search').toLowerCase(); var bodyText = $(this).find('.feed-text').text().toLowerCase(); if (dataText.includes(keyword) || bodyText.includes(keyword)) { $(this).show(); } else { $(this).hide(); } }); });

    var hasionTimeout = setTimeout(() => { setDefaultDate(); loadHasionPosts(); }, 100);
</script>
