<style>
    /* ==========================================================================
       [기본 구조 및 튀어나옴 방지 (철벽 보호)]
       ========================================================================== */
    .hasion-wrapper {
        position: relative;
        padding-top: 10px;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        box-sizing: border-box;
    }

    .search-wrapper { 
        display: flex; justify-content: flex-end; align-items: center; 
        margin-bottom: 20px; width: 100%; gap: 15px; 
    }
    #tags-toggle-btn { cursor: pointer; color: var(--sub-color); font-size: 18px; transition: color 0.3s; }
    #tags-toggle-btn:hover, #tags-toggle-btn.active { color: var(--point-color); }
    
    .search-inner { position: relative; display: flex; align-items: center; }
    #hasion-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    #tags-panel {
        display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; 
        padding: 15px; background: #ffffff; border-radius: 6px; 
        border: 1px solid var(--divider-bg);
    }
    .tag-pill {
        font-family: 'Noto Serif KR', serif; font-size: 11.5px; color: var(--sub-color);
        cursor: pointer; padding: 4px 10px; border-radius: 12px; 
        background: #fff; border: 1px solid var(--divider-bg); transition: all 0.2s;
    }
    .tag-pill:hover { color: var(--point-color); border-color: var(--point-color); }

    /* ==========================================================================
       [입력 캔버스 철벽 보호]
       ========================================================================== */
    .hasion-paper-input {
        background: #ffffff; padding: 25px; margin-bottom: 25px;
        border-radius: 6px; border: 1px solid var(--divider-bg);
        width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;
    }

    .hasion-title-input {
        display: block; width: 100%; box-sizing: border-box;
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600;
        text-align: center; outline: none; padding: 6px 0; margin-bottom: 15px; transition: border-color 0.3s ease;
    }
    .hasion-title-input:focus { border-bottom-color: var(--point-color); }

    .hasion-editor {
        width: 100%; max-width: 100%; min-height: 120px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
        line-height: 1.8; outline: none; padding: 0; position: relative; z-index: 2;
        word-break: break-all; word-wrap: break-word; box-sizing: border-box; overflow: hidden;
    }
    [contenteditable]:empty::before { content: attr(placeholder); color: var(--sub-color); opacity: 0.5; pointer-events: none; }

    /* ==========================================================================
       [피드 영역 철벽 보호 & HTML 라이브 렌더링 박스]
       ========================================================================== */
    .feed-item {
        width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;
    }
    
    .feed-text {
        width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; line-height: 1.8; 
        word-break: break-all; word-wrap: break-word; font-size: 13px; white-space: pre-wrap; 
    }

    /* 피드 내부 이미지 절대 밖으로 못 나가게 고정 */
    .feed-text img, .custom-html-box img {
        max-width: 100% !important; height: auto !important; box-sizing: border-box;
    }

    /* 라이브 HTML 렌더링 컨테이너 설정 (철벽) */
    .custom-html-box {
        width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;
        white-space: normal; /* 코드 내부는 일반 웹페이지처럼 줄바꿈 처리 */
        margin: 10px 0;
    }
    .custom-html-box * {
        max-width: 100%;
        box-sizing: border-box;
    }

    /* ==========================================================================
       [인라인 이미지 & 드래그 툴바]
       ========================================================================== */
    .editor-img-wrap {
        display: inline-block; position: relative; vertical-align: top; margin: 4px 1%;
        cursor: pointer; transition: width 0.2s ease;
    }
    .img-full { width: 98%; }
    .img-half { width: 48%; }
    .img-third { width: 31%; }
    
    .editor-img-wrap img {
        width: 100%; height: auto; display: block; border-radius: 4px;
        border: 1px solid var(--divider-bg); pointer-events: none;
    }
    
    .img-del-btn {
        position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.3); color: #fff;
        width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; font-size: 10px; cursor: pointer; z-index: 10;
        transition: background 0.2s;
    }
    .img-del-btn:hover { background: #ff3b30; }
    .read-mode .img-del-btn { display: none !important; }

    .hasion-footer-input { 
        display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px; 
    }
    .hasion-date-picker {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s;
    }
    .hasion-date-picker:hover { opacity: 1; }

    .hasion-img-add-btn {
        cursor: pointer; font-size: 18px; color: var(--sub-color); 
        margin-right: 15px; transition: color 0.2s;
    }
    .hasion-img-add-btn:hover { color: var(--point-color); }
    
    .hasion-submit-btn {
        background: none; border: none; color: var(--point-color); cursor: pointer;
        font-size: 18px; padding: 5px; opacity: 0.7; transition: opacity 0.2s, transform 0.2s;
    }
    .hasion-submit-btn:hover { opacity: 1; transform: translateX(3px); }

    /* 드래그 툴바 */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999;
        align-items: center; gap: 4px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); user-select: none; 
    }
    .format-toolbar button { background: none; border: none; color: var(--main-color); font-size: 14px; cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    .color-picker-label { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; overflow: hidden; margin: 0; }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; border: none; padding: 0; }
    .color-btn { font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px; }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }

    /* 숫자 입력 화살표 숨김 */
    #fontSizeInput::-webkit-outer-spin-button,
    #fontSizeInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* 리스트 디자인 (아코디언) */
    .hasion-accordion-header {
        font-size: 13.5px; font-family: 'Noto Serif KR', serif; font-weight: normal; 
        color: var(--main-color); cursor: pointer; padding: 12px 0 6px 0; 
        border-bottom: 1px solid var(--divider-bg); transition: color 0.3s ease;
        display: flex; align-items: center; justify-content: space-between;
    }
    .hasion-accordion-header.open { color: var(--point-color); border-bottom-color: transparent; }
    .hasion-accordion-header:hover { color: var(--point-color); }
    .hasion-accordion-body { display: none; padding: 15px 0 30px 0; border-bottom: 1px solid var(--divider-bg); }
</style>

<div id="format-toolbar" class="format-toolbar">
    <button onmousedown="event.preventDefault(); formatText('bold')"><i class="xi-bold"></i></button>
    <button onmousedown="event.preventDefault(); formatText('italic')"><i class="xi-italic"></i></button>
    <button onmousedown="event.preventDefault(); formatText('underline')"><i class="xi-underline"></i></button>
    <button onmousedown="event.preventDefault(); formatText('strikeThrough')"><i class="xi-strikethrough"></i></button>
    
    <div class="divider"></div>
    
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-font"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('foreColor', this.value)" onchange="applyCustomColor('foreColor', this.value)"></label>
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-palette"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('backColor', this.value)" onchange="applyCustomColor('backColor', this.value)"></label>
    
    <div class="divider"></div>
    <button onmousedown="event.preventDefault(); applyColor('#0E865E', '#E1F9F1')" class="color-btn btn-mint">M</button>
    <button onmousedown="event.preventDefault(); applyColor('#D04978', '#FDEDF4')" class="color-btn btn-pink">P</button>
    
    <!-- 텍스트 사이즈 (px) 조절기 -->
    <div class="divider"></div>
    <div style="display:flex; align-items:center; gap:2px; padding:0 4px;">
        <button onmousedown="event.preventDefault(); adjustFontSize(-1)" title="작게" style="width:20px;"><i class="xi-minus"></i></button>
        <input type="number" id="fontSizeInput" value="13" style="width:34px; height:20px; background:transparent; border:1px solid var(--divider-bg); border-radius:3px; text-align:center; font-size:11px; color:var(--main-color); outline:none; -moz-appearance: textfield;" onchange="applyExactFontSize(this.value)">
        <button onmousedown="event.preventDefault(); adjustFontSize(1)" title="크게" style="width:20px;"><i class="xi-plus"></i></button>
        <span style="font-size:11px; color:var(--sub-color); margin-left:2px;">px</span>
    </div>
</div>

            <input type="text" id="hasion-search" autocomplete="off" placeholder="Search">
            <i class="xi-search" id="search-icon" title="Search"></i>

    </div>
    
    <div id="tags-panel"></div>

    <div class="hasion-paper-input">
        <input type="text" id="hasion-title" class="hasion-title-input" autocomplete="off" placeholder="Title">

        <input type="text" id="hasion-tags" class="hasion-title-input" style="font-size: 12px; margin-top: 15px; margin-bottom: 0;" autocomplete="off" placeholder="Tags (예: #기록 #사진)">

        <div class="hasion-footer-input">

<script>
    var HASION_URL = 'https://dvalxqujceuhfshatilq.supabase.co';
    var HASION_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2YWx4cXVqY2V1aGZzaGF0aWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzg3MTksImV4cCI6MjA5NzIxNDcxOX0.6ZabNquhVkOnboWyQPSybP6S5S5iGjjYcpspcLM0vr0';
    var hasionSupabase = window.supabase.createClient(HASION_URL, HASION_KEY);

    /* --- [에디터 & 툴바 로직] --- */
    var savedSelectionRange = null;
    window.saveSelection = function() {
        var selection = window.getSelection();
        if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0);
    };

    window.applyCustomColor = function(command, color) {
        if (savedSelectionRange) {
            var selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(savedSelectionRange);
        }
        document.execCommand(command, false, color); checkSelection();
    };

    // 정확한 픽셀 사이즈 적용 (HTML DOM 제어 방식)
    window.applyExactFontSize = function(size) {
        if (savedSelectionRange) {
            var selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(savedSelectionRange);
        } else {
            var editor = document.activeElement;
            if(!editor || editor.getAttribute('contenteditable') !== 'true') return;
        }
        
        document.execCommand("fontSize", false, "7"); // 폰트 사이즈 7로 임시 마킹
        var fontElements = document.getElementsByTagName("font");
        for (var i = 0; i < fontElements.length; i++) {
            if (fontElements[i].size == "7") {
                fontElements[i].removeAttribute("size");
                fontElements[i].style.fontSize = size + "px"; // 픽셀 크기로 교체
            }
        }
        checkSelection();
    };

    // 플러스, 마이너스 버튼 제어 로직
    window.adjustFontSize = function(delta) {
        var input = document.getElementById('fontSizeInput');
        var currentSize = parseInt(input.value) || 13;
        var newSize = currentSize + delta;
        if(newSize < 8) newSize = 8;
        if(newSize > 72) newSize = 72;
        input.value = newSize;
        applyExactFontSize(newSize);
    };

    function checkSelection() {
        setTimeout(() => {
            var selection = window.getSelection();
            var toolbar = document.getElementById('format-toolbar');
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                var node = selection.anchorNode;
                var isInsideEditor = false;
                while (node) {
                    if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') { isInsideEditor = true; break; }
                    node = node.parentNode;
                }
                if (isInsideEditor) {
                    var range = selection.getRangeAt(0);
                    var rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    var top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    var left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8;
                    if (left < 10) left = 10;
                    toolbar.style.top = top + 'px'; toolbar.style.left = left + 'px';
                } else { toolbar.style.display = 'none'; }
            } else { toolbar.style.display = 'none'; }
        }, 100);
    }
    document.addEventListener('selectionchange', checkSelection);
    document.addEventListener('mouseup', checkSelection);
    document.addEventListener('touchend', checkSelection);

    window.formatText = function(command, value = null) { document.execCommand(command, false, value); checkSelection(); };
    window.applyColor = function(textColor, bgColor) { document.execCommand('foreColor', false, textColor); document.execCommand('backColor', false, bgColor); checkSelection(); };

    function setDefaultDate() {
        var today = new Date();
        var yyyy = today.getFullYear();
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var dd = String(today.getDate()).padStart(2, '0');
        $('#hasion-date-picker').val(`${yyyy}-${mm}-${dd}`);
    }

    $('#hasion-file-input').on('change', async function(e) {
        var files = Array.from(e.target.files);
        if(!files.length) return;
        
        var earliestDate = new Date();
        var minTime = Infinity;
        files.forEach(f => {
            if(f.lastModified < minTime) {
                minTime = f.lastModified;
                earliestDate = new Date(f.lastModified);
            }
        });
        
        var yyyy = earliestDate.getFullYear();
        var mm = String(earliestDate.getMonth()+1).padStart(2, '0');
        var dd = String(earliestDate.getDate()).padStart(2, '0');
        $('#hasion-date-picker').val(`${yyyy}-${mm}-${dd}`);
        
        $('#submit-btn').prop('disabled', true).css('opacity', '0.3');
        $('.hasion-img-add-btn').css('opacity', '0.3');
        
        for(var file of files) {
            var fileExt = file.name.split('.').pop();
            var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            var { error } = await hasionSupabase.storage.from('images').upload(fileName, file);
            
            if(!error) {
                var { data } = hasionSupabase.storage.from('images').getPublicUrl(fileName);
                var imgHtml = `
                    <span class="editor-img-wrap img-full" contenteditable="false">
                        <img src="${data.publicUrl}">
                        <div class="img-del-btn" onclick="this.parentElement.remove()" title="삭제"><i class="xi-close"></i></div>
                    </span>&nbsp;
                `;
                $('#hasion-content').focus();
                document.execCommand('insertHTML', false, imgHtml);
            }
        }
        
        $('#submit-btn').prop('disabled', false).css('opacity', '0.7');
        $('.hasion-img-add-btn').css('opacity', '1');
        $(this).val('');
    });

    $(document).on('click', '.editor-img-wrap', function(e) {
        if ($(this).closest('.read-mode').length > 0) return; 
        
        e.preventDefault();
        if($(this).hasClass('img-full')) {
            $(this).removeClass('img-full').addClass('img-half');
        } else if($(this).hasClass('img-half')) {
            $(this).removeClass('img-half').addClass('img-third');
        } else {
            $(this).removeClass('img-third').addClass('img-full');
        }
    });

    // 데이터 로드
    async function loadHasionPosts() {
        var feedContainer = $('#hasion-feed');
        feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">Loading...</p>');

        try {
            var { data, error } = await hasionSupabase.from('posts').select('*').eq('category', 'hasion');
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">작성된 기록이 없습니다.</p>');
                return;
            }

            data.sort((a, b) => {
                var dateA = a.created_at.split('T')[0];
                var dateB = b.created_at.split('T')[0];
                if (dateA === dateB) return b.id - a.id; 
                return new Date(dateB) - new Date(dateA);
            });

            var allTags = new Set();

            data.forEach(post => {
                var dateObj = new Date(post.created_at);
                var yyyy = dateObj.getFullYear();
                var mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                var dd = String(dateObj.getDate()).padStart(2, '0');
                var displayDate = `${yyyy}.${mm}.${dd}`;
                var inputDate = `${yyyy}-${mm}-${dd}`; 

                var contentHtml = post.content;
                var tagsText = "";
                
                // 1. 데이터 분리 (본문 ||| 태그)
                if (post.content && post.content.includes("|||")) {
                    var parts = post.content.split("|||");
                    contentHtml = parts[0];
                    tagsText = parts[1] || "";
                }

                // 2. [가장 중요한 핵심] 백틱(```) 코드를 분석하여 실제 HTML/JS 캔버스로 변환!
                var displayContent = contentHtml.replace(/```([\s\S]*?)```/g, function(match, innerHtml) {
                    var temp = document.createElement('div');
                    // 에디터가 임의로 생성한 태그들을 순수 텍스트 줄바꿈으로 디코딩
                    var formattedHtml = innerHtml.replace(/<br\s*\/?>/gi, '\n')
                                                 .replace(/<\/div>/gi, '\n')
                                                 .replace(/<\/p>/gi, '\n');
                    temp.innerHTML = formattedHtml;
                    var rawCode = temp.textContent || temp.innerText || "";
                    
                    // 철벽 렌더링 박스로 포장해서 리턴 (안에서 스크립트도 렌더링됨)
                    return `<div class="custom-html-box" contenteditable="false">${rawCode}</div>`;
                });

                // 태그 파싱 (#단어)
                var matches = tagsText.match(/#[^\s#]+/g);
                if(matches) matches.forEach(m => allTags.add(m));

                var safeTitle = post.title ? post.title.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                var safeTags = tagsText ? tagsText.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                
                var searchText = `${post.title || ''} ${tagsText} ${displayDate}`;
                var tagsDisplayHtml = tagsText ? `<div style="font-size: 11.5px; color: var(--point-color); margin-top: 15px; cursor: pointer; opacity:0.8;" onclick="triggerTagSearch('${safeTags}')">${tagsText}</div>` : "";

                var postHtml = `
                    <div class="feed-item fade-in-element" id="post-${post.id}" data-search="${searchText}">
                        <div class="hasion-accordion-header" id="accordion-header-${post.id}" onclick="toggleHasionAccordion(${post.id})">
                            <span style="flex:1; font-weight:600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${post.title || '무제'}</span>
                            <span style="font-size:11px; color:var(--sub-color); margin-left:15px; flex-shrink:0;">${displayDate}</span>
                        </div>
                        
                        <div class="hasion-accordion-body" id="accordion-body-${post.id}">
                            <div class="read-mode">
                                <!-- 여기서 디코딩된 코드가 실제 화면으로 나옴! -->
                                <div class="feed-text">${displayContent}</div>
                                ${tagsDisplayHtml}
                                
                                <div class="read-actions" style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                                    <i class="xi-pen" onclick="startHasionEdit(${post.id})" title="수정" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='0.35'"></i>
                                    <i class="xi-trash" onclick="deleteHasionPost(${post.id})" title="삭제" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'; this.style.color='#ff3b30'" onmouseout="this.style.opacity='0.35'; this.style.color='var(--sub-color)'"></i>
                                </div>
                            </div>
                            
                            <div class="edit-mode" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
                                <input type="text" id="edit-title-${post.id}" value="${post.title || ''}" placeholder="Title" style="width:100%; margin-bottom:5px; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; font-weight:600; padding:6px 0; outline:none; text-align:center;">
                                
                                <!-- 에디터(수정 모드)에서는 렌더링된 코드가 아닌 백틱이 살아있는 원본 contentHtml 주입! -->
                                <div id="edit-content-${post.id}" class="hasion-editor" contenteditable="true" spellcheck="false" style="min-height: 150px; border: 1px solid var(--point-color); border-radius:4px; padding: 15px;">${contentHtml}</div>
                                
                                <input type="text" id="edit-tags-${post.id}" value="${safeTags}" placeholder="Tags" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:12px; padding:4px 0; outline:none;">
                                
                                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px;">
                                    <input type="date" id="edit-date-${post.id}" value="${inputDate}" style="width: 110px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
                                    
                                    <div style="display: flex; gap: 12px; align-items: center;" id="edit-actions-${post.id}">
                                        <label for="edit-file-${post.id}" class="hasion-img-add-btn" style="margin:0; font-size:16px;" title="사진 추가"><i class="xi-image-o"></i></label>
                                        <input type="file" id="edit-file-${post.id}" accept="image/*" multiple style="display:none;" onchange="uploadEditImages(${post.id}, this)">
                                        <button onclick="saveHasionEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11.5px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                                        <button onclick="cancelHasionEdit(${post.id})" style="background:none; border:none; color:var(--sub-color); font-size: 11.5px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });

            if (allTags.size > 0) {
                var tagsHtml = Array.from(allTags).map(tag => `<span class="tag-pill" onclick="triggerTagSearch('${tag}')">${tag}</span>`).join('');
                $('#tags-panel').html(tagsHtml);
            } else {
                $('#tags-panel').html('<span style="font-size:11px; color:var(--sub-color);">태그가 없습니다.</span>');
            }

            // [마법] 렌더링 된 커스텀 HTML 박스 안에 있는 <script> 태그 실행을 보장합니다.
            setTimeout(() => {
                $('.custom-html-box script').each(function() {
                    try { eval($(this).text()); } catch(e) {}
                });
            }, 100);

        } catch (error) {
            feedContainer.html('<p style="text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">Failed to load.</p>');
        }
    }

    window.toggleHasionAccordion = function(id) {
        var header = $(`#accordion-header-${id}`);
        var body = $(`#accordion-body-${id}`);
        header.toggleClass('open');
        body.slideToggle(400); 
    };

    window.uploadEditImages = async function(id, inputEl) {
        var files = Array.from(inputEl.files);
        if(!files.length) return;
        
        var btnWrap = $(`#edit-actions-${id}`);
        btnWrap.css('opacity', '0.3').css('pointer-events', 'none');
        
        for(var file of files) {
            var fileExt = file.name.split('.').pop();
            var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            var { error } = await hasionSupabase.storage.from('images').upload(fileName, file);
            if(!error) {
                var { data } = hasionSupabase.storage.from('images').getPublicUrl(fileName);
                var imgHtml = `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${data.publicUrl}"><div class="img-del-btn" onclick="this.parentElement.remove()" title="삭제"><i class="xi-close"></i></div></span>&nbsp;`;
                $(`#edit-content-${id}`).append(imgHtml);
            }
        }
        btnWrap.css('opacity', '1').css('pointer-events', 'auto');
        $(inputEl).val('');
    };

    window.addHasionPost = async function() {
        var titleVal = $('#hasion-title').val().trim();
        var contentVal = $('#hasion-content').html().trim();
        var tagsVal = $('#hasion-tags').val().trim();
        var dateVal = $('#hasion-date-picker').val();

        if (!contentVal || contentVal === '<br>') return; 

        var finalContent = contentVal + "|||" + tagsVal;

        try {
            $('#submit-btn').prop('disabled', true);
            
            var finalDate = new Date();
            if (dateVal) {
                var parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            var offset = finalDate.getTimezoneOffset() * 60000;
            var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            var { error } = await hasionSupabase.from('posts').insert([{ 
                category: 'hasion', 
                title: titleVal, 
                content: finalContent, 
                created_at: localISOString 
            }]);
            
            if (error) throw error;
            
            $('#hasion-title').val('');
            $('#hasion-content').html(''); 
            $('#hasion-tags').val('');
            $('#hasion-search').val('').trigger('blur');
            setDefaultDate(); 
            
            loadHasionPosts();
        } catch (error) {
            alert('기록을 남기지 못했습니다.');
        } finally {
            $('#submit-btn').prop('disabled', false);
        }
    };

    window.startHasionEdit = function(id) {
        var postEl = $(`#post-${id}`);
        postEl.find('.read-mode').hide();
        postEl.find('.edit-mode').fadeIn(200).css('display', 'flex');
    };
    
    window.cancelHasionEdit = function(id) {
        var postEl = $(`#post-${id}`);
        postEl.find('.edit-mode').hide();
        postEl.find('.read-mode').fadeIn(200).css('display', 'block');
    };

    window.saveHasionEdit = async function(id) {
        var newTitle = $(`#edit-title-${id}`).val().trim();
        var newContent = $(`#edit-content-${id}`).html().trim();
        var newTags = $(`#edit-tags-${id}`).val().trim();
        var newDateStr = $(`#edit-date-${id}`).val();
        
        if (!newContent || newContent === '<br>') { alert("내용을 적어주세요."); return; }

        var finalContent = newContent + "|||" + newTags;

        try {
            var finalDate = new Date();
            if (newDateStr) {
                var parts = newDateStr.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            var offset = finalDate.getTimezoneOffset() * 60000;
            var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            var { error } = await hasionSupabase.from('posts').update({ 
                title: newTitle, 
                content: finalContent, 
                created_at: localISOString 
            }).eq('id', id);
            
            if (error) throw error;
            loadHasionPosts();
        } catch (error) { alert('수정에 실패했습니다.'); }
    };

    window.deleteHasionPost = async function(id) {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        try {
            var { error } = await hasionSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadHasionPosts();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    };

    $('#tags-toggle-btn').click(function() {
        $('#tags-panel').slideToggle(200);
        $(this).toggleClass('active');
    });

    window.triggerTagSearch = function(tagText) {
        if(!tagText) return;
        var pureTag = tagText.match(/#[^\s#]+/)[0] || tagText;
        $('#hasion-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).val(pureTag).focus();
        $('#search-icon').css('opacity', '0.7');
        $('#hasion-search').trigger('input'); 
    };

    $('#search-icon').click(function() {
        $('#hasion-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    $('#hasion-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });
    
    $('#hasion-search').on('input', function() {
        var keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            var dataText = $(this).attr('data-search').toLowerCase();
            var bodyText = $(this).find('.feed-text').text().toLowerCase();
            
            if (dataText.includes(keyword) || bodyText.includes(keyword)) { 
                $(this).show(); 
            } else { 
                $(this).hide(); 
            }
        });
    });

    var hasionTimeout = setTimeout(() => { 
        setDefaultDate();
        loadHasionPosts(); 
    }, 100);
</script>
