<!-- 파일명: category/memo.html -->
<style>
    /* ==========================================================================
       [디자인] 편지지 테마의 완벽한 메모장 UI
       ========================================================================== */
    .memo-wrapper {
        position: relative;
        padding-top: 10px;
    }

    /* 검색창 레이아웃: 모바일 햄버거 버튼과 겹치지 않게 본문 위로 독립 배치 */
    .search-wrapper {
        display: flex; justify-content: flex-end; margin-bottom: 25px; width: 100%;
    }
    .search-inner { position: relative; display: flex; align-items: center; }
    #memo-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    /* 편지지 배경 */
    .memo-paper-input {
        border: 0.5px solid var(--point-color); padding: 30px 25px 25px 25px; margin-bottom: 12px;
        position: relative; background-image: linear-gradient(var(--divider-bg) 1px, transparent 1px);
        background-size: 100% 32px; border-radius: 2px; transition: height 0.2s ease;
    }

    /* [요청 추가] 제목 입력칸 (미니멀, 가운데 정렬, 본문보다 작은 폰트) */
    .memo-title-input {
        display: block; margin: 0 auto 15px auto; width: 100%; max-width: 250px;
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        text-align: center; outline: none; padding: 4px 0; transition: border-color 0.3s ease;
    }
    .memo-title-input:focus { border-bottom-color: var(--point-color); }

    /* To & From 라벨 */
    .memo-label {
        font-family: 'Noto Serif KR', serif; font-size: 13px;
        color: var(--sub-color); font-weight: 600; margin-right: 10px; transition: color 0.3s ease;
    }
    .memo-label.active { color: var(--point-color); }
    
    .memo-header-input { display: flex; align-items: center; margin-bottom: 10px; }
    .memo-to-input, .memo-from-input {
        background: transparent; border: none; outline: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
    }
    .memo-to-input { width: 150px; }
    .memo-from-input { width: 100px; text-align: left; }

    /* 본문 텍스트 에어리어 & Placeholder */
    .memo-textarea {
        width: 100%; min-height: 96px; background: transparent; border: none; resize: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
        line-height: 32px; outline: none; padding: 0; overflow: hidden; position: relative; z-index: 2;
    }
    .memo-placeholder {
        position: absolute; top: 0; left: 0; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 13px; line-height: 32px;
        pointer-events: none; opacity: 0.5; transition: opacity 0.3s ease; z-index: 1;
    }
    .blinking-cursor { animation: blink 1s step-end infinite; font-weight: 400; }
    @keyframes blink { 50% { opacity: 0; } }

    /* 하단 날짜, From 영역 */
    .memo-footer-input { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .memo-date-picker {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s;
    }
    .memo-date-picker:hover { opacity: 1; }

    /* 화살표 전송 버튼 */
    .memo-submit-container { display: flex; justify-content: flex-end; margin-bottom: 45px; padding-right: 10px; }
    .memo-submit-btn {
        background: none; border: none; color: var(--point-color); cursor: pointer;
        font-size: 24px; padding: 5px; opacity: 0.6; transition: opacity 0.2s, transform 0.2s;
    }
    .memo-submit-btn:hover { opacity: 1; transform: translateX(5px); }

    /* ==========================================================================
       [기능] 아코디언 리스트 레이아웃 (새로운 피드 디자인)
       ========================================================================== */
    .memo-accordion-header {
        font-size: 13px; font-family: 'Noto Serif KR', serif; font-weight: bold;
        color: var(--main-color); cursor: pointer; padding: 18px 0;
        border-bottom: 1px solid var(--divider-bg); transition: color 0.3s ease;
        display: flex; align-items: center;
    }
    /* 클릭되어 열렸을 때 (포인트 색상) */
    .memo-accordion-header.open { color: var(--point-color); border-bottom-color: transparent; }
    .memo-accordion-header:hover { color: var(--point-color); }
    
    .memo-accordion-body {
        display: none; padding: 10px 0 25px 0; border-bottom: 1px solid var(--divider-bg);
    }

    /* 이미지 최적화 및 팝업(라이트박스) */
    .memo-img-container { margin: 15px 0; text-align: left; }
    .memo-attached-img {
        max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 2px;
        cursor: pointer; border: 1px solid var(--divider-bg); transition: opacity 0.2s ease;
    }
    .memo-attached-img:hover { opacity: 0.85; }
    .memo-img-caption { display: block; font-size: 11px; color: var(--sub-color); margin-top: 6px; font-style: italic; }

    .memo-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .memo-lightbox img {
        max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: memoZoom 0.25s ease-out;
    }
    @keyframes memoZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 본문 (모바일 양끝 정렬 대응) */
    .memo-read-mode { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    @media (max-width: 768px) {
        .memo-read-mode { flex-direction: column-reverse; gap: 4px; }
        .memo-read-mode .feed-text { width: 100%; display: block; }
        .memo-read-mode .feed-time { width: 100%; padding-bottom: 4px; }
    }
</style>

<div class="memo-wrapper">
    
    <div class="search-wrapper">
        <div class="search-inner">
            <input type="text" id="memo-search" autocomplete="off" placeholder="검색">
            <i class="xi-search" id="search-icon" title="검색 열기"></i>
        </div>
    </div>

    <!-- 편지지 테마 -->
    <div class="memo-paper-input">
        
        <!-- [요청 추가] 제목 입력 영역 -->
        <input type="text" id="memo-title" class="memo-title-input" autocomplete="off" placeholder="제목을 적어주세요 (선택)">
        
        <div class="memo-header-input">
            <span class="memo-label" id="label-to">To.</span>
            <input type="text" id="memo-to" class="memo-to-input" autocomplete="off">
        </div>

        <div style="position: relative; width: 100%;">
            <div id="memo-placeholder" class="memo-placeholder">
                글을 적어 내려가세요<span class="blinking-cursor">|</span>
            </div>
            <textarea id="memo-content" class="memo-textarea"></textarea>
        </div>

        <div class="memo-footer-input">
            <input type="date" id="memo-date-picker" class="memo-date-picker" title="날짜 변경">
            <div style="display: flex; align-items: center;">
                <span class="memo-label" id="label-from">from.</span>
                <input type="text" id="memo-from" class="memo-from-input" autocomplete="off">
            </div>
        </div>
    </div>
    
    <div class="memo-submit-container">
        <button class="memo-submit-btn" onclick="addMemoPost()" title="전송">
            <i class="xi-arrow-right"></i>
        </button>
    </div>
    
    <!-- 피드 목록 영역 -->
    <div class="feed-container" id="memo-feed"></div>
</div>

<!-- 원본 이미지 보기 라이트박스 -->
<div id="memo-lightbox" class="memo-lightbox" onclick="closeMemoLightbox()">
    <img id="lightbox-img" src="" alt="원본 이미지">
</div>

<script>
    const MEMO_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    const MEMO_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    const memoSupabase = window.supabase.createClient(MEMO_URL, MEMO_KEY);

    $('#memo-to').on('focus', function() { $('#label-to').addClass('active'); }).on('blur', function() { $('#label-to').removeClass('active'); });
    $('#memo-from').on('focus', function() { $('#label-from').addClass('active'); }).on('blur', function() { $('#label-from').removeClass('active'); });

    $('#memo-content').on('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
    $('#memo-content').on('input focus', function() {
        if ($(this).val().length > 0 || $(this).is(':focus')) { $('#memo-placeholder').css('opacity', '0'); } 
        else { $('#memo-placeholder').css('opacity', '0.5'); }
    }).on('blur', function() {
        if ($(this).val().length === 0) { $('#memo-placeholder').css('opacity', '0.5'); }
    });

    function setDefaultDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        $('#memo-date-picker').val(`${yyyy}-${mm}-${dd}`);
    }

    // 1. 메모 로드
    async function loadMemoPosts() {
        const feedContainer = $('#memo-feed');
        feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">서랍을 여는 중입니다...</p>');

        try {
            const { data, error } = await memoSupabase.from('posts').select('*').eq('category', 'memo').order('created_at', { ascending: false });
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">아직 남겨진 편지가 없습니다.</p>');
                return;
            }

            data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            data.forEach(post => {
                const dateObj = new Date(post.created_at);
                const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const dayStr = days[dateObj.getDay()];

                const editDateString = `${yyyy}-${mm}-${dd}`;
                const displayTimeHTML = `<span style="font-size: 11px;">${yyyy}년 ${mm}월 ${dd}일 ${dayStr}</span>`;
                
                // [요청 추가] 제목 유무에 따라 아코디언 헤더(리스트 제목) 결정
                const fallbackTitle = `${yyyy}년 ${mm}월 ${dd}일 ${dayStr}`;
                const displayTitle = post.title ? post.title : fallbackTitle;

                const safeContent = post.content.replace(/"/g, '&quot;');
                const parsedContent = parseMemoMarkdown(post.content);

                // [요청 추가] 아코디언 구조로 감싼 피드 아이템
                const postHtml = `
                    <div class="feed-item fade-in-element" id="post-${post.id}">
                        
                        <!-- 리스트 제목 (클릭 시 펼쳐짐) -->
                        <div class="memo-accordion-header" id="accordion-header-${post.id}" onclick="toggleMemoAccordion(${post.id})">
                            ${displayTitle}
                        </div>
                        
                        <!-- 숨겨진 본문 영역 -->
                        <div class="memo-accordion-body" id="accordion-body-${post.id}">
                            <div class="read-mode memo-read-mode">
                                <span class="feed-text" style="color: var(--main-color); font-family: 'Noto Serif KR', serif; line-height: 1.8; word-break: break-all; font-size: 13px; flex: 1; white-space: pre-wrap;">${parsedContent}</span>
                                
                                <span class="feed-time" onclick="toggleMemoAdminMenu(${post.id})" title="클릭하여 글 관리" style="color: var(--sub-color); font-family: 'Noto Serif KR', serif; opacity: 0.8; white-space: nowrap; padding-top: 2px; cursor: pointer; z-index: 5;">
                                    ${displayTimeHTML}
                                </span>
                            </div>
                            
                            <!-- 수정 모드 -->
                            <div class="edit-mode" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
                                <input type="text" id="edit-title-${post.id}" value="${post.title || ''}" placeholder="제목 (선택)" style="width:100%; margin-bottom:5px; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:12px; padding:4px 0; outline:none; text-align:center;">
                                <textarea id="edit-content-${post.id}" style="width: 100%; height: 150px; background: transparent; border: 1px solid var(--point-color); border-radius:2px; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px; padding: 15px; outline: none; line-height:1.7;">${safeContent}</textarea>
                                <input type="date" id="edit-date-${post.id}" value="${editDateString}" style="width: 120px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
                            </div>
                            
                            <div class="admin-menu" id="admin-menu-${post.id}" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                                <button onclick="startMemoEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">수정</button>
                                <button onclick="deleteMemoPost(${post.id})" style="background:none; border:none; color:#ff3b30; font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">삭제</button>
                            </div>

                            <div class="edit-actions" id="edit-actions-${post.id}" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                                <button onclick="saveMemoEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                                <button onclick="cancelMemoEdit(${post.id})" style="background:none; border:none; color:var(--sub-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });
        } catch (error) {
            feedContainer.html('<p style="text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">기록을 불러오지 못했습니다.</p>');
        }
    }

    // [요청 추가] 아코디언 토글 애니메이션 로직
    window.toggleMemoAccordion = function(id) {
        const header = $(`#accordion-header-${id}`);
        const body = $(`#accordion-body-${id}`);
        header.toggleClass('open');
        body.slideToggle(250); // 부드럽게 열리고 닫힘
    };

    function parseMemoMarkdown(content) {
        let text = content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const imgRegex = /\[(.*?)\]\((.*?)\)/g;
        return text.replace(imgRegex, function(match, name, url) {
            return `<div class="memo-img-container"><img src="${url}" alt="${name}" class="memo-attached-img" onclick="openMemoLightbox('${url}')"><span class="memo-img-caption"># ${name}</span></div>`;
        });
    }

    // 메모 전송 (제목 추가 완료)
    async function addMemoPost() {
        const titleVal = $('#memo-title').val().trim();
        const toVal = $('#memo-to').val().trim();
        const contentVal = $('#memo-content').val().trim();
        const fromVal = $('#memo-from').val().trim();
        const dateVal = $('#memo-date-picker').val();

        if (!contentVal) return; 

        let finalContent = "";
        if (toVal) finalContent += `To. ${toVal}\n\n`;
        finalContent += contentVal;
        if (fromVal) finalContent += `\n\nfrom. ${fromVal}`;

        try {
            $('.memo-submit-btn').prop('disabled', true);
            
            let finalDate = new Date();
            if (dateVal) {
                const parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const localISOString = finalDate.toISOString();

            // [핵심] title 컬럼을 추가하여 데이터베이스에 저장
            const { error } = await memoSupabase.from('posts').insert([{ 
                category: 'memo', 
                title: titleVal, 
                content: finalContent, 
                created_at: localISOString 
            }]);
            
            if (error) throw error;
            
            $('#memo-title').val('');
            $('#memo-to').val('');
            $('#memo-content').val('').css('height', '96px');
            $('#memo-from').val('');
            $('#memo-search').val('').trigger('blur');
            $('#memo-title, #memo-to, #memo-from, #memo-content').blur();
            setDefaultDate(); 
            
            loadMemoPosts();
        } catch (error) {
            alert('기록을 남기지 못했습니다. 데이터베이스에 title 컬럼이 추가되었는지 확인해주세요.');
        } finally {
            $('.memo-submit-btn').prop('disabled', false);
        }
    }

    // 라이트박스
    function openMemoLightbox(src) {
        $('#lightbox-img').attr('src', src);
        $('#memo-lightbox').css('display', 'flex').fadeIn(150);
    }
    function closeMemoLightbox() { $('#memo-lightbox').fadeOut(150); }

    function toggleMemoAdminMenu(id) {
        if ($(`#post-${id} .edit-mode`).is(':visible')) return;
        $(`#admin-menu-${id}`).slideToggle(150).css('display', 'flex');
    }
    function startMemoEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.read-mode').hide();
        postEl.find('.admin-menu').hide();
        postEl.find('.edit-mode').fadeIn(200).css('display', 'flex');
        postEl.find('.edit-actions').fadeIn(200).css('display', 'flex');
    }
    function cancelMemoEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.edit-mode').hide();
        postEl.find('.edit-actions').hide();
        postEl.find('.read-mode').fadeIn(200).css('display', 'flex');
    }

    // 수정 시 제목도 함께 업데이트
    async function saveMemoEdit(id) {
        const newTitle = $(`#edit-title-${id}`).val().trim();
        const newContent = $(`#edit-content-${id}`).val().trim();
        const newDateStr = $(`#edit-date-${id}`).val();
        
        if (!newContent) { alert("내용을 적어주세요."); return; }

        try {
            let finalDate = new Date();
            if (newDateStr) {
                const parts = newDateStr.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const localISOString = finalDate.toISOString();

            const { error } = await memoSupabase.from('posts').update({ 
                title: newTitle, 
                content: newContent, 
                created_at: localISOString 
            }).eq('id', id);
            
            if (error) throw error;
            loadMemoPosts();
        } catch (error) { alert('수정에 실패했습니다.'); }
    }

    async function deleteMemoPost(id) {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        try {
            const { error } = await memoSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadMemoPosts();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    }

    // 검색 (제목까지 포함해서 검색되도록 개선)
    $('#search-icon').click(function() {
        $('#memo-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    $('#memo-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });
    $('#memo-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            const title = $(this).find('.memo-accordion-header').text().toLowerCase();
            const text = $(this).find('.feed-text').text().toLowerCase();
            const time = $(this).find('.feed-time').text().toLowerCase();
            
            // 제목, 본문, 날짜 중 하나라도 포함되면 표시
            if ((title + " " + text + " " + time).includes(keyword)) { $(this).show(); } else { $(this).hide(); }
        });
    });

    // 로드
    setTimeout(() => { 
        setDefaultDate();
