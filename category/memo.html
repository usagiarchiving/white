<style>
    /* ==========================================================================
       [디자인] 편지지 테마의 완벽한 메모장 UI & 웹 에디터 엔진
       ========================================================================== */
    .memo-wrapper {
        position: relative;
        padding-top: 10px;
    }

    /* 검색창 레이아웃 */
    .search-wrapper { display: flex; justify-content: flex-end; margin-bottom: 25px; width: 100%; }
    .search-inner { position: relative; display: flex; align-items: center; }
    #memo-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    /* 제목 입력칸 */
    .memo-title-input {
        display: block; margin: 0 auto 15px auto; width: 100%; max-width: 250px;
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        text-align: center; outline: none; padding: 4px 0; transition: border-color 0.3s ease;
    }
    .memo-title-input:focus { border-bottom-color: var(--point-color); }

    /* 편지지 배경 */
    .memo-paper-input {
        border: 0.5px solid var(--point-color); padding: 30px 25px 25px 25px; margin-bottom: 12px;
        position: relative; background-image: linear-gradient(var(--divider-bg) 1px, transparent 1px);
        background-size: 100% 32px; border-radius: 2px; transition: height 0.2s ease;
    }

    /* To & From 라벨 */
    .memo-label {
        font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--sub-color); 
        font-weight: 600; margin-right: 10px; transition: color 0.3s ease;
    }
    .memo-label.active { color: var(--point-color); }
    
    .memo-header-input { display: flex; align-items: center; margin-bottom: 10px; }
    .memo-to-input, .memo-from-input {
        background: transparent; border: none; outline: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
    }
    .memo-to-input { width: 150px; }
    .memo-from-input { width: 100px; text-align: left; }

    /* 본문 텍스트 에어리어를 웹 에디터(contenteditable div)로 교체 */
    .memo-editor {
        width: 100%; min-height: 96px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px;
        line-height: 32px; outline: none; padding: 0; position: relative; z-index: 2;
        word-break: break-all;
    }

    /* Placeholder 위치 조정 */
    .memo-placeholder {
        position: absolute; top: 0; left: 0; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 13px; line-height: 32px;
        pointer-events: none; opacity: 0.5; transition: opacity 0.3s ease; z-index: 1;
    }

    /* 하단 날짜, From 영역 */
    .memo-footer-input { display: flex; flex-direction: column; align-items: flex-end; margin-top: 12px; gap: 0px; }
    .memo-date-picker {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s;
        margin-bottom: 0px; 
    }
    .memo-date-picker:hover { opacity: 1; }

    /* 화살표 전송 버튼 */
    .memo-submit-container { display: flex; justify-content: flex-end; margin-bottom: 45px; padding-right: 10px; }
    .memo-submit-btn {
        background: none; border: none; color: var(--point-color); cursor: pointer;
        font-size: 24px; padding: 5px; opacity: 0.6; transition: opacity 0.2s, transform 0.2s;
    }
    .memo-submit-btn:hover { opacity: 1; transform: translateX(5px); }

    /* ==========================================================================
       [기능] 드래그 서식 툴바 (노션 스타일)
       ========================================================================== */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999;
        align-items: center; gap: 4px; 
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        user-select: none; 
    }
    .format-toolbar button {
        background: none; border: none; color: var(--main-color); font-size: 14px;
        cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s;
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    
    /* [요청] 자유 색상 선택기 스타일 */
    .color-picker-label {
        display: flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; cursor: pointer; border-radius: 4px; transition: 0.2s;
        position: relative; overflow: hidden; margin: 0;
    }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker {
        position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        top: 0; left: 0; border: none; padding: 0;
    }

    /* 민트 & 핑크 프리셋 버튼 */
    .color-btn { 
        font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; 
        border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px;
    }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }

    /* ==========================================================================
       [기능] 아코디언 리스트 레이아웃 
       ========================================================================== */
    .memo-accordion-header {
        font-size: 13px; font-family: 'Noto Serif KR', serif; font-weight: normal; 
        color: var(--main-color); cursor: pointer; padding: 12px 0 4px 0; 
        border-bottom: 1px solid var(--divider-bg); transition: color 0.3s ease;
        display: flex; align-items: center;
    }
    .memo-accordion-header.open { color: var(--point-color); border-bottom-color: transparent; }
    .memo-accordion-header:hover { color: var(--point-color); }
    
    .memo-accordion-body { display: none; padding: 2px 0 25px 0; border-bottom: 1px solid var(--divider-bg); }

    /* 이미지 최적화 및 팝업(라이트박스) */
    .memo-img-container { margin: 15px 0; text-align: left; }
    .memo-attached-img {
        max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 2px;
        cursor: pointer; border: 1px solid var(--divider-bg); transition: opacity 0.2s ease;
    }
    .memo-attached-img:hover { opacity: 0.85; }
    .memo-img-caption { display: block; font-size: 11px; color: var(--sub-color); margin-top: 6px; font-style: italic; }

    .memo-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .memo-lightbox img {
        max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: memoZoom 0.25s ease-out;
    }
    @keyframes memoZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 본문 */
    .memo-read-mode { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    @media (max-width: 768px) {
        .memo-read-mode { flex-direction: column-reverse; gap: 4px; }
        .memo-read-mode .feed-text { width: 100%; display: block; }
        .memo-read-mode .feed-time { width: 100%; padding-bottom: 4px; }
    }
</style>

<div id="format-toolbar" class="format-toolbar">
    <button onmousedown="event.preventDefault(); formatText('bold')" title="굵게"><i class="xi-bold"></i></button>
    <button onmousedown="event.preventDefault(); formatText('italic')" title="기울임"><i class="xi-italic"></i></button>
    <button onmousedown="event.preventDefault(); formatText('underline')" title="밑줄"><i class="xi-underline"></i></button>
    <button onmousedown="event.preventDefault(); formatText('strikeThrough')" title="취소선"><i class="xi-strikethrough"></i></button>
    
    <div class="divider"></div>
    
    <label class="color-picker-label" title="텍스트 색상" onmousedown="saveSelection()">
        <i class="xi-font"></i>
        <input type="color" class="native-color-picker" oninput="applyCustomColor('foreColor', this.value)" onchange="applyCustomColor('foreColor', this.value)">
    </label>
    <label class="color-picker-label" title="배경 형광펜 색상" onmousedown="saveSelection()">

    <div class="divider"></div>
    
    <button onmousedown="event.preventDefault(); applyColor('#0E865E', '#E1F9F1')" title="민트 펜" class="color-btn btn-mint">M</button>
    <button onmousedown="event.preventDefault(); applyColor('#D04978', '#FDEDF4')" title="핑크 펜" class="color-btn btn-pink">P</button>
</div>

<script>
    const MEMO_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    const MEMO_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    const memoSupabase = window.supabase.createClient(MEMO_URL, MEMO_KEY);

    /* --- [에디터 & 툴바 핵심 로직] --- */
    
    let savedSelectionRange = null;

    // [추가] 색상 선택기를 열기 직전에 드래그된 텍스트 위치를 기억하는 마법
    window.saveSelection = function() {
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
            savedSelectionRange = selection.getRangeAt(0);
        }
    };

    // [추가] 색상 코드/팔레트에서 색을 골랐을 때 적용하는 마법
    window.applyCustomColor = function(command, color) {
        if (savedSelectionRange) {
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(savedSelectionRange);
        }
        document.execCommand(command, false, color);
        checkSelection();
    };

    // 선택 영역 감지 및 툴바 위치 계산
    function checkSelection() {
        setTimeout(() => {
            const selection = window.getSelection();
            const toolbar = document.getElementById('format-toolbar');
            
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                let node = selection.anchorNode;
                let isInsideEditor = false;
                
                // 선택 영역이 contenteditable 에디터 내부인지 확인
                while (node) {
                    if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') {
                        isInsideEditor = true; break;
                    }
                    node = node.parentNode;
                }
                
                if (isInsideEditor) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    
                    // 글자 바로 위에 툴바 띄우기
                    let top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    let left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    
                    // 모바일 화면 밖으로 나가지 않게 보정
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8;
                    if (left < 10) left = 10;
                    
                    toolbar.style.top = top + 'px';
                    toolbar.style.left = left + 'px';
                } else {
                    toolbar.style.display = 'none';
                }
            } else {
                toolbar.style.display = 'none';
            }
        }, 100);
    }

    document.addEventListener('selectionchange', checkSelection);
    document.addEventListener('mouseup', checkSelection);
    document.addEventListener('touchend', checkSelection);

    // 텍스트 서식 적용 함수
    window.formatText = function(command, value = null) {
        document.execCommand(command, false, value);
        checkSelection();
    };

    // 핑크, 민트 컬러 프리셋 적용 함수
    window.applyColor = function(textColor, bgColor) {
        document.execCommand('foreColor', false, textColor);
        document.execCommand('backColor', false, bgColor);
        checkSelection();
    };

    /* --- [UI 상호작용 로직] --- */

    $('#memo-to').on('focus', function() { $('#label-to').addClass('active'); }).on('blur', function() { $('#label-to').removeClass('active'); });
    $('#memo-from').on('focus', function() { $('#label-from').addClass('active'); }).on('blur', function() { $('#label-from').removeClass('active'); });

    function setDefaultDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        $('#memo-date-picker').val(`${yyyy}-${mm}-${dd}`);
    }

    // 1. 메모 로드
    async function loadMemoPosts() {
        const feedContainer = $('#memo-feed');
        feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">서랍을 여는 중입니다...</p>');

        try {
            const { data, error } = await memoSupabase.from('posts').select('*').eq('category', 'memo');
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">아직 남겨진 편지가 없습니다.</p>');
                return;
            }

            // 오직 날짜(YYYY-MM-DD) 기준 최신순 + 같은 날짜면 등록순 고정
            data.sort((a, b) => {
                const dateA = a.created_at.split('T')[0];
                const dateB = b.created_at.split('T')[0];
                if (dateA === dateB) return b.id - a.id; 
                return new Date(dateB) - new Date(dateA);
            });

            data.forEach(post => {
                const dateObj = new Date(post.created_at);
                const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const dayStr = days[dateObj.getDay()];

                const editDateString = `${yyyy}-${mm}-${dd}`;
                const displayTimeHTML = `<span style="font-size: 11px;">${yyyy}년 ${mm}월 ${dd}일 ${dayStr}</span>`;
                
                const fallbackTitle = `♡`;
                const displayTitle = post.title ? post.title : fallbackTitle;

                const rawContent = post.content;
                let displayContent = rawContent;
                if (!rawContent.includes('<div')) {
                    displayContent = displayContent.replace(/\n\nfrom\.\s*(.*)$/, '<div style="text-align: right; margin-top: 15px; color: var(--sub-color);">from. $1</div>');
                    displayContent = displayContent.replace(/^To\.\s*(.*?)\n\n/, '<div style="text-align: left; margin-bottom: 15px; color: var(--sub-color);">To. $1</div>');
                }
                
                const parsedContent = parseMemoMarkdown(displayContent);

                const postHtml = `
                    <div class="feed-item fade-in-element" id="post-${post.id}">
                        
                        <div class="memo-accordion-header" id="accordion-header-${post.id}" onclick="toggleMemoAccordion(${post.id})">
                            ${displayTitle}
                        </div>
                        
                        <div class="memo-accordion-body" id="accordion-body-${post.id}">
                            <div class="read-mode memo-read-mode">
                                <span class="feed-text" style="color: var(--main-color); font-family: 'Noto Serif KR', serif; line-height: 1.8; word-break: break-all; font-size: 13px; flex: 1; white-space: pre-wrap;">${parsedContent}</span>
                                
                                <span class="feed-time" style="color: var(--sub-color); font-family: 'Noto Serif KR', serif; opacity: 0.8; white-space: nowrap; z-index: 5;">
                                    ${displayTimeHTML}
                                </span>
                            </div>
                            
                            <div class="read-actions" id="read-actions-${post.id}" style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 15px;">
                                <i class="xi-pen" onclick="startMemoEdit(${post.id})" title="수정" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='0.35'"></i>
                                <i class="xi-trash" onclick="deleteMemoPost(${post.id})" title="삭제" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'; this.style.color='#ff3b30'" onmouseout="this.style.opacity='0.35'; this.style.color='var(--sub-color)'"></i>
                            </div>
                            
                            <div class="edit-mode" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
                                <input type="text" id="edit-title-${post.id}" value="${post.title || ''}" placeholder="title" style="width:100%; margin-bottom:5px; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:12px; padding:4px 0; outline:none; text-align:center;">
                                
                                <div id="edit-content-${post.id}" contenteditable="true" spellcheck="false" style="width: 100%; min-height: 150px; background: transparent; border: 1px solid var(--point-color); border-radius:2px; color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13px; padding: 15px; outline: none; line-height:1.7; word-break: break-all;">${displayContent}</div>
                                
                                <input type="date" id="edit-date-${post.id}" value="${editDateString}" style="width: 120px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
                            </div>

                            <div class="edit-actions" id="edit-actions-${post.id}" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                                <button onclick="saveMemoEdit(${post.id})" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                                <button onclick="cancelMemoEdit(${post.id})" style="background:none; border:none; color:var(--sub-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });
        } catch (error) {
            feedContainer.html('<p style="text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">기록을 불러오지 못했습니다.</p>');
        }
    }

    // 아코디언 애니메이션 
    window.toggleMemoAccordion = function(id) {
        const header = $(`#accordion-header-${id}`);
        const body = $(`#accordion-body-${id}`);
        header.toggleClass('open');
        body.slideToggle(500); 
    };

    function parseMemoMarkdown(content) {
        const imgRegex = /\[(.*?)\]\((.*?)\)/g;
        return content.replace(imgRegex, function(match, name, url) {
            return `<div class="memo-img-container"><img src="${url}" alt="${name}" class="memo-attached-img" onclick="openMemoLightbox('${url}')"><span class="memo-img-caption"># ${name}</span></div>`;
        });
    }

    // 메모 전송 (HTML 저장)
    async function addMemoPost() {
        const titleVal = $('#memo-title').val().trim();
        const toVal = $('#memo-to').val().trim();
        const contentVal = $('#memo-content').html().trim();
        const fromVal = $('#memo-from').val().trim();
        const dateVal = $('#memo-date-picker').val();

        if (!contentVal || contentVal === '<br>') return; 

        let finalContent = "";
        if (toVal) finalContent += `<div style="text-align: left; margin-bottom: 15px; color: var(--sub-color);">To. ${toVal}</div>`;
        finalContent += contentVal;
        if (fromVal) finalContent += `<div style="text-align: right; margin-top: 15px; color: var(--sub-color);">from. ${fromVal}</div>`;

        try {
            $('.memo-submit-btn').prop('disabled', true);
            
            let finalDate = new Date();
            if (dateVal) {
                const parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const localISOString = finalDate.toISOString();

            const { error } = await memoSupabase.from('posts').insert([{ 
                category: 'memo', 
                title: titleVal, 
                content: finalContent, 
                created_at: localISOString 
            }]);
            
            if (error) throw error;
            
            $('#memo-title').val('');
            $('#memo-to').val('');
            $('#memo-content').html(''); 
            $('#memo-from').val('');
            $('#memo-search').val('').trigger('blur');
            $('#memo-title, #memo-to, #memo-from, #memo-content').blur();
            setDefaultDate(); 
            
            loadMemoPosts();
        } catch (error) {
            alert('기록을 남기지 못했습니다.');
        } finally {
            $('.memo-submit-btn').prop('disabled', false);
        }
    }

    // 라이트박스
    function openMemoLightbox(src) {
        $('#lightbox-img').attr('src', src);
        $('#memo-lightbox').css('display', 'flex').fadeIn(150);
    }
    function closeMemoLightbox() { $('#memo-lightbox').fadeOut(150); }

    function startMemoEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.read-mode').hide();
        postEl.find('.read-actions').hide(); 
        postEl.find('.edit-mode').fadeIn(200).css('display', 'flex');
        postEl.find('.edit-actions').fadeIn(200).css('display', 'flex');
    }
    function cancelMemoEdit(id) {
        const postEl = $(`#post-${id}`);
        postEl.find('.edit-mode').hide();
        postEl.find('.edit-actions').hide();
        postEl.find('.read-mode').fadeIn(200).css('display', 'flex');
        postEl.find('.read-actions').fadeIn(200).css('display', 'flex'); 
    }

    async function saveMemoEdit(id) {
        const newTitle = $(`#edit-title-${id}`).val().trim();
        const newContent = $(`#edit-content-${id}`).html().trim();
        const newDateStr = $(`#edit-date-${id}`).val();
        
        if (!newContent) { alert("내용을 적어주세요."); return; }

        try {
            let finalDate = new Date();
            if (newDateStr) {
                const parts = newDateStr.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const localISOString = finalDate.toISOString();

            const { error } = await memoSupabase.from('posts').update({ 
                title: newTitle, 
                content: newContent, 
                created_at: localISOString 
            }).eq('id', id);
            
            if (error) throw error;
            loadMemoPosts();
        } catch (error) { alert('수정에 실패했습니다.'); }
    }

    async function deleteMemoPost(id) {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        try {
            const { error } = await memoSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadMemoPosts();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    }

    // 검색 
    $('#search-icon').click(function() {
        $('#memo-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    $('#memo-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });
    $('#memo-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.feed-item').each(function() {
            const title = $(this).find('.memo-accordion-header').text().toLowerCase();
            const text = $(this).find('.feed-text').text().toLowerCase();
            const time = $(this).find('.feed-time').text().toLowerCase();
            
            if ((title + " " + text + " " + time).includes(keyword)) { $(this).show(); } else { $(this).hide(); }
        });
    });

    // 로드
    setTimeout(() => { 
        setDefaultDate();
        loadMemoPosts(); 
    }, 100);
</script>
