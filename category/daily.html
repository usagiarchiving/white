<style>
    .daily-wrapper {
        position: relative;
        padding-top: 12px; 
        height: calc(100vh - 180px);
        min-height: 500px;
        display: flex;
        flex-direction: column;
    }

    .daily-top-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 15px; 
        margin-bottom: 25px; 
        width: 100%;
        flex-shrink: 0;
    }

    .search-inner { position: relative; display: flex; align-items: center; }
    #daily-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    .daily-write-btn {
        background: none; border: none; color: var(--sub-color); opacity: 0.35;
        font-size: 15px; cursor: pointer; transition: opacity 0.3s;
        padding: 6px; 
        display: flex; align-items: center; justify-content: center;
    }
    .daily-write-btn:hover { opacity: 0.7; color: var(--point-color); }

    .daily-header-bar {
        display: flex; flex-direction: column; align-items: center;
        margin-bottom: 30px; flex-shrink: 0;
    }
    .ym-selector-container {
        display: flex; align-items: center; justify-content: center;
    }
    #ym-display {
        font-family: 'Noto Serif KR', serif; font-size: 14.5px; font-weight: 400;
        letter-spacing: 3px; color: var(--main-color); cursor: pointer; transition: opacity 0.2s;
    }
    #ym-display:hover { opacity: 0.6; }
    #ym-picker {
        background: transparent; border: none; color: var(--main-color);
        font-family: 'Noto Serif KR', serif; font-size: 14.5px; letter-spacing: 2px;
        outline: none; cursor: pointer; text-align: center;
    }

    .daily-layout {
        display: flex; gap: 40px; flex: 1; overflow: hidden; 
    }
    @media (max-width: 768px) {
        .daily-layout { gap: 10px; } 
    }

    .daily-tabs {
        width: 35px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px;
        height: 100%; overflow-y: auto; padding-bottom: 40px;
        -ms-overflow-style: none; scrollbar-width: none;
    }
    .daily-tabs::-webkit-scrollbar { display: none; }
    
    .daily-tab-num {
        font-family: 'Courier New', Courier, monospace; font-size: 13.5px; color: var(--sub-color);
        opacity: 0.35; cursor: pointer; transition: 0.2s ease; text-align: left;
    }
    .daily-tab-num:hover { opacity: 0.7; }
    .daily-tab-num.active { opacity: 1; color: var(--point-color); font-weight: bold; }

    .daily-content-area {
        flex: 1; height: 100%; overflow-y: auto; padding-bottom: 60px;
        display: flex; flex-direction: column; gap: 20px; 
        -ms-overflow-style: none; scrollbar-width: none;
    }
    .daily-content-area::-webkit-scrollbar { display: none; }

    .daily-post-item { display: flex; flex-direction: column; gap: 10px; }
    
    .daily-post-img-wrapper { width: 100%; cursor: pointer; }
    .daily-post-img {
        width: 100%; max-height: 450px; object-fit: cover;
        border-radius: 6px; border: 1px solid var(--divider-bg);
    }

    .daily-post-title {
        font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--main-color); cursor: pointer;
    }
    
    .daily-post-text {
        font-family: 'Noto Serif KR', serif; font-size: 13.5px; color: var(--main-color);
        line-height: 1.8; word-break: break-all; white-space: pre-wrap; cursor: pointer; 
    }

    /* 🚨 첫 줄 폰트 크기 일괄 고정 패치 (피드 및 에디터 내부) */
    .daily-post-text div, .daily-post-text p,
    .daily-modal-editor div, .daily-modal-editor p {
        font-size: 13.5px; line-height: 1.8; margin: 0; padding: 0;
    }

    /* 클릭 시 나타나는 묶음 패널 (태그 + 버튼) */
    .daily-admin-panel {
        display: none; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 4px;
    }
    
    .daily-post-tags { margin-top: 4px; }
    .daily-post-tags span {
        font-family: 'Noto Serif KR', serif; font-size: 12px; 
        color: var(--point-color); opacity: 0.9; cursor: pointer; transition: opacity 0.2s;
        display: inline-block; padding: 2px 0;
    }
    .daily-post-tags span:hover { opacity: 0.6; }

    .daily-admin-menu {
        display: flex; justify-content: flex-end; gap: 12px; width: 100%;
    }
    .admin-btn {
        background: none; border: none; font-size: 11.5px;
        font-family: 'Noto Serif KR', serif; cursor: pointer; padding: 0;
    }
    .admin-btn.edit { color: var(--point-color); }
    .admin-btn.delete { color: #ff3b30; }

    /* 🚨 팝업의 개방감 및 패딩 넘침 방지 */
    .daily-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        z-index: 20000; align-items: center; justify-content: center; padding: 20px;
        box-sizing: border-box;
    }
    .daily-lightbox-card {
        background: #ffffff; border: 1px solid var(--divider-bg); border-radius: 6px;
        padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px;
        box-sizing: border-box;
    }

    .daily-modal-input {
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 14px;
        padding: 5px 0; outline: none; width: 100%; transition: 0.3s;
    }
    .daily-modal-input:focus { border-bottom-color: var(--point-color); }
    
    .daily-modal-editor {
        width: 100%; min-height: 120px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13.5px;
        line-height: 1.8; outline: none; padding: 5px 0; word-break: break-all;
    }
    [contenteditable]:empty::before { content: attr(placeholder); color: var(--sub-color); opacity: 0.6; pointer-events: none; }

    .daily-add-img-btn {
        display: inline-block; cursor: pointer; color: var(--sub-color); font-size: 18px;
        transition: 0.2s; opacity: 0.4;
    }
    .daily-add-img-btn:hover { opacity: 1; color: var(--point-color); }
    
    .daily-preview-wrap { position: relative; display: none; margin-bottom: 10px; }
    .daily-preview-wrap img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 4px; }
    
    .daily-remove-preview {
        position: absolute; top: -6px; right: -6px; background: var(--point-color); color: #fff;
        border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; font-size: 9px;
    }

    .daily-modal-footer {
        display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid var(--divider-bg); padding-top: 15px;
    }
    .daily-modal-date {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 12px; cursor: pointer;
    }
    .daily-modal-submit {
        background: none; border: none; color: var(--point-color); font-size: 20px;
        cursor: pointer; transition: 0.2s; opacity: 0.7; padding: 0 5px;
    }
    .daily-modal-submit:hover { opacity: 1; transform: translateX(3px); }

    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999;
        align-items: center; gap: 4px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        user-select: none; 
    }
    .format-toolbar button {
        background: none; border: none; color: var(--main-color); font-size: 14px;
        cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s;
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    
    .color-picker-label {
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
        cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; overflow: hidden; margin: 0;
    }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; border: none; padding: 0; }

    .color-btn { 
        font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; 
        border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px;
    }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }
</style>

<div id="format-toolbar" class="format-toolbar">
    <button onmousedown="event.preventDefault(); formatText('bold')"><i class="xi-bold"></i></button>
    <button onmousedown="event.preventDefault(); formatText('italic')"><i class="xi-italic"></i></button>
    <button onmousedown="event.preventDefault(); formatText('underline')"><i class="xi-underline"></i></button>
    <button onmousedown="event.preventDefault(); formatText('strikeThrough')"><i class="xi-strikethrough"></i></button>
    <div class="divider"></div>
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-font"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('foreColor', this.value)" onchange="applyCustomColor('foreColor', this.value)"></label>
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-palette"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('backColor', this.value)" onchange="applyCustomColor('backColor', this.value)"></label>
    <div class="divider"></div>
    <button onmousedown="event.preventDefault(); applyColor('#0E865E', '#E1F9F1')" class="color-btn btn-mint">M</button>
    <button onmousedown="event.preventDefault(); applyColor('#D04978', '#FDEDF4')" class="color-btn btn-pink">P</button>
</div>

<div class="daily-wrapper">
    
    <div class="daily-top-actions">
        <div class="search-inner">
            <input type="text" id="daily-search" autocomplete="off" placeholder="Search">
            <i class="xi-search" id="search-icon" title="Search"></i>
        </div>

    </div>

    <div class="daily-header-bar">
        <div class="ym-selector-container">
            <span id="ym-display" onclick="showYMPicker()" title="Change Month"></span>
            <input type="month" id="ym-picker" style="display: none;" onchange="handleYMChange()" onblur="handleYMChange()">
        </div>

    <div class="daily-layout">
        <div class="daily-tabs" id="daily-tabs"></div>
        <div class="daily-content-area" id="daily-content-area"></div>

</div>

<div id="daily-lightbox" class="daily-lightbox" onclick="if(event.target === this) closeDailyModal()">
    <div class="daily-lightbox-card">
        
        <input type="hidden" id="daily-edit-id" value="">
        <input type="hidden" id="daily-edit-img-url" value="">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="daily-file-input" class="daily-add-img-btn" title="Add Image"><i class="xi-image-o"></i></label>
                <select id="daily-img-quality" style="background: transparent; border: none; outline: none; color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer;">
                    <option value="original" selected>원본</option>
                    <option value="high">고화질</option>
                    <option value="low">저화질</option>

        </div>

        <div class="daily-preview-wrap" id="daily-preview-wrap">

            <img id="daily-image-preview" src="">
        </div>

        <input type="text" id="daily-modal-title" class="daily-modal-input" placeholder="Title" autocomplete="off">
        
        <input type="text" id="daily-modal-tags" class="daily-modal-input" placeholder="Tags" autocomplete="off">

        <div class="daily-modal-footer">
            <input type="date" id="daily-modal-date" class="daily-modal-date" title="Change Date">
            <button class="daily-modal-submit" id="daily-submit-btn" onclick="saveDailyPost()">
                <i class="xi-arrow-right"></i>
            </button>
        </div>

    </div>
</div>

<script>
    var DAILY_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    var DAILY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    var dailySupabase = window.supabase.createClient(DAILY_URL, DAILY_KEY);

    var currentYear = new Date().getFullYear();
    var currentMonth = new Date().getMonth() + 1;
    var selectedDay = new Date().getDate(); 
    
    var allDailyPosts = []; 
    var allMonthPosts = []; 
    var selectedFile = null;
    var isEditing = false;

    function initDaily() {
        var today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        selectedDay = today.getDate();
        
        updateYMDisplay();
        fetchMonthData(); 
    }

    function updateYMDisplay() {
        $('#ym-display').text(`${currentYear}년 ${currentMonth}월`).show();
        var mm = String(currentMonth).padStart(2, '0');
        $('#ym-picker').val(`${currentYear}-${mm}`).hide();
    }

    window.showYMPicker = function() {
        $('#ym-display').hide();
        $('#ym-picker').show().focus();
    };

    window.handleYMChange = function() {
        var val = $('#ym-picker').val();
        if(val) {
            var parts = val.split('-');
            currentYear = parseInt(parts[0], 10);
            currentMonth = parseInt(parts[1], 10);
            selectedDay = 1; 
        }
        updateYMDisplay();
        filterMonthData();
    };

    function renderTabs() {
        var daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        if (selectedDay > daysInMonth) selectedDay = daysInMonth; 

        var html = '';
        for(var i = 1; i <= daysInMonth; i++) {
            var isActive = (i === selectedDay) ? 'active' : '';
            var displayDay = String(i).padStart(2, '0');
            html += `<span class="daily-tab-num fade-in-element ${isActive}" id="tab-day-${i}" onclick="selectDay(${i})">${displayDay}</span>`;
        }
        $('#daily-tabs').html(html);

        setTimeout(() => {
            var activeTab = document.getElementById(`tab-day-${selectedDay}`);
            if(activeTab) {
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 100);
    }

    window.selectDay = function(day) {
        selectedDay = day;
        $('.daily-tab-num').removeClass('active');
        $(`#tab-day-${day}`).addClass('active');
        renderContentForSelectedDay();
    };

    async function fetchMonthData() {
        try {
            var { data, error } = await dailySupabase.from('posts').select('*').eq('category', 'daily');
            if (error) throw error;
            allDailyPosts = data; 
            filterMonthData();
        } catch (error) {
            console.error("데이터 로드 실패:", error);
        }
    }

    function filterMonthData() {
        allMonthPosts = allDailyPosts.filter(post => {
            var pd = new Date(post.created_at);
            return pd.getFullYear() === currentYear && (pd.getMonth() + 1) === currentMonth;
        });
        renderTabs();
        renderContentForSelectedDay();
    }

    function renderContentForSelectedDay() {
        var container = $('#daily-content-area');
        container.empty();

        var dayPosts = allMonthPosts.filter(p => new Date(p.created_at).getDate() === selectedDay)
                                      .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        if(dayPosts.length === 0) {
            container.html('<p style="font-size: 12px; color: var(--sub-color); opacity: 0.5; font-family: \'Noto Serif KR\', serif; padding-top: 20px;">No entries for this day.</p>');
            return;
        }

        renderPostList(dayPosts, container, false);
    }

    function renderPostList(postArray, container, isSearchResult) {
        postArray.forEach(post => {
            var imageUrl = "";
            var textHtml = post.content || "";
            var tagsText = "";
            
            // 데이터 3단 분리 (이미지 ||| 캡션 ||| 태그)
            if (post.content && post.content.includes("|||")) {
                var parts = post.content.split("|||");
                imageUrl = parts[0];
                textHtml = parts[1] || "";
                tagsText = parts[2] || "";
            }

            var imgBlock = "";
            if (imageUrl) {
                imgBlock = `
                    <div class="daily-post-img-wrapper" onclick="toggleDailyAdmin(${post.id})">
                        <img class="daily-post-img" src="${imageUrl}" loading="lazy">
                    </div>
                `;
            }

            var titleBlock = post.title ? `<div class="daily-post-title" onclick="toggleDailyAdmin(${post.id})">${post.title}</div>` : "";
            
            var searchDateBlock = "";
            if (isSearchResult) {
                var pd = new Date(post.created_at);
                searchDateBlock = `<div style="font-size: 11px; color: var(--sub-color); margin-bottom: 5px;">${pd.getFullYear()}년 ${pd.getMonth()+1}월 ${pd.getDate()}일</div>`;
            }

            // 🚨 DB 먹통(Syntax Error) 원천 차단: HTML 구문을 onclick 내부에 문자열로 넘기지 않고 우회합니다.
            var jsSafeTags = tagsText.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "\\n").replace(/\r/g, "");

            // 🚨 태그 클릭 시 글씨 영역만 정확히 눌리도록 span 처리
            var tagsBlock = tagsText ? `<div class="daily-post-tags"><span onclick="searchByTag('${jsSafeTags}')">${tagsText}</span></div>` : "";

            var postHtml = `
                <div class="daily-post-item fade-in-element" id="daily-post-${post.id}">
                    ${searchDateBlock}
                    ${imgBlock}
                    ${titleBlock}
                    <div class="daily-post-text" id="daily-text-${post.id}" onclick="toggleDailyAdmin(${post.id})">${textHtml}</div>
                    
                    <div class="daily-admin-panel" id="daily-admin-${post.id}">
                        ${tagsBlock}
                        <div class="daily-admin-menu">
                            <button class="admin-btn edit" onclick="openDailyEditModal(${post.id})">Edit</button>
                            <button class="admin-btn delete" onclick="deleteDailyPost(${post.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            container.append(postHtml);
        });
        
        container.scrollTop(0);
    }

    // 본문 클릭 시 태그와 버튼이 묶인 패널 등장
    window.toggleDailyAdmin = function(id) {
        $(`#daily-admin-${id}`).slideToggle(150).css('display', 'flex');
    };

    // 🚨 해시태그 텍스트 클릭 시 자동 검색 연동 (키보드 팝업 차단용 .focus() 제거)
    window.searchByTag = function(tagStr) {
        if(!tagStr) return;
        var pureTag = tagStr.match(/#[^\s#]+/)[0] || tagStr;
        $('#daily-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).val(pureTag);
        $('#search-icon').css('opacity', '0.7');
        $('#daily-search').trigger('input');
    };

    // 검색 기능
    $('#search-icon').click(function() {
        $('#daily-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    
    $('#daily-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
            renderContentForSelectedDay(); 
        }
    });

    $('#daily-search').on('input', function() {
        var keyword = $(this).val().toLowerCase();
        var container = $('#daily-content-area');
        
        if (keyword.trim() === '') {
            renderContentForSelectedDay();
            return;
        }
        
        container.empty();
        var matchedPosts = allDailyPosts.filter(post => {
            var textHtml = post.content || '';
            var safeTitle = post.title || '';
            
            var tagsText = "";
            if (post.content && post.content.includes("|||")) {
                var parts = post.content.split("|||");
                textHtml = parts[1] || "";
                tagsText = parts[2] || "";
            }

            var pd = new Date(post.created_at);
            var dateStr = `${pd.getFullYear()}년 ${pd.getMonth()+1}월 ${pd.getDate()}일`;
            
            return (textHtml.toLowerCase().includes(keyword) || 
                    safeTitle.toLowerCase().includes(keyword) ||
                    tagsText.toLowerCase().includes(keyword) ||
                    dateStr.includes(keyword));
        }).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); 

        if(matchedPosts.length === 0) {
            container.html('<p style="font-size: 12px; color: var(--sub-color); opacity: 0.5; font-family: \'Noto Serif KR\', serif; padding-top: 20px;">No results found.</p>');
            return;
        }

        renderPostList(matchedPosts, container, true);
    });

    // 🚨 안전한 압축 엔진 (File 객체 에러 폴백 포함)
    window.compressImage = async function(file, qualityType) {
        if (qualityType === 'original' || file.type === 'image/gif') {
            return { fileOrBlob: file, ext: file.name.split('.').pop() };
        }
        return new Promise((resolve) => {
            var reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                var img = new Image(); img.src = event.target.result;
                img.onload = function() {
                    var maxWidth = qualityType === 'high' ? 1920 : 1080;
                    var quality = qualityType === 'high' ? 0.8 : 0.6;
                    var width = img.width; var height = img.height;
                    if (width > maxWidth || height > maxWidth) {
                        if (width > height) { height = Math.round((height * maxWidth) / width); width = maxWidth; } 
                        else { width = Math.round((width * maxWidth) / height); height = maxWidth; }
                    }
                    var canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                    var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    
                    var outType = (file.type === 'image/png' || file.type === 'image/webp') ? 'image/webp' : 'image/jpeg';
                    var ext = (outType === 'image/webp') ? 'webp' : 'jpg';
                    
                    canvas.toBlob((blob) => { 
                        if (!blob) { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); return; }
                        try {
                            var newFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ext, { type: outType, lastModified: file.lastModified });
                            resolve({ fileOrBlob: newFile, ext: ext });
                        } catch(e) { resolve({ fileOrBlob: blob, ext: ext }); }
                    }, outType, quality);
                };
                img.onerror = function() { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); };
            };
            reader.onerror = function() { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); };
        });
    };

    window.openDailyWriteModal = function() {
        isEditing = false;
        $('#daily-edit-id').val('');
        $('#daily-edit-img-url').val('');
        $('#daily-modal-title').val('');
        $('#daily-modal-tags').val(''); 
        $('#daily-modal-content').html('');
        removeDailyPreview();

        var mm = String(currentMonth).padStart(2, '0');
        var dd = String(selectedDay).padStart(2, '0');
        $('#daily-modal-date').val(`${currentYear}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    // 🚨 DB 먹통 원천 방지를 위한 우회 로직 (데이터를 DOM이나 Array에서 직접 뽑습니다)
    window.openDailyEditModal = function(id) {
        var post = allDailyPosts.find(p => p.id === id);
        if(!post) return;

        var imageUrl = "";
        var textHtml = post.content || "";
        var tagsText = "";
        
        if (post.content && post.content.includes("|||")) {
            var parts = post.content.split("|||");
            imageUrl = parts[0];
            textHtml = parts[1] || "";
            tagsText = parts[2] || "";
        }

        isEditing = true;
        $('#daily-edit-id').val(id);
        $('#daily-edit-img-url').val(imageUrl);
        
        $('#daily-modal-title').val(post.title || "");
        $('#daily-modal-tags').val(tagsText); 
        $('#daily-modal-content').html(textHtml);
        
        if(imageUrl) {
            $('#daily-image-preview').attr('src', imageUrl);
            $('#daily-preview-wrap').show();
        } else {
            removeDailyPreview();
        }

        var dateObj = new Date(post.created_at);
        var yyyy = dateObj.getFullYear();
        var mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        var dd = String(dateObj.getDate()).padStart(2, '0');
        $('#daily-modal-date').val(`${yyyy}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    window.closeDailyModal = function() {
        $('#daily-lightbox').fadeOut(200);
    };

    $('#daily-file-input').on('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        var reader = new FileReader();
        reader.onload = function(e) {
            $('#daily-image-preview').attr('src', e.target.result);
            $('#daily-preview-wrap').slideDown(200);
        }
        reader.readAsDataURL(file);
    });

    window.removeDailyPreview = function() {
        selectedFile = null;
        $('#daily-file-input').val('');
        // 사용자가 X버튼을 누르면 수정모드일 경우에도 이미지를 날리겠다는 뜻입니다.
        if(isEditing) { $('#daily-edit-img-url').val(''); } 
        $('#daily-preview-wrap').slideUp(200, function() {
            $('#daily-image-preview').attr('src', '');
        });
    };

    window.saveDailyPost = async function() {
        var titleVal = $('#daily-modal-title').val().trim();
        var tagsVal = $('#daily-modal-tags').val().trim(); 
        var textVal = $('#daily-modal-content').html().trim();
        var dateVal = $('#daily-modal-date').val();
        var btn = $('#daily-submit-btn');

        if (!textVal && !selectedFile && !$('#daily-edit-img-url').val()) {
            alert("Please add an image or write something."); return;
        }

        try {
            btn.prop('disabled', true).css('opacity', '0.3');

            var finalImageUrl = isEditing ? $('#daily-edit-img-url').val() : "";
            var oldImageUrl = "";
            
            if (isEditing) {
                var postId = $('#daily-edit-id').val();
                var oldPost = allDailyPosts.find(p => p.id == postId);
                if (oldPost && oldPost.content && oldPost.content.includes("|||")) {
                    oldImageUrl = oldPost.content.split("|||")[0];
                }
            }

            if (selectedFile) {
                var qualityOption = $('#daily-img-quality').val() || 'original';
                var compressed = await compressImage(selectedFile, qualityOption);
                var fileExt = compressed.ext || 'jpg';
                var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                
                var { error: uploadError } = await dailySupabase.storage.from('images').upload(fileName, compressed.fileOrBlob, {
                    contentType: compressed.fileOrBlob.type || 'image/jpeg'
                });
                if (uploadError) throw uploadError;
                
                var { data: publicUrlData } = dailySupabase.storage.from('images').getPublicUrl(fileName);
                finalImageUrl = publicUrlData.publicUrl;

                // 🚨 새 사진 업로드 성공 시, 기존 사진이 있었다면 스토리지에서 삭제 처리
                if (isEditing && oldImageUrl && oldImageUrl.includes('supabase.co/storage/v1/object/public/images/')) {
                    var oldFileName = oldImageUrl.split('/').pop();
                    dailySupabase.storage.from('images').remove([oldFileName]);
                }
            } else if (isEditing && !$('#daily-preview-wrap').is(':visible') && oldImageUrl) {
                // 🚨 수정 모드인데 X 버튼을 눌러서 사진을 아예 지워버렸을 경우 삭제 처리
                finalImageUrl = "";
                if (oldImageUrl.includes('supabase.co/storage/v1/object/public/images/')) {
                    var oldFileName = oldImageUrl.split('/').pop();
                    dailySupabase.storage.from('images').remove([oldFileName]);
                }
            }

            var contentString = finalImageUrl + "|||" + textVal + "|||" + tagsVal;

            var finalDate = new Date();
            if (dateVal) {
                var parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            var offset = finalDate.getTimezoneOffset() * 60000;
            var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            if (isEditing) {
                var postId = $('#daily-edit-id').val();
                var { error } = await dailySupabase.from('posts').update({ 
                    title: titleVal, content: contentString, created_at: localISOString 
                }).eq('id', postId);
                if (error) throw error;
            } else {
                var { error } = await dailySupabase.from('posts').insert([{ 
                    category: 'daily', title: titleVal, content: contentString, created_at: localISOString 
                }]);
                if (error) throw error;
            }

            closeDailyModal();
            
            if (dateVal) {
                var parts = dateVal.split('-');
                currentYear = parseInt(parts[0], 10);
                currentMonth = parseInt(parts[1], 10);
                selectedDay = parseInt(parts[2], 10);
                updateYMDisplay();
            }
            fetchMonthData(); 

        } catch (error) {
            alert('Failed to save.');
        } finally {
            btn.prop('disabled', false).css('opacity', '0.7');
        }
    };

    window.deleteDailyPost = async function(id) {
        if (!confirm("Are you sure you want to delete this?")) return;
        try {
            // 🚨 글을 삭제하기 전에 이미지 정보 미리 스캔
            var postData = allDailyPosts.find(p => p.id == id);
            
            var { error } = await dailySupabase.from('posts').delete().eq('id', id);
            if (error) throw error;

            // 🚨 글 안에 이미지가 있었다면 스토리지에서도 영구 파기
            if (postData && postData.content && postData.content.includes("|||")) {
                var imgUrl = postData.content.split("|||")[0];
                if (imgUrl && imgUrl.includes('supabase.co/storage/v1/object/public/images/')) {
                    var fileName = imgUrl.split('/').pop();
                    dailySupabase.storage.from('images').remove([fileName]);
                }
            }

            fetchMonthData();
        } catch (error) { alert('Failed to delete.'); }
    };

    var savedSelectionRange = null;
    window.saveSelection = function() {
        var selection = window.getSelection();
        if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0);
    };
    window.applyCustomColor = function(command, color) {
        if (savedSelectionRange) {
            var selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(savedSelectionRange);
        }
        document.execCommand(command, false, color); checkSelection();
    };

    function checkSelection() {
        setTimeout(() => {
            var selection = window.getSelection();
            var toolbar = document.getElementById('format-toolbar');
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                var node = selection.anchorNode;
                var isInsideEditor = false;
                while (node) {
                    if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') {
                        isInsideEditor = true; break;
                    }
                    node = node.parentNode;
                }
                if (isInsideEditor) {
                    var range = selection.getRangeAt(0);
                    var rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    var top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    var left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8;
                    if (left < 10) left = 10;
                    toolbar.style.top = top + 'px'; toolbar.style.left = left + 'px';
                } else { toolbar.style.display = 'none'; }
            } else { toolbar.style.display = 'none'; }
        }, 100);
    }
    document.addEventListener('selectionchange', checkSelection);
    document.addEventListener('mouseup', checkSelection);
    document.addEventListener('touchend', checkSelection);

    window.formatText = function(command, value = null) {
        document.execCommand(command, false, value); checkSelection();
    };
    window.applyColor = function(textColor, bgColor) {
        document.execCommand('foreColor', false, textColor);
        document.execCommand('backColor', false, bgColor); checkSelection();
    };

    setTimeout(() => { initDaily(); }, 100);
</script>
