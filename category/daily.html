<!-- 파일명: category/daily.html -->
<style>
    .daily-wrapper {
        position: relative;
        padding-top: 10px;
        /* 독립 스크롤을 위해 전체 높이 고정 (헤더 등 제외한 영역) */
        height: calc(100vh - 180px);
        min-height: 500px;
        display: flex;
        flex-direction: column;
    }

    /* 상단 타임 컨트롤러 및 글쓰기 버튼 */
    .daily-header-bar {
        position: relative;
        display: flex;
        justify-content: center; /* 년월 중앙 정렬 */
        align-items: center;
        margin-bottom: 30px;
        flex-shrink: 0;
    }

    /* 년/월 선택기 (구분선 삭제, 자간 넓힘) */
    .ym-selector-container {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #ym-display {
        font-family: 'Noto Serif KR', serif;
        font-size: 14.5px;
        font-weight: 400;
        letter-spacing: 3px; /* 자간 넓힘 */
        color: var(--main-color);
        cursor: pointer;
        transition: opacity 0.2s;
    }
    #ym-display:hover { opacity: 0.6; }
    
    #ym-picker {
        background: transparent;
        border: none;
        color: var(--main-color);
        font-family: 'Noto Serif KR', serif;
        font-size: 14.5px;
        letter-spacing: 2px;
        outline: none;
        cursor: pointer;
        text-align: center;
    }

    /* 우측 상단 미니멀 글쓰기 버튼 */
    .daily-write-btn {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--sub-color);
        opacity: 0.35;
        font-size: 15px; /* 검색 버튼과 동일한 크기/투명도 */
        cursor: pointer;
        transition: opacity 0.3s;
        padding: 5px;
    }
    .daily-write-btn:hover { opacity: 0.7; }

    /* 레이아웃: 좌측 탭 / 우측 본문 (독립 스크롤) */
    .daily-layout {
        display: flex;
        gap: 40px; /* 레퍼런스 참고 간격 축소 */
        flex: 1;
        overflow: hidden; /* 자식들이 각각 스크롤을 가지도록 */
    }

    /* 좌측 날짜 트랙 */
    .daily-tabs {
        width: 35px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        overflow-y: auto;
        padding-bottom: 40px;
        -ms-overflow-style: none; /* 스크롤바 숨김 */
        scrollbar-width: none;
    }
    .daily-tabs::-webkit-scrollbar { display: none; }
    
    .daily-tab-num {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13.5px;
        color: var(--sub-color);
        opacity: 0.35;
        cursor: pointer;
        transition: 0.2s ease;
        text-align: left;
    }
    .daily-tab-num:hover { opacity: 0.7; }
    .daily-tab-num.active {
        opacity: 1;
        color: var(--point-color);
        font-weight: bold;
    }

    /* 우측 본문 영역 */
    .daily-content-area {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        padding-bottom: 60px;
        display: flex;
        flex-direction: column;
        gap: 45px; /* 일기 사이 여백 */
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    .daily-content-area::-webkit-scrollbar { display: none; }

    /* 개별 포스트 아이템 */
    .daily-post-item {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    /* 이미지 정렬 (텍스트 왼쪽 라인과 완벽 일치) */
    .daily-post-img-wrapper {
        width: 100%;
        /* padding 제거하여 텍스트와 딱 맞춤 */
    }
    .daily-post-img {
        width: 100%;
        max-height: 450px; 
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--divider-bg);
    }

    .daily-post-title {
        font-family: 'Noto Serif KR', serif;
        font-size: 14px;
        font-weight: 600;
        color: var(--main-color);
    }
    
    .daily-post-text {
        font-family: 'Noto Serif KR', serif;
        font-size: 13.5px;
        color: var(--main-color);
        line-height: 1.8;
        word-break: break-all;
        white-space: pre-wrap;
        cursor: pointer; /* 클릭 유도를 위한 포인터 */
    }

    /* 클릭 시 나타나는 수정/삭제 버튼 (oneline 방식) */
    .daily-admin-menu {
        display: none; /* 평소엔 숨김 */
        justify-content: flex-end;
        gap: 12px;
        margin-top: 4px;
    }
    .admin-btn {
        background: none; border: none; font-size: 11.5px;
        font-family: 'Noto Serif KR', serif; cursor: pointer; padding: 0;
    }
    .admin-btn.edit { color: var(--point-color); }
    .admin-btn.delete { color: #ff3b30; }

    /* ==========================================================================
       모달 (화이트 큐브 팝업 카드)
       ========================================================================== */
    .daily-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(150, 150, 150, 0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; padding: 20px;
    }
    .daily-lightbox-card {
        background: #ffffff; /* 완전한 흰색 */
        border: 1px solid var(--divider-bg); border-radius: 6px;
        padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px;
    }

    /* 팝업 내 입력 폼 */
    .daily-modal-title {
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 14px;
        padding: 5px 0; outline: none; width: 100%; transition: 0.3s;
    }
    .daily-modal-title:focus { border-bottom-color: var(--point-color); }
    
    .daily-modal-editor {
        width: 100%; min-height: 120px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13.5px;
        line-height: 1.8; outline: none; padding: 5px 0; word-break: break-all;
    }
    [contenteditable]:empty::before { content: attr(placeholder); color: var(--sub-color); opacity: 0.6; pointer-events: none; }

    /* 이미지 첨부 버튼 (텍스트 빼고 아이콘만) */
    .daily-add-img-btn {
        display: inline-block; cursor: pointer; color: var(--sub-color); font-size: 18px;
        transition: 0.2s; opacity: 0.4;
    }
    .daily-add-img-btn:hover { opacity: 1; color: var(--point-color); }
    
    .daily-preview-wrap { position: relative; display: none; margin-bottom: 10px; }
    .daily-preview-wrap img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 4px; }
    
    /* 작은 포인트 색상 X 버튼 */
    .daily-remove-preview {
        position: absolute; top: -6px; right: -6px; 
        background: var(--point-color); color: #fff;
        border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; font-size: 9px;
    }

    .daily-modal-footer {
        display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid var(--divider-bg); padding-top: 15px;
    }
    .daily-modal-date {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 12px; cursor: pointer;
    }
    .daily-modal-submit {
        background: none; border: none; color: var(--point-color); font-size: 20px;
        cursor: pointer; transition: 0.2s; opacity: 0.7; padding: 0 5px;
    }
    .daily-modal-submit:hover { opacity: 1; transform: translateX(3px); }

    /* 드래그 툴바 */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 6px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 9999;
        align-items: center; gap: 4px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        user-select: none; 
    }
    .format-toolbar button {
        background: none; border: none; color: var(--main-color); font-size: 14px;
        cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s;
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    
    .color-picker-label {
        display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
        cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; overflow: hidden; margin: 0;
    }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; border: none; padding: 0; }

    .color-btn { 
        font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; 
        border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px;
    }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }
</style>

<!-- 글자 드래그 시 플로팅 툴바 -->
<div id="format-toolbar" class="format-toolbar">
    <button onmousedown="event.preventDefault(); formatText('bold')"><i class="xi-bold"></i></button>
    <button onmousedown="event.preventDefault(); formatText('italic')"><i class="xi-italic"></i></button>
    <button onmousedown="event.preventDefault(); formatText('underline')"><i class="xi-underline"></i></button>
    <button onmousedown="event.preventDefault(); formatText('strikeThrough')"><i class="xi-strikethrough"></i></button>
    <div class="divider"></div>
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-font"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('foreColor', this.value)" onchange="applyCustomColor('foreColor', this.value)"></label>
    <label class="color-picker-label" onmousedown="saveSelection()"><i class="xi-palette"></i><input type="color" class="native-color-picker" oninput="applyCustomColor('backColor', this.value)" onchange="applyCustomColor('backColor', this.value)"></label>
    <div class="divider"></div>
    <button onmousedown="event.preventDefault(); applyColor('#0E865E', '#E1F9F1')" class="color-btn btn-mint">M</button>
    <button onmousedown="event.preventDefault(); applyColor('#D04978', '#FDEDF4')" class="color-btn btn-pink">P</button>
</div>

<div class="daily-wrapper">
    
    <!-- 상단 바 -->
    <div class="daily-header-bar">
        <div class="ym-selector-container">
            <span id="ym-display" onclick="showYMPicker()" title="년/월 변경"></span>
            <input type="month" id="ym-picker" style="display: none;" onchange="handleYMChange()" onblur="handleYMChange()">
        </div>
        <button class="daily-write-btn" onclick="openDailyWriteModal()" title="일기 쓰기"><i class="xi-pen"></i></button>
    </div>

    <!-- 스플릿 뷰 레이아웃 -->
    <div class="daily-layout">
        <!-- 좌측 날짜 탭 -->
        <div class="daily-tabs" id="daily-tabs"></div>

        <!-- 우측 본문 영역 -->
        <div class="daily-content-area" id="daily-content-area"></div>
    </div>

</div>

<!-- 팝업 카드 모달 -->
<div id="daily-lightbox" class="daily-lightbox" onclick="if(event.target === this) closeDailyModal()">
    <div class="daily-lightbox-card">
        
        <input type="hidden" id="daily-edit-id" value="">
        <input type="hidden" id="daily-edit-img-url" value="">
        
        <!-- 상단: 닫기 & 갤러리 아이콘만 (텍스트 제거) -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label for="daily-file-input" class="daily-add-img-btn" title="사진 첨부"><i class="xi-image-o"></i></label>
            <input type="file" id="daily-file-input" accept="image/*" style="display: none;">
            <i class="xi-close" onclick="closeDailyModal()" style="color: var(--sub-color); cursor: pointer; font-size: 16px;"></i>
        </div>

        <!-- 썸네일 미리보기 -->
        <div class="daily-preview-wrap" id="daily-preview-wrap">
            <button class="daily-remove-preview" onclick="removeDailyPreview()"><i class="xi-close"></i></button>
            <img id="daily-image-preview" src="">
        </div>

        <!-- title 플레이스홀더 -->
        <input type="text" id="daily-modal-title" class="daily-modal-title" placeholder="title" autocomplete="off">
        
        <div id="daily-modal-content" class="daily-modal-editor" contenteditable="true" spellcheck="false" placeholder="기록..."></div>

        <div class="daily-modal-footer">
            <input type="date" id="daily-modal-date" class="daily-modal-date" title="날짜 변경">
            <button class="daily-modal-submit" id="daily-submit-btn" onclick="saveDailyPost()">
                <i class="xi-arrow-right"></i>
            </button>
        </div>

    </div>
</div>

<script>
    const DAILY_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    const DAILY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    const dailySupabase = window.supabase.createClient(DAILY_URL, DAILY_KEY);

    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let selectedDay = new Date().getDate(); // 현재 선택된 날짜 (탭)
    
    let allMonthPosts = []; // 해당 월의 전체 데이터를 들고 있을 배열
    let selectedFile = null;
    let isEditing = false;

    // --- [1] 초기 설정 ---
    function initDaily() {
        const today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        selectedDay = today.getDate();
        
        updateYMDisplay();
        fetchMonthData(); // DB에서 월 데이터 먼저 불러오기
    }

    function updateYMDisplay() {
        $('#ym-display').text(`${currentYear}년 ${currentMonth}월`).show();
        const mm = String(currentMonth).padStart(2, '0');
        $('#ym-picker').val(`${currentYear}-${mm}`).hide();
    }

    window.showYMPicker = function() {
        $('#ym-display').hide();
        $('#ym-picker').show().focus();
    };

    window.handleYMChange = function() {
        const val = $('#ym-picker').val();
        if(val) {
            const parts = val.split('-');
            currentYear = parseInt(parts[0], 10);
            currentMonth = parseInt(parts[1], 10);
            // 달이 바뀌면 무조건 1일로 세팅
            selectedDay = 1; 
        }
        updateYMDisplay();
        fetchMonthData();
    };

    // --- [2] 좌측 탭 렌더링 ---
    function renderTabs() {
        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        if (selectedDay > daysInMonth) selectedDay = daysInMonth; // 예외처리

        let html = '';
        for(let i = 1; i <= daysInMonth; i++) {
            const isActive = (i === selectedDay) ? 'active' : '';
            const displayDay = String(i).padStart(2, '0');
            html += `<span class="daily-tab-num fade-in-element ${isActive}" id="tab-day-${i}" onclick="selectDay(${i})">${displayDay}</span>`;
        }
        $('#daily-tabs').html(html);

        // 선택된 날짜로 좌측 탭 자동 스크롤
        setTimeout(() => {
            const activeTab = document.getElementById(`tab-day-${selectedDay}`);
            if(activeTab) {
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 100);
    }

    // 탭 클릭 시
    window.selectDay = function(day) {
        selectedDay = day;
        $('.daily-tab-num').removeClass('active');
        $(`#tab-day-${day}`).addClass('active');
        renderContentForSelectedDay();
    };

    // --- [3] 데이터 로드 및 우측 본문 렌더링 ---
    async function fetchMonthData() {
        try {
            const { data, error } = await dailySupabase.from('posts').select('*').eq('category', 'daily');
            if (error) throw error;

            // 현재 년/월에 해당하는 데이터만 필터링하여 저장
            allMonthPosts = data.filter(post => {
                const pd = new Date(post.created_at);
                return pd.getFullYear() === currentYear && (pd.getMonth() + 1) === currentMonth;
            });
            
            renderTabs();
            renderContentForSelectedDay();

        } catch (error) {
            console.error("데이터 로드 실패:", error);
        }
    }

    function renderContentForSelectedDay() {
        const container = $('#daily-content-area');
        container.empty();

        // 선택된 일(Day)에 해당하는 글만 시간순 정렬
        const dayPosts = allMonthPosts.filter(p => new Date(p.created_at).getDate() === selectedDay)
                                      .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        if(dayPosts.length === 0) {
            container.html('<p style="font-size: 12px; color: var(--sub-color); opacity: 0.5; font-family: \'Noto Serif KR\', serif; padding-top: 20px;">이날의 기록이 없습니다.</p>');
            return;
        }

        dayPosts.forEach(post => {
            let imageUrl = "";
            let textHtml = post.content;
            if (post.content && post.content.includes("|||")) {
                const parts = post.content.split("|||");
                imageUrl = parts[0];
                textHtml = parts[1] || "";
            }

            let imgBlock = "";
            if (imageUrl) {
                imgBlock = `
                    <div class="daily-post-img-wrapper">
                        <img class="daily-post-img" src="${imageUrl}" loading="lazy">
                    </div>
                `;
            }

            let titleBlock = post.title ? `<div class="daily-post-title">${post.title}</div>` : "";
            const safeTitle = post.title ? post.title.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
            const safeText = textHtml ? textHtml.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';

            // [요청] 본문 영역을 클릭하면 관리 메뉴가 슉 나옴
            const postHtml = `
                <div class="daily-post-item fade-in-element" id="daily-post-${post.id}">
                    ${imgBlock}
                    ${titleBlock}
                    <div class="daily-post-text" onclick="toggleDailyAdmin(${post.id})">${textHtml}</div>
                    
                    <div class="daily-admin-menu" id="daily-admin-${post.id}">
                        <button class="admin-btn edit" onclick="openDailyEditModal(${post.id}, '${imageUrl}', '${safeTitle}', '${safeText}', '${post.created_at}')">수정</button>
                        <button class="admin-btn delete" onclick="deleteDailyPost(${post.id})">삭제</button>
                    </div>
                </div>
            `;
            container.append(postHtml);
        });
        
        // 글 내용이 바뀌면 우측 본문은 맨 위로 스크롤
        container.scrollTop(0);
    }

    // oneline 방식의 관리버튼 토글
    window.toggleDailyAdmin = function(id) {
        $(`#daily-admin-${id}`).slideToggle(150).css('display', 'flex');
    };

    // --- [4] 모달 창 및 작성 로직 ---
    window.openDailyWriteModal = function() {
        isEditing = false;
        $('#daily-edit-id').val('');
        $('#daily-edit-img-url').val('');
        $('#daily-modal-title').val('');
        $('#daily-modal-content').html('');
        removeDailyPreview();

        // 팝업 열 때 현재 선택된 탭 날짜를 기본값으로 세팅
        const mm = String(currentMonth).padStart(2, '0');
        const dd = String(selectedDay).padStart(2, '0');
        $('#daily-modal-date').val(`${currentYear}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    window.openDailyEditModal = function(id, imgUrl, title, text, createdAt) {
        isEditing = true;
        $('#daily-edit-id').val(id);
        $('#daily-edit-img-url').val(imgUrl);
        
        $('#daily-modal-title').val(title);
        $('#daily-modal-content').html(text);
        
        if(imgUrl) {
            $('#daily-image-preview').attr('src', imgUrl);
            $('#daily-preview-wrap').show();
        } else {
            removeDailyPreview();
        }

        const dateObj = new Date(createdAt);
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        $('#daily-modal-date').val(`${yyyy}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    window.closeDailyModal = function() {
        $('#daily-lightbox').fadeOut(200);
    };

    $('#daily-file-input').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            $('#daily-image-preview').attr('src', e.target.result);
            $('#daily-preview-wrap').slideDown(200);
        }
        reader.readAsDataURL(file);
    });

    window.removeDailyPreview = function() {
        selectedFile = null;
        $('#daily-file-input').val('');
        if(isEditing) { $('#daily-edit-img-url').val(''); } 
        $('#daily-preview-wrap').slideUp(200, function() {
            $('#daily-image-preview').attr('src', '');
        });
    };

    window.saveDailyPost = async function() {
        const titleVal = $('#daily-modal-title').val().trim();
        const textVal = $('#daily-modal-content').html().trim();
        const dateVal = $('#daily-modal-date').val();
        const btn = $('#daily-submit-btn');

        if (!textVal && !selectedFile && !$('#daily-edit-img-url').val()) {
            alert("사진이나 기록을 남겨주세요."); return;
        }

        try {
            btn.prop('disabled', true).css('opacity', '0.3');

            let finalImageUrl = isEditing ? $('#daily-edit-img-url').val() : "";

            if (selectedFile) {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                const { error: uploadError } = await dailySupabase.storage.from('images').upload(fileName, selectedFile);
                if (uploadError) throw uploadError;
                
                const { data: publicUrlData } = dailySupabase.storage.from('images').getPublicUrl(fileName);
                finalImageUrl = publicUrlData.publicUrl;
            }

            const contentString = finalImageUrl ? (finalImageUrl + "|||" + textVal) : textVal;

            let finalDate = new Date();
            if (dateVal) {
                const parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const offset = finalDate.getTimezoneOffset() * 60000;
            const localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            if (isEditing) {
                const postId = $('#daily-edit-id').val();
                const { error } = await dailySupabase.from('posts').update({ 
                    title: titleVal, content: contentString, created_at: localISOString 
                }).eq('id', postId);
                if (error) throw error;
            } else {
                const { error } = await dailySupabase.from('posts').insert([{ 
                    category: 'daily', title: titleVal, content: contentString, created_at: localISOString 
                }]);
                if (error) throw error;
            }

            closeDailyModal();
            
            // 저장된 날짜에 맞게 년/월/일 이동 후 다시 로드
            if (dateVal) {
                const parts = dateVal.split('-');
                currentYear = parseInt(parts[0], 10);
                currentMonth = parseInt(parts[1], 10);
                selectedDay = parseInt(parts[2], 10);
                updateYMDisplay();
            }
            fetchMonthData(); 

        } catch (error) {
            alert('기록을 저장하지 못했습니다.');
        } finally {
            btn.prop('disabled', false).css('opacity', '0.7');
        }
    };

    window.deleteDailyPost = async function(id) {
        if (!confirm("이 기록을 지우시겠습니까?")) return;
        try {
            const { error } = await dailySupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            fetchMonthData();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    };

    // --- [5] 웹 에디터 툴바 로직 ---
    let savedSelectionRange = null;
    window.saveSelection = function() {
        const selection = window.getSelection();
        if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0);
    };
    window.applyCustomColor = function(command, color) {
        if (savedSelectionRange) {
            const selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(savedSelectionRange);
        }
        document.execCommand(command, false, color); checkSelection();
    };

    function checkSelection() {
        setTimeout(() => {
            const selection = window.getSelection();
            const toolbar = document.getElementById('format-toolbar');
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                let node = selection.anchorNode;
                let isInsideEditor = false;
                while (node) {
                    if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') {
                        isInsideEditor = true; break;
                    }
                    node = node.parentNode;
                }
                if (isInsideEditor) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    toolbar.style.display = 'flex';
                    let top = rect.top + window.scrollY - toolbar.offsetHeight - 8;
                    let left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.offsetWidth / 2);
                    if (top < window.scrollY) top = rect.bottom + window.scrollY + 8;
                    if (left < 10) left = 10;
                    toolbar.style.top = top + 'px'; toolbar.style.left = left + 'px';
                } else { toolbar.style.display = 'none'; }
            } else { toolbar.style.display = 'none'; }
        }, 100);
    }
    document.addEventListener('selectionchange', checkSelection);
    document.addEventListener('mouseup', checkSelection);
    document.addEventListener('touchend', checkSelection);

    window.formatText = function(command, value = null) {
        document.execCommand(command, false, value); checkSelection();
    };
    window.applyColor = function(textColor, bgColor) {
        document.execCommand('foreColor', false, textColor);
        document.execCommand('backColor', false, bgColor); checkSelection();
    };

    // 초기화
    setTimeout(() => { initDaily(); }, 100);
</script>
