<style>
    .daily-wrapper {
        position: relative;
        padding-top: 12px; 
        height: calc(100vh - 180px);
        min-height: 500px;
        display: flex;
        flex-direction: column;
    }

    .daily-top-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 15px; 
        margin-bottom: 25px; 
        width: 100%;
        flex-shrink: 0;
    }

    .search-inner { position: relative; display: flex; align-items: center; }
    #daily-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    .daily-write-btn {
        background: none; border: none; color: var(--sub-color); opacity: 0.35;
        font-size: 15px; cursor: pointer; transition: opacity 0.3s;
        padding: 6px; 
        display: flex; align-items: center; justify-content: center;
    }
    .daily-write-btn:hover { opacity: 0.7; color: var(--point-color); }

    .daily-header-bar {
        display: flex; flex-direction: column; align-items: center;
        margin-bottom: 30px; flex-shrink: 0;
    }
    .ym-selector-container {
        display: flex; align-items: center; justify-content: center;
    }
    #ym-display {
        font-family: 'Noto Serif KR', serif; font-size: 14.5px; font-weight: 400;
        letter-spacing: 3px; color: var(--main-color); cursor: pointer; transition: opacity 0.2s;
    }
    #ym-display:hover { opacity: 0.6; }
    #ym-picker {
        background: transparent; border: none; color: var(--main-color);
        font-family: 'Noto Serif KR', serif; font-size: 14.5px; letter-spacing: 2px;
        outline: none; cursor: pointer; text-align: center;
    }

    .daily-layout {
        display: flex; gap: 40px; flex: 1; overflow: hidden; 
    }
    @media (max-width: 768px) {
        .daily-layout { gap: 10px; } 
    }

    .daily-tabs {
        width: 35px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px;
        height: 100%; overflow-y: auto; padding-bottom: 40px;
        -ms-overflow-style: none; scrollbar-width: none;
    }
    .daily-tabs::-webkit-scrollbar { display: none; }
    
    .daily-tab-num {
        font-family: 'Courier New', Courier, monospace; font-size: 13.5px; color: var(--sub-color);
        opacity: 0.35; cursor: pointer; transition: 0.2s ease; text-align: left;
    }
    .daily-tab-num:hover { opacity: 0.7; }
    .daily-tab-num.active { opacity: 1; color: var(--point-color); font-weight: bold; }

    .daily-content-area {
        flex: 1; height: 100%; overflow-y: auto; padding-bottom: 60px;
        display: flex; flex-direction: column; gap: 20px; 
        -ms-overflow-style: none; scrollbar-width: none;
    }
    .daily-content-area::-webkit-scrollbar { display: none; }

    .daily-post-item { display: flex; flex-direction: column; gap: 10px; }
    
    .daily-post-title {
        font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--main-color); cursor: pointer;
    }
    
    .daily-post-text {
        font-family: 'Noto Serif KR', serif; font-size: 13.5px; color: var(--main-color);
        line-height: 1.8; word-break: break-all; white-space: pre-wrap; cursor: pointer; 
    }

    .daily-post-text div, .daily-post-text p,
    .daily-modal-editor div, .daily-modal-editor p {
        font-size: 13.5px; line-height: 1.8; margin: 0; padding: 0;
    }

    .daily-admin-panel {
        display: none; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 4px;
    }
    
    .daily-post-tags { margin-top: 4px; }
    .daily-post-tags span {
        font-family: 'Noto Serif KR', serif; font-size: 12px; 
        color: var(--point-color); opacity: 0.9; cursor: pointer; transition: opacity 0.2s;
        display: inline-block; padding: 2px 0;
    }
    .daily-post-tags span:hover { opacity: 0.6; }

    .daily-admin-menu {
        display: flex; justify-content: flex-end; gap: 12px; width: 100%;
    }
    .admin-btn {
        background: none; border: none; font-size: 11.5px;
        font-family: 'Noto Serif KR', serif; cursor: pointer; padding: 0;
    }
    .admin-btn.edit { color: var(--point-color); }
    .admin-btn.delete { color: #ff3b30; }

    /* 🚨 팝업의 개방감 및 패딩 넘침 방지 */
    .daily-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        z-index: 20000; align-items: center; justify-content: center; padding: 20px;
        box-sizing: border-box;
    }
    .daily-lightbox-card {
        background: #ffffff; border: 1px solid var(--divider-bg); border-radius: 6px;
        padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px;
        box-sizing: border-box;
    }

    .daily-modal-input {
        background: transparent; border: none; border-bottom: 1px solid var(--divider-bg);
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 14px;
        padding: 5px 0; outline: none; width: 100%; transition: 0.3s;
    }
    .daily-modal-input:focus { border-bottom-color: var(--point-color); }
    
    .daily-modal-editor {
        width: 100%; min-height: 150px; background: transparent; border: none;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 13.5px;
        line-height: 1.8; outline: none; padding: 5px 0; word-break: break-all;
    }
    [contenteditable]:empty::before { content: attr(placeholder); color: var(--sub-color); opacity: 0.6; pointer-events: none; }

    .daily-add-img-btn {
        display: inline-block; cursor: pointer; color: var(--sub-color); font-size: 18px;
        transition: 0.2s; opacity: 0.4;
    }
    .daily-add-img-btn:hover { opacity: 1; color: var(--point-color); }

    .daily-modal-footer {
        display: flex; justify-content: space-between; align-items: center; margin-top: 5px; border-top: 1px solid var(--divider-bg); padding-top: 15px;
    }
    .daily-modal-date {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 12px; cursor: pointer;
    }
    .daily-modal-submit {
        background: none; border: none; color: var(--point-color); font-size: 20px;
        cursor: pointer; transition: 0.2s; opacity: 0.7; padding: 0 5px;
    }
    .daily-modal-submit:hover { opacity: 1; transform: translateX(3px); }

    /* ==========================================================================
       [🚨 에디터 인라인 이미지 규격 (완벽한 자동 2px 그리드)]
       ========================================================================== */
    .editor-img-wrap {
        display: inline-block; position: relative; vertical-align: top; 
        margin: 0 0 2px 0; cursor: pointer; transition: width 0.25s ease;
        box-sizing: border-box; border-radius: 4px; overflow: hidden;
    }
    
    .img-full { width: 100%; display: block; margin-bottom: 2px; }
    .img-half { width: calc(49.2% - 2px); display: inline-block; margin-right: 2px; margin-bottom: 2px; }
    .img-third { width: calc(32.5% - 2px); display: inline-block; margin-right: 2px; margin-bottom: 2px; }
    
    .editor-img-wrap img {
        width: 100%; height: auto; display: block; 
        border: 1px solid var(--divider-bg); pointer-events: none;
    }

    .read-mode .editor-img-wrap img {
        pointer-events: auto; cursor: pointer; -webkit-touch-callout: default;
    }
    .img-del-btn { display: none !important; }

    /* ==========================================================================
       [🚨 드래그 텍스트 툴바 (2단 접힘 및 높이 계산 최적화)]
       ========================================================================== */
    .format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 8px; padding: 6px 8px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 9999;
        align-items: center; gap: 4px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); user-select: none; 
        flex-wrap: wrap; justify-content: center; max-width: 290px;
    }
    .format-toolbar button { background: none; border: none; color: var(--main-color); font-size: 14px; cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; }
    .format-toolbar button:hover { background: rgba(0,0,0,0.05); }
    .format-toolbar .divider { width: 1px; height: 16px; background: var(--divider-bg); margin: 0 4px; }
    .color-picker-label { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; cursor: pointer; border-radius: 4px; transition: 0.2s; position: relative; overflow: hidden; margin: 0; }
    .color-picker-label:hover { background: rgba(0,0,0,0.05); }
    .color-picker-label i { font-size: 14px; color: var(--main-color); pointer-events: none; }
    .native-color-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; border: none; padding: 0; }
    .color-btn { font-family: 'Courier New', Courier, monospace; font-size: 12px !important; font-weight: bold; border-radius: 50% !important; width: 22px !important; height: 22px !important; margin: 0 2px; }
    .btn-mint { color: #0E865E !important; background: #E1F9F1 !important; }
    .btn-pink { color: #D04978 !important; background: #FDEDF4 !important; }
    #fontSizeInput::-webkit-outer-spin-button, #fontSizeInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* ==========================================================================
       [작고 미니멀한 1줄짜리 사진 조율 툴바]
       ========================================================================== */
    .img-format-toolbar {
        position: absolute; display: none; background: rgba(250, 250, 248, 0.95);
        border: 1px solid var(--point-color); border-radius: 8px; padding: 4px 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 9999;
        align-items: center; gap: 2px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        user-select: none; flex-direction: row;
        animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .img-format-toolbar button {
        background: none; border: none; color: var(--main-color); font-size: 16px;
        cursor: pointer; padding: 0; border-radius: 4px; transition: 0.2s;
        display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
    }
    .img-format-toolbar button:hover { background: rgba(0,0,0,0.05); color: var(--point-color); }
    .img-format-toolbar .divider { width: 1px; height: 18px; background: var(--divider-bg); margin: 0 4px; }
    .img-format-toolbar .btn-delete { color: #ff3b30; }
    .img-format-toolbar .btn-delete:hover { background: rgba(255,59,48,0.1); color: #ff3b30; }
</style>

<script>
    var DAILY_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    var DAILY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    var dailySupabase = window.supabase.createClient(DAILY_URL, DAILY_KEY);

    var currentYear = new Date().getFullYear();
    var currentMonth = new Date().getMonth() + 1;
    var selectedDay = new Date().getDate(); 
    
    var allDailyPosts = []; 
    var allMonthPosts = []; 
    var isEditing = false;
    var pendingUploads = []; // 🚨 작성 중인 임시 이미지 추적망

    /* --- [텍스트 에디터 및 툴바 로직] --- */
    var savedSelectionRange = null;
    window.saveSelection = function() { var selection = window.getSelection(); if (selection.rangeCount > 0) savedSelectionRange = selection.getRangeAt(0); };
    window.applyCustomColor = function(command, color) { if (savedSelectionRange) { var selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(savedSelectionRange); } document.execCommand(command, false, color); checkSelection(); };
    window.applyExactFontSize = function(size) { if (savedSelectionRange) { var selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(savedSelectionRange); } else { var editor = document.activeElement; if(!editor || editor.getAttribute('contenteditable') !== 'true') return; } document.execCommand("fontSize", false, "7"); var fontElements = document.getElementsByTagName("font"); for (var i = 0; i < fontElements.length; i++) { if (fontElements[i].size == "7") { fontElements[i].removeAttribute("size"); fontElements[i].style.fontSize = size + "px"; } } checkSelection(); };
    window.adjustFontSize = function(delta) { var input = document.getElementById('fontSizeInput'); var currentSize = parseInt(input.value) || 13; var newSize = currentSize + delta; if(newSize < 8) newSize = 8; if(newSize > 72) newSize = 72; input.value = newSize; applyExactFontSize(newSize); };

    function checkSelection() {
        setTimeout(() => {
            var selection = window.getSelection();
            var toolbar = $('#format-toolbar');
            if (selection && selection.rangeCount > 0 && !selection.isCollapsed) {
                var node = selection.anchorNode; var isInsideEditor = false;
                while (node) { if (node.nodeType === 1 && node.getAttribute('contenteditable') === 'true') { isInsideEditor = true; break; } node = node.parentNode; }
                if (isInsideEditor) {
                    var range = selection.getRangeAt(0); var rect = range.getBoundingClientRect();
                    toolbar.css('display', 'flex');
                    var tWidth = toolbar.outerWidth(); var tHeight = toolbar.outerHeight();
                    var top = rect.top + window.scrollY - tHeight - 12;
                    var left = rect.left + window.scrollX + (rect.width / 2) - (tWidth / 2);
                    if (top < window.scrollY + 10) { top = rect.bottom + window.scrollY + 12; }
                    if (left < 10) left = 10;
                    var maxLeft = $(window).width() - tWidth - 10;
                    if (left > maxLeft) left = maxLeft;
                    toolbar.css({ top: top + 'px', left: left + 'px' });
                } else { toolbar.hide(); }
            } else { toolbar.hide(); }
        }, 100);
    }
    document.addEventListener('selectionchange', checkSelection); document.addEventListener('mouseup', checkSelection); document.addEventListener('touchend', checkSelection);
    window.formatText = function(command, value = null) { document.execCommand(command, false, value); checkSelection(); };
    window.applyColor = function(textColor, bgColor) { document.execCommand('foreColor', false, textColor); document.execCommand('backColor', false, bgColor); checkSelection(); };

    function initDaily() {
        var today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        selectedDay = today.getDate();
        updateYMDisplay();
        fetchMonthData(); 
    }

    function updateYMDisplay() {
        $('#ym-display').text(`${currentYear}년 ${currentMonth}월`).show();
        var mm = String(currentMonth).padStart(2, '0');
        $('#ym-picker').val(`${currentYear}-${mm}`).hide();
    }

    window.showYMPicker = function() {
        $('#ym-display').hide();
        $('#ym-picker').show().focus();
    };

    window.handleYMChange = function() {
        var val = $('#ym-picker').val();
        if(val) {
            var parts = val.split('-');
            currentYear = parseInt(parts[0], 10);
            currentMonth = parseInt(parts[1], 10);
            selectedDay = 1; 
        }
        updateYMDisplay();
        filterMonthData();
    };

    function renderTabs() {
        var daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        if (selectedDay > daysInMonth) selectedDay = daysInMonth; 
        var html = '';
        for(var i = 1; i <= daysInMonth; i++) {
            var isActive = (i === selectedDay) ? 'active' : '';
            var displayDay = String(i).padStart(2, '0');
            html += `<span class="daily-tab-num fade-in-element ${isActive}" id="tab-day-${i}" onclick="selectDay(${i})">${displayDay}</span>`;
        }
        $('#daily-tabs').html(html);
        setTimeout(() => {
            var activeTab = document.getElementById(`tab-day-${selectedDay}`);
            if(activeTab) { activeTab.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }, 100);
    }

    window.selectDay = function(day) {
        selectedDay = day;
        $('.daily-tab-num').removeClass('active');
        $(`#tab-day-${day}`).addClass('active');
        renderContentForSelectedDay();
    };

    async function fetchMonthData() {
        try {
            var { data, error } = await dailySupabase.from('posts').select('*').eq('category', 'daily');
            if (error) throw error;
            allDailyPosts = data; 
            filterMonthData();
        } catch (error) { console.error("데이터 로드 실패:", error); }
    }

    function filterMonthData() {
        allMonthPosts = allDailyPosts.filter(post => {
            var pd = new Date(post.created_at);
            return pd.getFullYear() === currentYear && (pd.getMonth() + 1) === currentMonth;
        });
        renderTabs();
        renderContentForSelectedDay();
    }

    function renderContentForSelectedDay() {
        var container = $('#daily-content-area');
        container.empty();
        var dayPosts = allMonthPosts.filter(p => new Date(p.created_at).getDate() === selectedDay)
                                      .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        if(dayPosts.length === 0) {
            container.html('<p style="font-size: 12px; color: var(--sub-color); opacity: 0.5; font-family: \'Noto Serif KR\', serif; padding-top: 20px;">No entries for this day.</p>');
            return;
        }
        renderPostList(dayPosts, container, false);
    }

    // 🚨 구버전 데이터(사진 따로)와 신버전 데이터(에디터 인라인)를 모두 지원하는 완벽한 호환 렌더링
    function renderPostList(postArray, container, isSearchResult) {
        postArray.forEach(post => {
            var textHtml = post.content || "";
            var tagsText = "";
            var oldImgUrl = "";

            if (post.content && post.content.includes("|||")) {
                var parts = post.content.split("|||");
                if (parts.length === 3) {
                    oldImgUrl = parts[0];
                    textHtml = parts[1] || "";
                    tagsText = parts[2] || "";
                } else if (parts.length === 2) {
                    textHtml = parts[0] || "";
                    tagsText = parts[1] || "";
                }
            }

            // 구버전 이미지가 있다면 텍스트의 맨 위로 예쁘게 올려서 붙여줍니다.
            if (oldImgUrl) {
                textHtml = `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${oldImgUrl}"></span>` + textHtml;
            }

            var titleBlock = post.title ? `<div class="daily-post-title" onclick="toggleDailyAdmin(${post.id})">${post.title}</div>` : "";
            
            var searchDateBlock = "";
            if (isSearchResult) {
                var pd = new Date(post.created_at);
                searchDateBlock = `<div style="font-size: 11px; color: var(--sub-color); margin-bottom: 5px;">${pd.getFullYear()}년 ${pd.getMonth()+1}월 ${pd.getDate()}일</div>`;
            }

            var jsSafeTags = tagsText.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "\\n").replace(/\r/g, "");
            var tagsBlock = tagsText ? `<div class="daily-post-tags"><span onclick="searchByTag('${jsSafeTags}')">${tagsText}</span></div>` : "";

            var postHtml = `
                <div class="daily-post-item fade-in-element read-mode" id="daily-post-${post.id}">
                    ${searchDateBlock}
                    ${titleBlock}
                    <div class="daily-post-text" id="daily-text-${post.id}" onclick="toggleDailyAdmin(${post.id})">${textHtml}</div>
                    
                    <div class="daily-admin-panel" id="daily-admin-${post.id}">
                        ${tagsBlock}
                        <div class="daily-admin-menu">
                            <button class="admin-btn edit" onclick="openDailyEditModal(${post.id})">Edit</button>
                            <button class="admin-btn delete" onclick="deleteDailyPost(${post.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            container.append(postHtml);
        });
        container.scrollTop(0);
    }

    window.toggleDailyAdmin = function(id) {
        $(`#daily-admin-${id}`).slideToggle(150).css('display', 'flex');
    };

    window.searchByTag = function(tagStr) {
        if(!tagStr) return;
        var pureTag = tagText.match(/#[^\s#]+/)[0] || tagText;
        $('#daily-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).val(pureTag);
        $('#search-icon').css('opacity', '0.7');
        $('#daily-search').trigger('input');
    };

    $('#search-icon').click(function() {
        $('#daily-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    
    $('#daily-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
            renderContentForSelectedDay(); 
        }
    });

    // 🚨 검색 기능 고도화: '/이미지' 검색 시 사진이 포함된 글만 필터링
    $('#daily-search').on('input', function() {
        var keyword = $(this).val().toLowerCase();
        var container = $('#daily-content-area');
        
        if (keyword.trim() === '') {
            renderContentForSelectedDay();
            return;
        }
        
        container.empty();
        var matchedPosts = allDailyPosts.filter(post => {
            var textHtml = post.content || '';
            var safeTitle = post.title || '';
            var tagsText = "";
            var oldImgUrl = "";
            
            if (post.content && post.content.includes("|||")) {
                var parts = post.content.split("|||");
                if (parts.length === 3) {
                    oldImgUrl = parts[0];
                    textHtml = parts[1];
                    tagsText = parts[2];
                } else {
                    textHtml = parts[0];
                    tagsText = parts[1];
                }
            }

            // [요청] /이미지 특수 필터
            if (keyword === '/이미지') {
                return textHtml.includes('<img') || oldImgUrl !== "";
            }

            var pd = new Date(post.created_at);
            var dateStr = `${pd.getFullYear()}년 ${pd.getMonth()+1}월 ${pd.getDate()}일`;
            
            return (textHtml.toLowerCase().includes(keyword) || 
                    safeTitle.toLowerCase().includes(keyword) ||
                    tagsText.toLowerCase().includes(keyword) ||
                    dateStr.includes(keyword));
        }).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); 

        if(matchedPosts.length === 0) {
            container.html('<p style="font-size: 12px; color: var(--sub-color); opacity: 0.5; font-family: \'Noto Serif KR\', serif; padding-top: 20px;">No results found.</p>');
            return;
        }

        renderPostList(matchedPosts, container, true);
    });

    /* 🚨 [안전한 이미지 압축 모듈] */
    window.compressImage = async function(file, qualityType) {
        if (qualityType === 'original' || file.type === 'image/gif') {
            return { fileOrBlob: file, ext: file.name.split('.').pop() };
        }
        return new Promise((resolve) => {
            var reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                var img = new Image(); img.src = event.target.result;
                img.onload = function() {
                    var maxWidth = qualityType === 'high' ? 1920 : 1080;
                    var quality = qualityType === 'high' ? 0.8 : 0.6;
                    var width = img.width; var height = img.height;
                    if (width > maxWidth || height > maxWidth) {
                        if (width > height) { height = Math.round((height * maxWidth) / width); width = maxWidth; } 
                        else { width = Math.round((width * maxWidth) / height); height = maxWidth; }
                    }
                    var canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                    var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    var outType = (file.type === 'image/png' || file.type === 'image/webp') ? 'image/webp' : 'image/jpeg';
                    var ext = (outType === 'image/webp') ? 'webp' : 'jpg';
                    canvas.toBlob((blob) => { 
                        if (!blob) { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); return; }
                        try {
                            var newFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ext, { type: outType, lastModified: file.lastModified });
                            resolve({ fileOrBlob: newFile, ext: ext });
                        } catch(e) { resolve({ fileOrBlob: blob, ext: ext }); }
                    }, outType, quality);
                };
                img.onerror = function() { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); };
            };
            reader.onerror = function() { resolve({ fileOrBlob: file, ext: file.name.split('.').pop() }); };
        });
    };

    // 🚨 파일 업로드 시 에디터 본문에 삽입
    $('#daily-file-input').on('change', async function(e) {
        var files = Array.from(e.target.files); if(!files.length) return;
        
        var dateVal = $('#daily-modal-date').val();
        if(!dateVal) {
            var firstDate = new Date(files[0].lastModified);
            var yyyy = firstDate.getFullYear(); var mm = String(firstDate.getMonth()+1).padStart(2, '0'); var dd = String(firstDate.getDate()).padStart(2, '0');
            $('#daily-modal-date').val(`${yyyy}-${mm}-${dd}`);
        }
        
        $('#daily-submit-btn').prop('disabled', true).css('opacity', '0.3'); $('.daily-add-img-btn').css('opacity', '0.3');
        var qualityOption = $('#daily-img-quality').val() || 'original';
        var allImgHtml = '';

        for(var file of files) {
            var compressed = await compressImage(file, qualityOption);
            var fileExt = compressed.ext || 'jpg';
            var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            
            var { error } = await dailySupabase.storage.from('images').upload(fileName, compressed.fileOrBlob, {
                contentType: compressed.fileOrBlob.type || 'image/jpeg'
            });
            
            if(!error) {
                pendingUploads.push(fileName); 
                var { data } = dailySupabase.storage.from('images').getPublicUrl(fileName);
                allImgHtml += `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${data.publicUrl}"></span> `;
            }
        }
        if(allImgHtml !== '') { $('#daily-modal-content').focus(); document.execCommand('insertHTML', false, allImgHtml); }
        $('#daily-submit-btn').prop('disabled', false).css('opacity', '0.7'); $('.daily-add-img-btn').css('opacity', '1'); $(this).val('');
    });

    /* --- [이미지 조율 툴바 로직] --- */
    var activeImgWrap = null;

    window.showImgToolbar = function(imgWrap) {
        activeImgWrap = imgWrap;
        var toolbar = $('#img-format-toolbar');
        toolbar.css('display', 'flex');
        
        var rect = imgWrap[0].getBoundingClientRect();
        var top = rect.top + window.scrollY - toolbar.outerHeight() - 10;
        var left = rect.left + window.scrollX + (rect.width / 2) - (toolbar.outerWidth() / 2);
        
        if (top < window.scrollY + 10) top = rect.bottom + window.scrollY + 10; 
        if (left < 10) left = 10;
        
        toolbar.css({ top: top + 'px', left: left + 'px' });
    };

    $(document).on('mousedown touchstart', '.daily-modal-editor .editor-img-wrap', function(e) {
        e.preventDefault(); 
        if (document.activeElement) document.activeElement.blur(); 
        showImgToolbar($(this));
    });

    $(document).on('mousedown touchstart', function(e) {
        if (!$(e.target).closest('.editor-img-wrap, #img-format-toolbar').length) {
            $('#img-format-toolbar').hide();
            activeImgWrap = null;
        }
    });

    $(document).on('click', '.read-mode .editor-img-wrap img', function(e) {
        e.stopPropagation();
        $('#hasion-lightbox-img').attr('src', $(this).attr('src'));
        $('#hasion-lightbox').css('display', 'flex').hide().fadeIn(150);
    });

    window.closeHasionLightbox = function() { $('#hasion-lightbox').fadeOut(150); };

    window.setImgLayout = function(layoutClass) {
        if(!activeImgWrap) return;
        activeImgWrap.removeClass('img-full img-half img-third').addClass(layoutClass);
        setTimeout(() => showImgToolbar(activeImgWrap), 50); 
    };

    window.moveImgOrder = function(dir) {
        if(!activeImgWrap) return;
        var node = activeImgWrap[0];
        if (dir === 'up') {
            if (node.previousSibling) { node.parentNode.insertBefore(node, node.previousSibling); }
        } else if (dir === 'down') {
            if (node.nextSibling) { node.parentNode.insertBefore(node, node.nextSibling.nextSibling); }
        }
        showImgToolbar(activeImgWrap);
    };

    window.deleteSelectedImg = function() {
        if(!activeImgWrap) return;
        
        var imgUrl = activeImgWrap.find('img').attr('src');
        if (imgUrl && imgUrl.includes('supabase.co/storage/v1/object/public/images/')) {
            var fileName = imgUrl.split('/').pop();
            dailySupabase.storage.from('images').remove([fileName]); 
            var pIndex = pendingUploads.indexOf(fileName);
            if (pIndex > -1) pendingUploads.splice(pIndex, 1);
        }

        activeImgWrap.remove();
        $('#img-format-toolbar').hide();
        activeImgWrap = null;
    };


    // 🚨 모달 창 열기
    window.openDailyWriteModal = function() {
        isEditing = false;
        $('#daily-edit-id').val('');
        $('#daily-modal-title').val('');
        $('#daily-modal-tags').val(''); 
        $('#daily-modal-content').html('');

        var mm = String(currentMonth).padStart(2, '0');
        var dd = String(selectedDay).padStart(2, '0');
        $('#daily-modal-date').val(`${currentYear}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    window.openDailyEditModal = function(id) {
        var post = allDailyPosts.find(p => p.id === id);
        if(!post) return;

        var textHtml = post.content || "";
        var tagsText = "";
        var oldImgUrl = "";
        
        if (post.content && post.content.includes("|||")) {
            var parts = post.content.split("|||");
            if (parts.length === 3) {
                oldImgUrl = parts[0];
                textHtml = parts[1] || "";
                tagsText = parts[2] || "";
            } else if (parts.length === 2) {
                textHtml = parts[0] || "";
                tagsText = parts[1] || "";
            }
        }

        // 구버전 이미지가 있다면 텍스트의 맨 위로 올려 편집 모드용으로 전환
        if (oldImgUrl) {
            textHtml = `<span class="editor-img-wrap img-full" contenteditable="false"><img src="${oldImgUrl}"></span>` + textHtml;
        }

        isEditing = true;
        $('#daily-edit-id').val(id);
        
        $('#daily-modal-title').val(post.title || "");
        $('#daily-modal-tags').val(tagsText); 
        $('#daily-modal-content').html(textHtml);

        var dateObj = new Date(post.created_at);
        var yyyy = dateObj.getFullYear();
        var mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        var dd = String(dateObj.getDate()).padStart(2, '0');
        $('#daily-modal-date').val(`${yyyy}-${mm}-${dd}`);

        $('#daily-lightbox').css('display', 'flex').hide().fadeIn(200);
    };

    window.closeDailyModal = function() {
        $('#daily-lightbox').fadeOut(200);
    };

    function extractImageNamesFromHtml(htmlContent) {
        var names = [];
        var regex = /<img[^>]+src="([^">]+)"/g;
        var match;
        while ((match = regex.exec(htmlContent)) !== null) {
            var url = match[1];
            if (url.includes('supabase.co/storage/v1/object/public/images/')) {
                var fileName = url.split('/').pop();
                if (fileName) names.push(fileName);
            }
        }
        return names;
    }

    // 🚨 글 저장 (hasion.html 방식 100% 이식)
    window.saveDailyPost = async function() {
        var titleVal = $('#daily-modal-title').val().trim();
        var tagsVal = $('#daily-modal-tags').val().trim(); 
        var textVal = $('#daily-modal-content').html().trim();
        var dateVal = $('#daily-modal-date').val();
        var btn = $('#daily-submit-btn');

        if (!textVal && !$('#daily-modal-content img').length) {
            alert("내용을 적어주세요."); return;
        }

        try {
            btn.prop('disabled', true).css('opacity', '0.3');

            // 새 규격은 imageUrl 부분을 비워두고 텍스트 에어리어 전체를 파트1에 넣습니다. (||| + 내용 + ||| + 태그)
            var finalContent = "" + "|||" + textVal + "|||" + tagsVal;

            var finalDate = new Date();
            if (dateVal) {
                var parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            var offset = finalDate.getTimezoneOffset() * 60000;
            var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            if (isEditing) {
                var postId = $('#daily-edit-id').val();
                var oldPost = allDailyPosts.find(p => p.id == postId);
                
                var { error } = await dailySupabase.from('posts').update({ 
                    title: titleVal, content: finalContent, created_at: localISOString 
                }).eq('id', postId);
                if (error) throw error;

                // [스토리지 청소] 기존 글에서 지워진 이미지 영구 삭제
                if (oldPost && oldPost.content) {
                    var oldText = oldPost.content;
                    // 만약 구버전 글이었다면?
                    if (oldPost.content.includes("|||") && oldPost.content.split("|||").length === 3) {
                        var oldImg = oldPost.content.split("|||")[0];
                        if (oldImg) oldText += `<img src="${oldImg}">`;
                    }
                    var oldImages = extractImageNamesFromHtml(oldText);
                    var newImages = extractImageNamesFromHtml(textVal);
                    var deletedImages = oldImages.filter(img => !newImages.includes(img));
                    if (deletedImages.length > 0) {
                        await dailySupabase.storage.from('images').remove(deletedImages);
                    }
                }

            } else {
                var { error } = await dailySupabase.from('posts').insert([{ 
                    category: 'daily', title: titleVal, content: finalContent, created_at: localISOString 
                }]);
                if (error) throw error;
            }

            pendingUploads = []; 
            closeDailyModal();
            
            if (dateVal) {
                var parts = dateVal.split('-');
                currentYear = parseInt(parts[0], 10);
                currentMonth = parseInt(parts[1], 10);
                selectedDay = parseInt(parts[2], 10);
                updateYMDisplay();
            }
            fetchMonthData(); 

        } catch (error) {
            alert('저장에 실패했습니다.');
        } finally {
            btn.prop('disabled', false).css('opacity', '0.7');
        }
    };

    window.deleteDailyPost = async function(id) {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        try {
            var postData = allDailyPosts.find(p => p.id == id);
            
            var { error } = await dailySupabase.from('posts').delete().eq('id', id);
            if (error) throw error;

            if (postData && postData.content) {
                var contentToParse = postData.content;
                if (postData.content.includes("|||") && postData.content.split("|||").length === 3) {
                    var oldImg = postData.content.split("|||")[0];
                    if (oldImg) contentToParse += `<img src="${oldImg}">`;
                }
                var fileNames = extractImageNamesFromHtml(contentToParse);
                if (fileNames.length > 0) {
                    await dailySupabase.storage.from('images').remove(fileNames);
                }
            }

            fetchMonthData();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    };

    function clearOrphanImages() {
        if (pendingUploads.length > 0) {
            dailySupabase.storage.from('images').remove(pendingUploads);
            pendingUploads = [];
        }
    }
    window.addEventListener('beforeunload', clearOrphanImages);
    
    var dailyObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            mutation.removedNodes.forEach(function(node) {
                if (node.classList && node.classList.contains('daily-wrapper')) {
                    clearOrphanImages();
                }
            });
        });
    });
    dailyObserver.observe(document.body, { childList: true, subtree: true });

    setTimeout(() => { initDaily(); }, 100);
</script>
