<style>
    .archive-wrapper {
        position: relative;
        padding-top: 10px;
    }

    /* 이미지 업로드 영역 디자인 */
    .upload-container {
        border: 1px dashed var(--point-color);
        border-radius: 4px;
        padding: 30px 20px;
        text-align: center;
        margin-bottom: 25px;
        background: transparent;
        transition: background 0.3s ease, border-color 0.3s ease;
        position: relative;
    }
    .upload-container:hover {
        background: rgba(0, 0, 0, 0.02);
    }
    
    .upload-btn-label {
        display: inline-block;
        color: var(--point-color);
        font-family: 'Noto Serif KR', serif;
        font-size: 13px;
        cursor: pointer;
        padding: 8px 16px;
        border: 1px solid var(--point-color);
        border-radius: 20px;
        transition: 0.2s;
    }
    .upload-btn-label:hover {
        background: var(--point-color);
        color: #fff;
    }

    /* 선택된 이미지 미리보기 */
    #image-preview-wrapper {
        display: none;
        margin-top: 20px;
        position: relative;
    }
    #image-preview {
        max-width: 100%;
        max-height: 250px;
        border-radius: 4px;
        object-fit: contain;
        border: 1px solid var(--divider-bg);
    }
    #remove-preview {
        position: absolute;
        top: -10px;
        right: -10px;
        background: #ff3b30;
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* 캡션(제목) 입력 및 전송 영역 */
    .archive-input-group {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
        border-bottom: 1px solid var(--divider-bg);
        padding-bottom: 8px;
    }
    #archive-caption {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--main-color);
        font-family: 'Noto Serif KR', serif;
        font-size: 13px;
        outline: none;
    }
    .archive-submit-btn {
        background: none;
        border: none;
        color: var(--point-color);
        font-family: 'Noto Serif KR', serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        padding: 0;
        white-space: nowrap;
        transition: opacity 0.2s ease;
    }

    /* 갤러리 그리드 레이아웃 */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 15px;
        margin-top: 30px;
        padding-bottom: 40px;
    }
    @media (min-width: 768px) {
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    }

    .gallery-item {
        position: relative;
        aspect-ratio: 1; /* 완벽한 정사각형 */
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid var(--divider-bg);
        background: rgba(0,0,0,0.02);
    }
    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* 정사각형에 맞게 꽉 채움 */
        transition: transform 0.4s ease;
    }
    .gallery-item:hover img {
        transform: scale(1.05);
    }

    /* 이미지 호버 시 나타나는 오버레이 (날짜, 삭제 버튼) */
    .gallery-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        opacity: 0;
        transition: opacity 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px;
    }
    .gallery-item:hover .gallery-overlay {
        opacity: 1;
    }
    .gallery-date {
        color: rgba(255,255,255,0.9);
        font-family: 'Noto Serif KR', serif;
        font-size: 10px;
        text-align: left;
    }
    .gallery-delete {
        color: #ff3b30;
        align-self: flex-end;
        cursor: pointer;
        font-size: 14px;
    }
    .gallery-caption-text {
        font-size: 12px;
        color: var(--main-color);
        font-family: 'Noto Serif KR', serif;
        margin-top: 8px;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* 라이트박스 */
    .archive-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; flex-direction: column; cursor: zoom-out;
    }
    .archive-lightbox img {
        max-width: 90%; max-height: 80%; object-fit: contain; border-radius: 4px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: memoZoom 0.25s ease-out;
    }
    .archive-lightbox-caption {
        color: rgba(255,255,255,0.8); font-family: 'Noto Serif KR', serif; font-size: 13px;
        margin-top: 20px; animation: memoZoom 0.25s ease-out;
    }
</style>

<div class="archive-wrapper">
    
    <div class="upload-container">
        <input type="file" id="archive-file-input" accept="image/*" style="display: none;">
        
        <label for="archive-file-input" class="upload-btn-label">
            <i class="xi-camera-o"></i> 사진 고르기
        </label>
        <p style="font-size: 11px; color: var(--sub-color); margin-top: 10px; font-family: 'Noto Serif KR', serif;">
            소중한 순간을 보관소에 남겨두세요.
        </p>

        <div id="image-preview-wrapper">
            <button id="remove-preview" onclick="removePreview()"><i class="xi-close"></i></button>
            <img id="image-preview" src="">
            
            <div class="archive-input-group">
                <input type="text" id="archive-caption" autocomplete="off" placeholder="사진에 대한 짧은 기록 (선택)">
                <button class="archive-submit-btn" id="submit-btn" onclick="uploadArchivePost()">기록하기</button>
            </div>
        </div>
    </div>

    <div class="gallery-grid" id="gallery-feed"></div>

</div>

<div id="archive-lightbox" class="archive-lightbox" onclick="closeArchiveLightbox()">
    <img id="lightbox-archive-img" src="">
    <div class="archive-lightbox-caption" id="lightbox-archive-caption"></div>
</div>

<script>
    const ARCHIVE_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    const ARCHIVE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    const archiveSupabase = window.supabase.createClient(ARCHIVE_URL, ARCHIVE_KEY);

    let selectedFile = null;

    // 1. 파일 선택 시 미리보기 띄우기
    $('#archive-file-input').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            $('#image-preview').attr('src', e.target.result);
            $('#image-preview-wrapper').slideDown(250);
            $('.upload-btn-label').hide(); // 버튼 숨기기
        }
        reader.readAsDataURL(file);
    });

    // 2. 미리보기 취소
    window.removePreview = function() {
        selectedFile = null;
        $('#archive-file-input').val('');
        $('#archive-caption').val('');
        $('#image-preview-wrapper').slideUp(200, function() {
            $('.upload-btn-label').fadeIn(200);
        });
    };

    // 3. 사진 업로드 및 데이터베이스 저장 (대망의 핵심 로직)
    window.uploadArchivePost = async function() {
        if (!selectedFile) return;

        const caption = $('#archive-caption').val().trim();
        const btn = $('#submit-btn');

        try {
            btn.prop('disabled', true).text('보관 중...');

            // (1) 파일 이름 겹치지 않게 무작위 생성 (현재시간 + 난수)
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;

            // (2) Supabase Storage 'images' 버킷에 파일 업로드
            const { data: uploadData, error: uploadError } = await archiveSupabase.storage
                .from('images')
                .upload(fileName, selectedFile);

            if (uploadError) throw uploadError;

            // (3) 업로드된 파일의 공개 URL 가져오기
            const { data: publicUrlData } = archiveSupabase.storage
                .from('images')
                .getPublicUrl(fileName);
            
            const imageUrl = publicUrlData.publicUrl;

            // (4) KST 한국 시간 생성 (영국시간 Z 떼기)
            const now = new Date(); 
            const offset = now.getTimezoneOffset() * 60000;
            const localISOString = new Date(now.getTime() - offset).toISOString().slice(0, -1);

            // (5) DB 'posts' 테이블에 저장 (category: 'archive', content: 이미지URL, title: 캡션)
            const { error: dbError } = await archiveSupabase.from('posts').insert([{ 
                category: 'archive', 
                content: imageUrl, 
                title: caption,
                created_at: localISOString 
            }]);

            if (dbError) throw dbError;

            // 완료 후 초기화
            removePreview();
            loadGalleryPosts();

        } catch (error) {
            console.error(error);
            alert('사진을 보관하지 못했습니다. (Storage 설정이 Public인지 확인해 주세요.)');
        } finally {
            btn.prop('disabled', false).text('기록하기');
        }
    };

    // 4. 갤러리 불러오기
    async function loadGalleryPosts() {
        const feedContainer = $('#gallery-feed');
        feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">사진을 인화하는 중입니다...</p>');

        try {
            const { data, error } = await archiveSupabase.from('posts')
                .select('*')
                .eq('category', 'archive')
                .order('created_at', { ascending: false });
                
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">보관된 사진이 없습니다.</p>');
                return;
            }

            data.forEach(post => {
                const dateObj = new Date(post.created_at);
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const displayDate = `${yyyy}.${mm}.${dd}`;

                const captionHTML = post.title ? `<div class="gallery-caption-text">${post.title}</div>` : '';

                // 이미지 격자 아이템 생성
                const postHtml = `
                    <div>
                        <div class="gallery-item fade-in-element" onclick="openArchiveLightbox('${post.content}', '${post.title ? post.title.replace(/'/g, "\\'") : ''}')">
                            <img src="${post.content}" alt="archive image" loading="lazy">
                            <div class="gallery-overlay">
                                <span class="gallery-date">${displayDate}</span>
                                <i class="xi-trash gallery-delete" title="삭제" onclick="event.stopPropagation(); deleteArchivePost(${post.id})"></i>
                            </div>
                        </div>
                        ${captionHTML}
                    </div>
                `;
                feedContainer.append(postHtml);
            });

        } catch (error) {
            feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">사진을 불러오지 못했습니다.</p>');
        }
    }

    // 5. 사진 삭제
    window.deleteArchivePost = async function(id) {
        if (!confirm("이 사진을 보관소에서 영구 삭제하시겠습니까?")) return;
        try {
            const { error } = await archiveSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadGalleryPosts();
        } catch (error) {
            alert('삭제하지 못했습니다.');
        }
    };

    // 6. 라이트박스 (원본 크기로 보기)
    window.openArchiveLightbox = function(src, caption) {
        $('#lightbox-archive-img').attr('src', src);
        $('#lightbox-archive-caption').text(caption || '');
        $('#archive-lightbox').css('display', 'flex').fadeIn(150);
    };
    window.closeArchiveLightbox = function() {
        $('#archive-lightbox').fadeOut(150);
    };

    // 초기 로드
    setTimeout(() => { loadGalleryPosts(); }, 100);
</script>
