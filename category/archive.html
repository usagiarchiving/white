<style>
    .archive-wrapper {
        position: relative;
        padding-top: 10px;
    }

    /* 검색창 & 태그 아이콘 레이아웃 */
    .search-wrapper { 
        display: flex; justify-content: flex-end; align-items: center; 
        margin-bottom: 20px; width: 100%; gap: 15px; 
    }
    #tags-toggle-btn {
        cursor: pointer; color: var(--sub-color); font-size: 18px; transition: color 0.3s;
    }
    #tags-toggle-btn:hover, #tags-toggle-btn.active { color: var(--point-color); }
    
    .search-inner { position: relative; display: flex; align-items: center; }
    #archive-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    /* 태그 모음 패널 */
    #tags-panel {
        display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; 
        padding: 15px; background: rgba(0,0,0,0.02); border-radius: 6px; 
        border: 1px solid var(--divider-bg);
    }
    .tag-pill {
        font-family: 'Noto Serif KR', serif; font-size: 11.5px; color: var(--sub-color);
        cursor: pointer; padding: 4px 10px; border-radius: 12px; 
        background: #fff; border: 1px solid var(--divider-bg); transition: all 0.2s;
    }
    .tag-pill:hover { color: var(--point-color); border-color: var(--point-color); }

    /* 맨 처음 구름 아이콘 */
    #initial-upload-wrapper {
        text-align: center; margin-bottom: 25px;
    }
    .cloud-upload-btn {
        cursor: pointer; font-size: 26px; color: #f5c9d5; 
        transition: color 0.3s ease, transform 0.2s ease;
        display: inline-block; padding: 10px;
    }
    .cloud-upload-btn:hover { color: var(--point-color); transform: translateY(-2px); }

    /* 점선 테두리 입력칸 */
    .upload-container {
        display: none; 
        border: 1px dashed var(--point-color); border-radius: 4px; padding: 20px;
        text-align: center; margin-bottom: 25px; background: transparent; position: relative;
    }
    #remove-preview {
        position: absolute; top: -10px; right: -10px; background: #ff3b30; color: #fff;
        border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 20;
    }

    /* 다중 이미지 썸네일 프리뷰 */
    .preview-grid {
        display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px;
        -ms-overflow-style: none; scrollbar-width: none;
    }
    .preview-grid::-webkit-scrollbar { display: none; }
    
    .preview-thumb-wrap {
        position: relative; width: 100px; height: 100px; flex-shrink: 0;
        cursor: pointer; border-radius: 4px; border: 2px solid transparent;
        transition: border-color 0.2s;
    }
    .preview-thumb-wrap.is-main { border-color: var(--point-color); }
    .preview-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
    
    .main-badge {
        position: absolute; top: 4px; left: 4px; background: var(--point-color); color: #fff;
        font-size: 9px; padding: 2px 5px; border-radius: 2px; display: none; z-index: 5;
    }
    .preview-thumb-wrap.is-main .main-badge { display: block; }

    /* 제목, 기록, 태그 입력 폼 */
    .archive-input-item {
        width: 100%; background: transparent; border: none; color: var(--main-color);
        font-family: 'Noto Serif KR', serif; font-size: 13px; outline: none;
        border-bottom: 1px solid var(--divider-bg); padding-bottom: 8px;
    }
    
    .archive-footer-group {
        display: flex; justify-content: space-between; align-items: center; margin-top: 15px;
    }
    #archive-date-picker {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer;
    }
    .archive-submit-btn {
        background: none; border: none; color: var(--point-color);
        cursor: pointer; padding: 5px; font-size: 20px; transition: 0.2s; opacity: 0.7;
    }
    .archive-submit-btn:hover { opacity: 1; transform: translateX(3px); }

    /* 갤러리 그리드 */
    .gallery-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 5px; margin-top: 20px; padding-bottom: 40px;
    }
    @media (min-width: 768px) {
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    }

    .gallery-item {
        position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden;
        cursor: pointer; border: 1px solid var(--divider-bg); background: rgba(0,0,0,0.02);
    }
    .gallery-item img {
        width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }

    .gallery-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s ease;
        display: flex; flex-direction: column; justify-content: space-between; padding: 10px;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-date { color: rgba(255,255,255,0.9); font-family: 'Noto Serif KR', serif; font-size: 10px; }
    .gallery-hover-title {
        color: rgba(255,255,255,1); font-family: 'Noto Serif KR', serif; font-size: 12px; font-weight: 600;
        text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 팝업 배경 및 카드 */
    .archive-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(150, 150, 150, 0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out; padding: 20px;
    }
    .archive-lightbox-card {
        background: #ffffff; border: 1px solid var(--divider-bg); border-radius: 4px;
        padding: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1); cursor: default;
        animation: memoZoom 0.25s ease-out; display: flex; flex-direction: column; gap: 15px;
    }
    @keyframes memoZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>

<div class="archive-wrapper">
    
    <div class="search-wrapper">
        <i class="xi-tags" id="tags-toggle-btn" title="태그 모음 열기"></i>

            <input type="text" id="archive-search" autocomplete="off" placeholder="Search">

    <div id="tags-panel"></div>

    <div id="initial-upload-wrapper">

    <div id="upload-container" class="upload-container">
        <button id="remove-preview" onclick="removePreview()"><i class="xi-close"></i></button>
        
        <div class="preview-grid" id="preview-grid"></div>
        
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 12.5px; color: var(--main-color); cursor: pointer; display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="group-upload-cb" onchange="toggleGroupMode()" style="accent-color: var(--point-color);">

            </label>
            <div id="group-help" style="display: none; font-size: 11.5px; color: var(--point-color); margin-top: 6px; padding-left: 20px;">

            </div>

        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
            <input type="text" id="archive-title" class="archive-input-item" autocomplete="off" placeholder="Title" style="text-align: center;">
            <textarea id="archive-caption" class="archive-input-item" placeholder="Caption" style="min-height: 60px; resize: none; line-height: 1.6;"></textarea>
            
            <input type="text" id="archive-tags" class="archive-input-item" autocomplete="off" placeholder="Tags (e.g., #daily #film)">
            
            <div class="archive-footer-group">
                <input type="date" id="archive-date-picker" title="Change Date">

    <div class="gallery-grid" id="gallery-feed"></div>

</div>

    <div class="archive-lightbox-card" id="archive-lightbox-card">
        
        <div id="lightbox-archive-img-container" style="display: flex; flex-direction: column; width: 100%;">
        </div>
        
        <div id="lightbox-read-mode">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; border-bottom: 1px solid var(--divider-bg); padding-bottom: 8px;">
                <div id="lightbox-archive-title" style="font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--main-color);"></div>
                <div id="lightbox-archive-date" style="font-family: 'Noto Serif KR', serif; font-size: 11px; color: var(--sub-color);"></div>
            </div>
            
            <div id="lightbox-archive-caption" style="font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--main-color); line-height: 1.7; word-break: break-all; margin-bottom: 8px;"></div>
            
            <div id="lightbox-archive-tags" onclick="triggerTagSearch(this.innerText)" style="font-family: 'Noto Serif KR', serif; font-size: 11.5px; color: var(--sub-color); cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='var(--point-color)'" onmouseout="this.style.color='var(--sub-color)'"></div>
            
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">

                <i class="xi-trash" onclick="deleteArchiveFromLightbox()" title="Delete" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'; this.style.color='#ff3b30'" onmouseout="this.style.opacity='0.35'; this.style.color='var(--sub-color)'"></i>

        </div>

        <div id="lightbox-edit-mode" style="display: none; flex-direction: column; gap: 12px;">
            <input type="text" id="edit-archive-title" placeholder="Title" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; padding:4px 0; outline:none;">
            <textarea id="edit-archive-caption" placeholder="Caption" style="width:100%; min-height:80px; background:transparent; border:1px solid var(--point-color); border-radius:2px; color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; padding:10px; outline:none; resize:none; line-height:1.6;"></textarea>
            
            <input type="text" id="edit-archive-tags" placeholder="Tags (e.g., #daily #film)" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; padding:4px 0; outline:none;">
            
            <input type="date" id="edit-archive-date" style="width: 120px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
            
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                <button onclick="saveArchiveEdit()" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">Save</button>
                <button onclick="cancelArchiveEdit()" style="background:none; border:none; color:var(--sub-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">Cancel</button>
            </div>
        </div>

    </div>
</div>

<script>
    // [핵심 변경] 새로운 수파베이스 URL과 KEY가 적용되었습니다!
    var ARCHIVE_URL = 'https://qefyxypznhovdshagcpc.supabase.co';
    var ARCHIVE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZnl4eXB6bmhvdmRzaGFnY3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzc2MTIsImV4cCI6MjA5NzIxMzYxMn0.RuAe5F5uOinYWDYmmF7YaNTuvhY_H41AhnX8orN6v_Y';
    var archiveSupabase = window.supabase.createClient(ARCHIVE_URL, ARCHIVE_KEY);

    var selectedFiles = [];
    var mainFileIndex = 0;
    var currentLightboxPostId = null;
    var currentLightboxImageUrl = "";

    // 1. 파일 다중 선택 핸들링
    $('#archive-file-input').on('change', function(e) {
        if (!e.target.files || e.target.files.length === 0) return;

        selectedFiles = Array.from(e.target.files);
        mainFileIndex = 0; // 초기값은 항상 0번 사진이 대표

        var fileDate = new Date(selectedFiles[0].lastModified);
        var yyyy = fileDate.getFullYear();
        var mm = String(fileDate.getMonth() + 1).padStart(2, '0');
        var dd = String(fileDate.getDate()).padStart(2, '0');
        $('#archive-date-picker').val(`${yyyy}-${mm}-${dd}`);

        renderPreviews();
        $('#initial-upload-wrapper').hide(); 
        $('#upload-container').slideDown(250); 
    });

    // 썸네일 생성 및 대표 사진 렌더링
    window.renderPreviews = function() {
        var isGroup = $('#group-upload-cb').is(':checked');
        $('#preview-grid').empty();
        
        selectedFiles.forEach((file, index) => {
            var reader = new FileReader();
            reader.onload = function(e) {
                var mainClass = (isGroup && index === mainFileIndex) ? 'is-main' : '';
                var html = `
                    <div class="preview-thumb-wrap ${mainClass}" onclick="setMainFile(${index})">
                        <div class="main-badge">대표</div>
                        <img src="${e.target.result}">
                    </div>
                `;
                $('#preview-grid').append(html);
            }
            reader.readAsDataURL(file);
        });
    };

    // 묶음 옵션 토글
    window.toggleGroupMode = function() {
        var isGroup = $('#group-upload-cb').is(':checked');
        if (isGroup) $('#group-help').slideDown(150);
        else $('#group-help').slideUp(150);
        renderPreviews();
    };

    // 대표 사진 지정
    window.setMainFile = function(index) {
        if (!$('#group-upload-cb').is(':checked')) return; 
        mainFileIndex = index;
        renderPreviews();
    };

    window.removePreview = function() {
        selectedFiles = [];
        mainFileIndex = 0;
        $('#archive-file-input').val('');
        $('#archive-title').val('');
        $('#archive-caption').val('');
        $('#archive-tags').val(''); 
        $('#group-upload-cb').prop('checked', false);
        $('#group-help').hide();
        $('#upload-container').slideUp(200, function() {
            $('#initial-upload-wrapper').fadeIn(200); 
        });
    };

    // 2. 다중 업로드 및 DB 저장
    window.uploadArchivePost = async function() {
        if (selectedFiles.length === 0) return;

        var titleVal = $('#archive-title').val().trim();
        var captionVal = $('#archive-caption').val().trim();
        var tagsVal = $('#archive-tags').val().trim(); 
        var dateVal = $('#archive-date-picker').val();
        var isGroup = $('#group-upload-cb').is(':checked');
        var btn = $('#submit-btn');

        try {
            btn.prop('disabled', true).css('opacity', '0.3');

            var uploadedUrls = [];
            var fileDates = [];
            
            // 모든 파일 스토리지 업로드
            for (var file of selectedFiles) {
                var fileExt = file.name.split('.').pop();
                var fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;

                var { error: uploadError } = await archiveSupabase.storage.from('images').upload(fileName, file);
                if (uploadError) throw uploadError;

                var { data: publicUrlData } = archiveSupabase.storage.from('images').getPublicUrl(fileName);
                uploadedUrls.push(publicUrlData.publicUrl);
                fileDates.push(new Date(file.lastModified));
            }

            if (isGroup) {
                // [묶음 모드] 한 게시물로 저장 (::: 구분자 사용)
                if (mainFileIndex > 0) {
                    var mUrl = uploadedUrls.splice(mainFileIndex, 1)[0];
                    uploadedUrls.unshift(mUrl);
                    var mDate = fileDates.splice(mainFileIndex, 1)[0];
                    fileDates.unshift(mDate);
                }
                
                var contentString = uploadedUrls.join(":::") + "|||" + captionVal + "|||" + tagsVal;
                var finalDate = new Date(fileDates[0]);
                
                if (dateVal) { 
                    var parts = dateVal.split('-');
                    finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
                }
                var offset = finalDate.getTimezoneOffset() * 60000;
                var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

                var { error: dbError } = await archiveSupabase.from('posts').insert([{ 
                    category: 'archive', content: contentString, title: titleVal, created_at: localISOString 
                }]);
                if (dbError) throw dbError;

            } else {
                // [개별 모드] 각각 독립적인 게시물로 저장 (각 원본 사진의 생성 시간 유지)
                var insertArray = [];
                for (var i = 0; i < uploadedUrls.length; i++) {
                    var contentString = uploadedUrls[i] + "|||" + captionVal + "|||" + tagsVal;
                    var finalDate = new Date(fileDates[i]); // 개별 원본 시간 사용
                    
                    if (dateVal) { 
                        var parts = dateVal.split('-');
                        finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
                    }
                    var offset = finalDate.getTimezoneOffset() * 60000;
                    var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

                    insertArray.push({
                        category: 'archive', content: contentString, title: titleVal, created_at: localISOString
                    });
                }

                var { error: dbError } = await archiveSupabase.from('posts').insert(insertArray);
                if (dbError) throw dbError;
            }

            removePreview();
            loadGalleryPosts();

        } catch (error) {
            alert('Failed to upload.');
        } finally {
            btn.prop('disabled', false).css('opacity', '0.7');
        }
    };

    // 3. 갤러리 로드 및 태그 생성
    async function loadGalleryPosts() {
        var feedContainer = $('#gallery-feed');
        feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">Loading...</p>');

        try {
            var { data, error } = await archiveSupabase.from('posts').select('*').eq('category', 'archive');
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">No archives found.</p>');
                return;
            }

            data.sort((a, b) => {
                var dateA = a.created_at.split('T')[0];
                var dateB = b.created_at.split('T')[0];
                if (dateA === dateB) return b.id - a.id; 
                return new Date(dateB) - new Date(dateA);
            });

            var allTags = new Set(); // 전체 태그 수집

            data.forEach(post => {
                var dateObj = new Date(post.created_at);
                var yyyy = dateObj.getFullYear();
                var mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                var dd = String(dateObj.getDate()).padStart(2, '0');
                var displayDate = `${yyyy}.${mm}.${dd}`;
                var inputDate = `${yyyy}-${mm}-${dd}`; 

                var imageUrls = post.content.split("|||")[0] || "";
                var mainImgUrl = imageUrls.split(":::")[0];
                var isMulti = imageUrls.includes(":::"); // 세트 이미지 여부

                var captionText = "";
                var tagsText = "";
                
                if (post.content && post.content.includes("|||")) {
                    var parts = post.content.split("|||");
                    captionText = parts[1] || "";
                    tagsText = parts[2] || "";
                }

                // 태그 파싱 (#으로 시작하는 단어 추출)
                var matches = tagsText.match(/#[^\s#]+/g);
                if(matches) matches.forEach(m => allTags.add(m));

                var safeTitle = post.title ? post.title.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                var safeCaption = captionText ? captionText.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                var safeTags = tagsText ? tagsText.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                
                var searchText = `${post.title || ''} ${captionText} ${tagsText} ${displayDate}`;

                // 세트 이미지일 경우 우측 상단에 겹친 아이콘 표시
                var multiIconHtml = isMulti ? `<i class="xi-library" style="position:absolute; top:8px; right:8px; color:rgba(255,255,255,0.9); text-shadow:0 1px 3px rgba(0,0,0,0.3); font-size:14px; z-index:5;"></i>` : "";

                var postHtml = `
                    <div class="gallery-wrapper-item" data-search="${searchText}">
                        <div class="gallery-item fade-in-element" onclick="openArchiveLightbox(${post.id}, '${imageUrls}', '${safeTitle}', '${safeCaption}', '${safeTags}', '${displayDate}', '${inputDate}')">
                            ${multiIconHtml}
                            <img src="${mainImgUrl}" alt="archive image" loading="lazy">
                            <div class="gallery-overlay">
                                <div style="display: flex; justify-content: flex-end; align-items: flex-start; width: 100%;">
                                    <span class="gallery-date">${displayDate}</span>
                                </div>
                                <div class="gallery-hover-title">${post.title || ''}</div>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });

            // 추출된 전체 태그 렌더링
            if (allTags.size > 0) {
                var tagsHtml = Array.from(allTags).map(tag => `<span class="tag-pill" onclick="triggerTagSearch('${tag}')">${tag}</span>`).join('');
                $('#tags-panel').html(tagsHtml);
            } else {
                $('#tags-panel').html('<span style="font-size:11px; color:var(--sub-color);">생성된 태그가 없습니다.</span>');
            }

        } catch (error) {
            feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">Failed to load.</p>');
        }
    }

    // 4. 태그 및 검색 제어
    $('#tags-toggle-btn').click(function() {
        $('#tags-panel').slideToggle(200);
        $(this).toggleClass('active');
    });

    window.triggerTagSearch = function(tagText) {
        if(!tagText) return;
        closeArchiveLightbox();
        $('#archive-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).val(tagText).focus();
        $('#search-icon').css('opacity', '0.7');
        $('#archive-search').trigger('input'); 
    };

    $('#search-icon').click(function() {
        $('#archive-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    $('#archive-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });
    $('#archive-search').on('input', function() {
        var keyword = $(this).val().toLowerCase();
        $('.gallery-wrapper-item').each(function() {
            var dataText = $(this).attr('data-search').toLowerCase();
            if (dataText.includes(keyword)) { $(this).show(); } else { $(this).hide(); }
        });
    });

    // 5. 삭제 및 라이트박스 제어
    window.deleteArchivePost = async function(id) {
        if (!confirm("Are you sure you want to delete this?")) return;
        try {
            var { error } = await archiveSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadGalleryPosts();
        } catch (error) { alert('Failed to delete.'); }
    };
    window.deleteArchiveFromLightbox = function() {
        deleteArchivePost(currentLightboxPostId);
        closeArchiveLightbox();
    };

    window.openArchiveLightbox = function(id, urlsStr, title, caption, tags, displayDate, inputDate) {
        currentLightboxPostId = id;
        currentLightboxImageUrl = urlsStr; // 묶음 URL 원본 저장
        
        // 여러 장의 이미지를 세로로 쫙 펼쳐서 렌더링
        var urls = urlsStr.split(":::");
        var imgsHtml = urls.map(u => `<img src="${u}" style="max-width: 100%; height: auto; object-fit: contain; border-radius: 2px; margin: 0 auto 15px auto; display: block; border: 1px solid var(--divider-bg);">`).join('');
        $('#lightbox-archive-img-container').html(imgsHtml);
        
        $('#lightbox-archive-title').text(title || '');
        $('#lightbox-archive-caption').html((caption || '').replace(/\n/g, '<br>'));
        $('#lightbox-archive-tags').text(tags || ''); 
        $('#lightbox-archive-date').text(displayDate || '');
        
        $('#edit-archive-title').val(title || '');
        $('#edit-archive-caption').val(caption || '');
        $('#edit-archive-tags').val(tags || '');
        $('#edit-archive-date').val(inputDate || ''); 
        
        $('#lightbox-read-mode').show();
        $('#lightbox-edit-mode').hide();
        
        $('#archive-lightbox').css('display', 'flex').hide().fadeIn(150);
    };
    
    window.closeArchiveLightbox = function() {
        $('#archive-lightbox').fadeOut(150);
    };

    window.startArchiveEdit = function() {
        $('#lightbox-read-mode').hide();
        $('#lightbox-edit-mode').fadeIn(200).css('display', 'flex');
    };
    window.cancelArchiveEdit = function() {
        $('#lightbox-edit-mode').hide();
        $('#lightbox-read-mode').fadeIn(200);
    };
    
    window.saveArchiveEdit = async function() {
        var newTitle = $('#edit-archive-title').val().trim();
        var newCaption = $('#edit-archive-caption').val().trim();
        var newTags = $('#edit-archive-tags').val().trim();
        var newDateStr = $('#edit-archive-date').val();
        
        var newContentStr = currentLightboxImageUrl + "|||" + newCaption + "|||" + newTags;
        
        try {
            var finalDate = new Date();
            if (newDateStr) {
                var parts = newDateStr.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            var offset = finalDate.getTimezoneOffset() * 60000;
            var localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            var { error } = await archiveSupabase.from('posts').update({ 
                title: newTitle, 
                content: newContentStr,
                created_at: localISOString
            }).eq('id', currentLightboxPostId);
            
            if (error) throw error;
            
            var yy = finalDate.getFullYear();
            var m = String(finalDate.getMonth() + 1).padStart(2, '0');
            var d = String(finalDate.getDate()).padStart(2, '0');
            
            $('#lightbox-archive-title').text(newTitle);
            $('#lightbox-archive-caption').html(newCaption.replace(/\n/g, '<br>'));
            $('#lightbox-archive-tags').text(newTags); 
            $('#lightbox-archive-date').text(`${yy}.${m}.${d}`);
            
            cancelArchiveEdit();
            loadGalleryPosts(); 
        } catch (error) {
            alert('Failed to save.');
        }
    };

    setTimeout(() => { loadGalleryPosts(); }, 100);
</script>
