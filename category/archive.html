<style>
    .archive-wrapper {
        position: relative;
        padding-top: 10px;
    }

    /* 검색창 레이아웃 */
    .search-wrapper { display: flex; justify-content: flex-end; margin-bottom: 25px; width: 100%; }
    .search-inner { position: relative; display: flex; align-items: center; }
    #archive-search {
        background: transparent; border: none; border-bottom: 1px solid transparent;
        color: var(--main-color); font-family: 'Noto Serif KR', serif; font-size: 12px;
        outline: none; padding: 2px 22px 2px 0; width: 0px; opacity: 0;
        transition: width 0.4s ease, opacity 0.3s, border-color 0.4s;
    }
    #search-icon {
        position: absolute; right: 0; color: var(--sub-color); opacity: 0.35;
        cursor: pointer; font-size: 15px; transition: opacity 0.3s; z-index: 10;
    }
    #search-icon:hover { opacity: 0.7; }

    /* 맨 처음 구름 아이콘 (색상 #f5c9d5로 변경) */
    #initial-upload-wrapper {
        text-align: center;
        margin-bottom: 25px;
    }
    .cloud-upload-btn {
        cursor: pointer; font-size: 26px; color: #f5c9d5; /* 요청하신 색상으로 변경 */
        transition: color 0.3s ease, transform 0.2s ease;
        display: inline-block; padding: 10px;
    }
    .cloud-upload-btn:hover { color: var(--point-color); transform: translateY(-2px); }

    /* 사진을 고르면 나타나는 점선 테두리 입력칸 */
    .upload-container {
        display: none; 
        border: 1px dashed var(--point-color); border-radius: 4px; padding: 20px;
        text-align: center; margin-bottom: 25px; background: transparent; position: relative;
    }
    #image-preview {
        max-width: 100%; max-height: 200px; border-radius: 4px;
        object-fit: contain; border: 1px solid var(--divider-bg);
    }
    #remove-preview {
        position: absolute; top: -10px; right: -10px; background: #ff3b30; color: #fff;
        border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* 제목, 기록 입력 폼 세로 분리 */
    .archive-input-item {
        width: 100%; background: transparent; border: none; color: var(--main-color);
        font-family: 'Noto Serif KR', serif; font-size: 13px; outline: none;
        border-bottom: 1px solid var(--divider-bg); padding-bottom: 8px;
    }
    
    /* 캘린더 날짜와 전송 화살표 영역 */
    .archive-footer-group {
        display: flex; justify-content: space-between; align-items: center; margin-top: 15px;
    }
    #archive-date-picker {
        background: transparent; border: none; outline: none; color: var(--sub-color);
        font-family: 'Noto Serif KR', serif; font-size: 11px; cursor: pointer;
    }
    .archive-submit-btn {
        background: none; border: none; color: var(--point-color);
        cursor: pointer; padding: 5px; font-size: 20px; transition: 0.2s; opacity: 0.7;
    }
    .archive-submit-btn:hover { opacity: 1; transform: translateX(3px); }

    /* 갤러리 그리드 */
    .gallery-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 5px; margin-top: 20px; padding-bottom: 40px;
    }
    @media (min-width: 768px) {
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    }

    .gallery-item {
        position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden;
        cursor: pointer; border: 1px solid var(--divider-bg); background: rgba(0,0,0,0.02);
    }
    .gallery-item img {
        width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }

    /* 호버 오버레이 */
    .gallery-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s ease;
        display: flex; flex-direction: column; justify-content: space-between; padding: 10px;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-date { color: rgba(255,255,255,0.9); font-family: 'Noto Serif KR', serif; font-size: 10px; }
    .gallery-hover-title {
        color: rgba(255,255,255,1); font-family: 'Noto Serif KR', serif; font-size: 12px; font-weight: 600;
        text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 팝업 배경 블러 */
    .archive-lightbox {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(150, 150, 150, 0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        z-index: 20000; align-items: center; justify-content: center; cursor: zoom-out; padding: 20px;
    }
    
    /* 팝업 카드 본문 흰색(#ffffff) */
    .archive-lightbox-card {
        background: #ffffff; border: 1px solid var(--divider-bg); border-radius: 4px;
        padding: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1); cursor: default;
        animation: memoZoom 0.25s ease-out; display: flex; flex-direction: column; gap: 15px;
    }
    .archive-lightbox-card img { width: 100%; max-height: 45vh; object-fit: contain; border-radius: 2px; }
    @keyframes memoZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>

<div class="archive-wrapper">
    
    <div class="search-wrapper">
        <div class="search-inner">
            <input type="text" id="archive-search" autocomplete="off" placeholder="검색">
            <i class="xi-search" id="search-icon" title="검색 열기"></i>
        </div>
    </div>

    <div id="initial-upload-wrapper">
        <input type="file" id="archive-file-input" accept="image/*" style="display: none;">
        <label for="archive-file-input" class="cloud-upload-btn" title="사진 올리기">
            <i class="xi-cloud"></i>
        </label>
    </div>

    <div id="upload-container" class="upload-container">
        <button id="remove-preview" onclick="removePreview()"><i class="xi-close"></i></button>
        <img id="image-preview" src="">
        
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" id="archive-title" class="archive-input-item" autocomplete="off" placeholder="title" style="text-align: center;">
            <textarea id="archive-caption" class="archive-input-item" placeholder="caption" style="min-height: 60px; resize: none; line-height: 1.6;"></textarea>
            
            <div class="archive-footer-group">
                <input type="date" id="archive-date-picker" title="날짜 변경">
                <button class="archive-submit-btn" id="submit-btn" onclick="uploadArchivePost()" title="업로드">
                    <i class="xi-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="gallery-grid" id="gallery-feed"></div>

</div>

<div id="archive-lightbox" class="archive-lightbox" onclick="if(event.target === this) closeArchiveLightbox()">
    <div class="archive-lightbox-card" id="archive-lightbox-card">
        
        <div style="text-align: center; width: 100%; background: rgba(0,0,0,0.02); border-radius: 2px;">
            <img id="lightbox-archive-img" src="">
        </div>
        
        <div id="lightbox-read-mode">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; border-bottom: 1px solid var(--divider-bg); padding-bottom: 8px;">
                <div id="lightbox-archive-title" style="font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--main-color);"></div>
                <div id="lightbox-archive-date" style="font-family: 'Noto Serif KR', serif; font-size: 11px; color: var(--sub-color);"></div>
            </div>
            <div id="lightbox-archive-caption" style="font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--main-color); line-height: 1.7; word-break: break-all;"></div>
            
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                <i class="xi-pen" onclick="startArchiveEdit()" title="수정" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='0.35'"></i>
                <i class="xi-trash" onclick="deleteArchiveFromLightbox()" title="삭제" style="color:var(--sub-color); opacity: 0.35; font-size: 11px; cursor:pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.7'; this.style.color='#ff3b30'" onmouseout="this.style.opacity='0.35'; this.style.color='var(--sub-color)'"></i>
            </div>
        </div>

        <div id="lightbox-edit-mode" style="display: none; flex-direction: column; gap: 12px;">
            <input type="text" id="edit-archive-title" placeholder="title" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--point-color); color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; padding:4px 0; outline:none;">
            <textarea id="edit-archive-caption" placeholder="caption" style="width:100%; min-height:80px; background:transparent; border:1px solid var(--point-color); border-radius:2px; color:var(--main-color); font-family:'Noto Serif KR', serif; font-size:13px; padding:10px; outline:none; resize:none; line-height:1.6;"></textarea>
            
            <input type="date" id="edit-archive-date" style="width: 120px; background: transparent; border: none; border-bottom: 1px solid var(--point-color); color: var(--sub-color); font-family: 'Noto Serif KR', serif; font-size: 11px; padding: 2px 0; outline: none; cursor:pointer;">
            
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 4px;">
                <button onclick="saveArchiveEdit()" style="background:none; border:none; color:var(--point-color); font-size: 11px; font-family:'Noto Serif KR', serif; font-weight:600; cursor:pointer; padding:0;">저장</button>
                <button onclick="cancelArchiveEdit()" style="background:none; border:none; color:var(--sub-color); font-size: 11px; font-family:'Noto Serif KR', serif; cursor:pointer; padding:0;">취소</button>
            </div>
        </div>

    </div>
</div>

<script>
    // [수정] const와 let을 var로 교체하여 카테고리 재진입 시 생기는 먹통 에러 차단
    var ARCHIVE_URL = 'https://pqqvmppgpqmtyttfjyve.supabase.co';
    var ARCHIVE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcXZtcHBncHFtdHl0dGZqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzYxMDAsImV4cCI6MjA5NzAxMjEwMH0.86kBtiDT9J_FNeKDOqm82p53JObFTfQkQUAzsT94icw';
    var archiveSupabase = window.supabase.createClient(ARCHIVE_URL, ARCHIVE_KEY);

    var selectedFile = null;
    var currentLightboxPostId = null;
    var currentLightboxImageUrl = "";

    // 1. 파일 선택 시: 사진의 원본 메타데이터(수정일)를 읽어서 날짜에 기본 세팅
    $('#archive-file-input').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        selectedFile = file;

        const fileDate = new Date(file.lastModified);
        const yyyy = fileDate.getFullYear();
        const mm = String(fileDate.getMonth() + 1).padStart(2, '0');
        const dd = String(fileDate.getDate()).padStart(2, '0');
        $('#archive-date-picker').val(`${yyyy}-${mm}-${dd}`);

        const reader = new FileReader();
        reader.onload = function(e) {
            $('#image-preview').attr('src', e.target.result);
            $('#initial-upload-wrapper').hide(); 
            $('#upload-container').slideDown(250); 
        }
        reader.readAsDataURL(file);
    });

    // 2. 미리보기 취소
    window.removePreview = function() {
        selectedFile = null;
        $('#archive-file-input').val('');
        $('#archive-title').val('');
        $('#archive-caption').val('');
        $('#upload-container').slideUp(200, function() {
            $('#initial-upload-wrapper').fadeIn(200); 
        });
    };

    // 3. 사진 업로드
    window.uploadArchivePost = async function() {
        if (!selectedFile) return;

        const titleVal = $('#archive-title').val().trim();
        const captionVal = $('#archive-caption').val().trim();
        const dateVal = $('#archive-date-picker').val();
        const btn = $('#submit-btn');

        try {
            btn.prop('disabled', true).css('opacity', '0.3');

            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;

            const { data: uploadData, error: uploadError } = await archiveSupabase.storage
                .from('images')
                .upload(fileName, selectedFile);

            if (uploadError) throw uploadError;

            const { data: publicUrlData } = archiveSupabase.storage
                .from('images')
                .getPublicUrl(fileName);
            
            const imageUrl = publicUrlData.publicUrl;
            const contentString = imageUrl + "|||" + captionVal;

            // KST 한국 시간 세팅 (캘린더 값 기준)
            let finalDate = new Date();
            if (dateVal) {
                const parts = dateVal.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const offset = finalDate.getTimezoneOffset() * 60000;
            const localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            const { error: dbError } = await archiveSupabase.from('posts').insert([{ 
                category: 'archive', 
                content: contentString, 
                title: titleVal,
                created_at: localISOString 
            }]);

            if (dbError) throw dbError;

            removePreview();
            loadGalleryPosts();

        } catch (error) {
            alert('사진을 보관하지 못했습니다.');
        } finally {
            btn.prop('disabled', false).css('opacity', '0.7');
        }
    };

    // 4. 갤러리 불러오기
    async function loadGalleryPosts() {
        const feedContainer = $('#gallery-feed');
        feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; opacity:0.6;">사진을 인화하는 중입니다...</p>');

        try {
            const { data, error } = await archiveSupabase.from('posts')
                .select('*')
                .eq('category', 'archive');
                
            if (error) throw error;
            
            feedContainer.empty();
            if (data.length === 0) {
                feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:var(--sub-color); font-size:11px; padding:30px 0; font-family:\'Noto Serif KR\', serif;">보관된 사진이 없습니다.</p>');
                return;
            }

            // 날짜 기준 내림차순 정렬
            data.sort((a, b) => {
                const dateA = a.created_at.split('T')[0];
                const dateB = b.created_at.split('T')[0];
                if (dateA === dateB) return b.id - a.id; 
                return new Date(dateB) - new Date(dateA);
            });

            data.forEach(post => {
                const dateObj = new Date(post.created_at);
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const displayDate = `${yyyy}.${mm}.${dd}`;
                const inputDate = `${yyyy}-${mm}-${dd}`; 

                let imageUrl = post.content;
                let captionText = "";
                if (post.content && post.content.includes("|||")) {
                    const parts = post.content.split("|||");
                    imageUrl = parts[0];
                    captionText = parts[1] || "";
                }

                const safeTitle = post.title ? post.title.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                const safeCaption = captionText ? captionText.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';
                const searchText = `${post.title || ''} ${captionText} ${displayDate}`;

                const postHtml = `
                    <div class="gallery-wrapper-item" data-search="${searchText}">
                        <div class="gallery-item fade-in-element" onclick="openArchiveLightbox(${post.id}, '${imageUrl}', '${safeTitle}', '${safeCaption}', '${displayDate}', '${inputDate}')">
                            <img src="${imageUrl}" alt="archive image" loading="lazy">
                            <div class="gallery-overlay">
                                <div style="display: flex; justify-content: flex-end; align-items: flex-start; width: 100%;">
                                    <span class="gallery-date">${displayDate}</span>
                                </div>
                                <div class="gallery-hover-title">${post.title || ''}</div>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.append(postHtml);
            });

        } catch (error) {
            feedContainer.html('<p style="grid-column: 1 / -1; text-align:center; color:#ff3b30; font-size:12px; padding:30px 0;">사진을 불러오지 못했습니다.</p>');
        }
    }

    // 5. 검색 로직
    $('#search-icon').click(function() {
        $('#archive-search').css({'width': '110px', 'opacity': '1', 'border-bottom-color': 'var(--divider-bg)'}).focus();
        $(this).css('opacity', '0.7');
    });
    $('#archive-search').blur(function() {
        if($(this).val().trim() === '') {
            $(this).css({'width': '0px', 'opacity': '0', 'border-bottom-color': 'transparent'});
            $('#search-icon').css('opacity', '0.35');
        }
    });
    $('#archive-search').on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $('.gallery-wrapper-item').each(function() {
            const dataText = $(this).attr('data-search').toLowerCase();
            if (dataText.includes(keyword)) { $(this).show(); } else { $(this).hide(); }
        });
    });

    // 6. 삭제 로직
    window.deleteArchivePost = async function(id) {
        if (!confirm("이 사진을 보관소에서 영구 삭제하시겠습니까?")) return;
        try {
            const { error } = await archiveSupabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            loadGalleryPosts();
        } catch (error) { alert('삭제하지 못했습니다.'); }
    };
    window.deleteArchiveFromLightbox = function() {
        deleteArchivePost(currentLightboxPostId);
        closeArchiveLightbox();
    };

    // 7. 라이트박스 열기/닫기
    window.openArchiveLightbox = function(id, url, title, caption, displayDate, inputDate) {
        currentLightboxPostId = id;
        currentLightboxImageUrl = url;
        
        $('#lightbox-archive-img').attr('src', url);
        $('#lightbox-archive-title').text(title || '');
        $('#lightbox-archive-caption').html((caption || '').replace(/\n/g, '<br>'));
        $('#lightbox-archive-date').text(displayDate || '');
        
        $('#edit-archive-title').val(title || '');
        $('#edit-archive-caption').val(caption || '');
        $('#edit-archive-date').val(inputDate || ''); 
        
        $('#lightbox-read-mode').show();
        $('#lightbox-edit-mode').hide();
        
        $('#archive-lightbox').css('display', 'flex').hide().fadeIn(150);
    };
    window.closeArchiveLightbox = function() {
        $('#archive-lightbox').fadeOut(150);
    };

    // 8. 팝업 내 수정/저장 (날짜 포함)
    window.startArchiveEdit = function() {
        $('#lightbox-read-mode').hide();
        $('#lightbox-edit-mode').fadeIn(200).css('display', 'flex');
    };
    window.cancelArchiveEdit = function() {
        $('#lightbox-edit-mode').hide();
        $('#lightbox-read-mode').fadeIn(200);
    };
    window.saveArchiveEdit = async function() {
        const newTitle = $('#edit-archive-title').val().trim();
        const newCaption = $('#edit-archive-caption').val().trim();
        const newDateStr = $('#edit-archive-date').val();
        const newContentStr = currentLightboxImageUrl + "|||" + newCaption;
        
        try {
            let finalDate = new Date();
            if (newDateStr) {
                const parts = newDateStr.split('-');
                finalDate.setFullYear(parts[0], parts[1] - 1, parts[2]);
            }
            const offset = finalDate.getTimezoneOffset() * 60000;
            const localISOString = new Date(finalDate.getTime() - offset).toISOString().slice(0, -1);

            const { error } = await archiveSupabase.from('posts').update({ 
                title: newTitle, 
                content: newContentStr,
                created_at: localISOString
            }).eq('id', currentLightboxPostId);
            
            if (error) throw error;
            
            const yy = finalDate.getFullYear();
            const m = String(finalDate.getMonth() + 1).padStart(2, '0');
            const d = String(finalDate.getDate()).padStart(2, '0');
            
            $('#lightbox-archive-title').text(newTitle);
            $('#lightbox-archive-caption').html(newCaption.replace(/\n/g, '<br>'));
            $('#lightbox-archive-date').text(`${yy}.${m}.${d}`);
            
            cancelArchiveEdit();
            loadGalleryPosts(); 
        } catch (error) {
            alert('수정에 실패했습니다.');
        }
    };

    setTimeout(() => { loadGalleryPosts(); }, 100);
</script>
